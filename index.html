<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GymBuddy</title>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
:root {
  --bg: #f8f9fa; --surface: #f3f4f6; --card: #ffffff;
  --border: #e5e7eb; --border-med: #d1d5db;
  --accent: #111827;
  --text-primary: #111827; --text-secondary: #4b5563; --text-hint: #9ca3af;
  --green: #15803d; --green-bg: #dcfce7;
  --red: #dc2626; --red-bg: #fee2e2;
  --blue: #1d4ed8; --blue-bg: #dbeafe;
  --orange: #c2410c; --orange-bg: #fff7ed;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); direction: rtl; touch-action: manipulation; }
.app { 
  max-width: 420px; 
  margin: 0 auto; 
  height: 100vh; /* מומלץ להשאיר כגיבוי לדפדפנים ישנים */
  height: 100dvh; /* התיקון שלנו */
  display: flex; 
  flex-direction: column; 
  background: var(--bg); 
  overflow: hidden; 
}
.topbar { background: var(--accent); padding: 16px 18px 12px; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 10px; }
.topbar-title { font-weight: 600; font-size: 17px; color: #fff; flex: 1; }
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.bottomnav { 
  background: var(--card); 
  border-top: 1px solid var(--border); 
  display: flex; 
  /* מחיקת position: sticky; ו- bottom: 0; */
  z-index: 10; /* מוודא שהתפריט תמיד מעל התוכן */
  padding-bottom: env(safe-area-inset-bottom); /* מוסיף ריווח רק במכשירים עם פס תחתון */
}
.navbtn { flex: 1; padding: 10px 0 8px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; font-family: inherit; border-top: 2px solid transparent; color: var(--text-hint); }
.navbtn.active { color: var(--accent); border-top-color: var(--accent); }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
.card.improved { border-color: var(--green); }
.ex-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; cursor: pointer; }
.ex-header:hover { background: var(--surface); }
.ex-body { padding: 0 16px 14px; border-top: 1px solid var(--border); }
.inp { width: 100%; text-align: center; font-size: 15px; font-family: inherit; background: var(--surface); border: 1px solid var(--border-med); border-radius: 8px; padding: 8px 4px; color: var(--text-primary); outline: none; }
.inp:focus { border-color: var(--accent); background: #fff; }
.inp-text { text-align: right; padding: 8px 10px; }
.btn-primary { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-secondary { width: 100%; padding: 13px; background: var(--surface); border: 1px solid var(--border-med); border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--text-secondary); font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-success { width: 100%; padding: 13px; background: var(--green-bg); color: var(--green); border: 1px solid #86efac; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-copy { padding: 5px 10px; background: var(--blue-bg); border: 1px solid #93c5fd; border-radius: 8px; cursor: pointer; font-size: 11px; color: var(--blue); font-family: inherit; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; }
.badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
.badge-up { background: var(--green-bg); color: var(--green); }
.badge-down { background: var(--red-bg); color: var(--red); }
.badge-eq { background: var(--surface); color: var(--text-hint); }
.choose-btn { flex: 1; padding: 20px 8px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 7px; font-family: inherit; min-width: 0; }
.choose-btn:hover { border-color: var(--accent); }
.workout-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; cursor: pointer; }
.name-edit-inp { font-weight: 600; font-size: 15px; font-family: inherit; color: var(--text-primary); background: var(--surface); border: 1px solid var(--border-med); border-radius: 8px; padding: 4px 8px; outline: none; width: 150px; text-align: right; }
.name-edit-inp:focus { border-color: var(--accent); }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text-hint); padding: 4px; border-radius: 6px; display: flex; align-items: center; }
.del-btn:hover { color: var(--red); background: var(--red-bg); }
.icon-btn { background: none; border: none; cursor: pointer; padding: 2px; display: flex; align-items: center; color: var(--text-hint); }
.icon-btn:hover { color: var(--text-primary); }
.rest-chip { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: var(--orange); background: var(--orange-bg); padding: 2px 7px; border-radius: 20px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
.stat-label { font-size: 11px; color: var(--text-hint); font-weight: 600; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--text-primary); }
.stat-sub { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
.next-btn { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 14px; cursor: pointer; font-size: 16px; font-weight: 700; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
.pr-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.pr-row:last-child { border-bottom: none; }
.week-dot { width: 10px; height: 10px; border-radius: 50%; }
.choose-btn.selected { border: 2px solid var(--accent); background: var(--surface); }
.drag-handle { cursor: grab; color: var(--text-hint); display:flex;align-items:center;padding:0 4px; touch-action: none; }
.drag-handle:active { cursor: grabbing; }
.ex-row-drag { transition: opacity 0.15s; }
.ex-row-drag.dragging { opacity: 0.4; }
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #111827; color: #fff; padding: 14px 24px; border-radius: 14px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; display: flex; align-items: center; gap: 8px; max-width: 320px; text-align: center; }
.toast.show { opacity: 1; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim-card {
  opacity: 0;
  transform: translateY(40px);
}
.anim-card.visible {
  animation: slideUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes fillBar {
  from { width: 0%; }
}
.anim-bar { animation: fillBar 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
@keyframes dayPop {
  from { opacity: 0; transform: translateY(10px) scale(0.85); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.day-cell-anim {
  animation: dayPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  animation-play-state: paused;
}
</style>

  <svg xmlns="http://www.w3.org/2000/svg" width="64" height="28" viewBox="0 0 164 72" style="animation:dumbPulse 1.1s ease-in-out infinite">
    <!-- bar -->
    <rect x="27" y="33" width="110" height="6" rx="3" fill="#111827"/>
    <!-- left plate stack -->

    <rect x="16" y="24" width="12" height="24" rx="2" fill="#111827"/>
    <!-- right plate stack -->
    <rect x="136" y="24" width="12" height="24" rx="2" fill="#111827"/>
    <rect x="148" y="18" width="16" height="36" rx="2" fill="#111827"/>
  </svg>
  <style>
    @keyframes dumbPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.88); }
    }

</div>
<div id="toast" class="toast"></div>
<div class="app">
  <div class="topbar">
    <i data-lucide="dumbbell" style="width:20px;height:20px;color:#fff"></i>
    <span class="topbar-title" id="screen-title">דשבורד</span>
  </div>
  <div class="content" id="main-content"></div>
  <div class="bottomnav">
    <button class="navbtn active" id="nav-dashboard" onclick="navigate('dashboard')">
      <i data-lucide="layout-dashboard" style="width:18px;height:18px"></i><span>דשבורד</span>
    </button>
    <button class="navbtn" id="nav-home" onclick="navigate('home')" style="position:relative">
      <i data-lucide="dumbbell" style="width:18px;height:18px"></i><span>אימון</span>
      <span id="inprogress-dot" style="display:none;position:absolute;top:8px;right:calc(50% - 12px);width:7px;height:7px;background:#dc2626;border-radius:50%;border:1.5px solid #fff"></span>
    </button>
    <button class="navbtn" id="nav-history" onclick="navigate('history')">
      <i data-lucide="calendar" style="width:18px;height:18px"></i><span>היסטוריה</span>
    </button>
    <button class="navbtn" id="nav-manage" onclick="navigate('manage')">
      <i data-lucide="list-checks" style="width:18px;height:18px"></i><span>ניהול תוכנית</span>
    </button>
  </div>
</div>

<script>
// ── Supabase ─────────────────────────────────────────────────────
const SUPABASE_URL = "https://jezibgdemidhebbcpdch.supabase.co";
const SUPABASE_KEY = "sb_publishable_NDyz8DAcTO8kOs6JhAjTFw_uRTgb5nf";

const SB_HEADERS = {
  apikey: SUPABASE_KEY,
  Authorization: "Bearer " + SUPABASE_KEY,
  "Content-Type": "application/json",
  Prefer: "return=representation"
};

async function sbGet(path) {
  const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, { headers: SB_HEADERS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(path, body) {
  const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, { method:"POST", headers: SB_HEADERS, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(path) {
  const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, { method:"DELETE", headers: SB_HEADERS });
  if (!r.ok) throw new Error(await r.text());
}
// ─────────────────────────────────────────────────────────────────

const STORAGE_SESSIONS = "gym_sessions_v2";
const STORAGE_WORKOUTS = "gym_workouts_v4";
const STORAGE_SETTINGS = "gym_settings_v1";
const DEFAULT_WORKOUTS = [
  { id: "A", name: "אימון A", exercises: [
    { name: "לחיצת חזה", rest: 90 }, { name: "כתפיים קדמי", rest: 60 },
    { name: "טרייספס", rest: 60 }, { name: "בטן", rest: 45 }
  ]},
  { id: "B", name: "אימון B", exercises: [
    { name: "גב רחב", rest: 90 }, { name: "בייספס", rest: 60 },
    { name: "כתפיים אחורי", rest: 60 }, { name: "כרעיים", rest: 90 }
  ]}
];
const DEFAULT_SETTINGS = { weeklyGoal: 4, goalHistory: [] };

function loadWorkouts() {
  try {
    const s = localStorage.getItem(STORAGE_WORKOUTS);
    if (s) return JSON.parse(s);
    const old = localStorage.getItem("gym_workouts_v3");
    if (old) {
      const parsed = JSON.parse(old);
      return parsed.map(w => ({ ...w, exercises: w.exercises.map(e => typeof e === "string" ? { name: e, rest: 60 } : e) }));
    }
    return JSON.parse(JSON.stringify(DEFAULT_WORKOUTS));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_WORKOUTS)); }
}
function loadSettings() {
  try {
    const s = { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem(STORAGE_SETTINGS) || "{}") };
    if (!s.goalHistory || !s.goalHistory.length) {
      s.goalHistory = [{ goal: s.weeklyGoal, from: "2020-01-05" }];
    }
    const thisWeekIso = getWeekStart(new Date()).toISOString().slice(0,10);
    const sorted = [...s.goalHistory].sort((a,b) => a.from > b.from ? -1 : 1);
    const currentEntry = sorted.find(e => e.from <= thisWeekIso);
    s.weeklyGoal = currentEntry ? currentEntry.goal : (s.weeklyGoal || 4);
    return s;
  } catch { return { ...DEFAULT_SETTINGS, weeklyGoal: 4, goalHistory: [{ goal: 4, from: "2020-01-05" }] }; }
}

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0 = Sunday
  d.setDate(d.getDate() - day);
  d.setHours(0,0,0,0);
  return d;
}

function getGoalForWeek(weekStartIso) {
  const history = state.settings.goalHistory || [];
  const sorted = [...history].sort((a,b) => a.from > b.from ? -1 : 1);
  const entry = sorted.find(e => e.from <= weekStartIso);
  return entry ? entry.goal : (state.settings.weeklyGoal || 4);
}

let state = {
  screen: "dashboard", workoutId: null, openExercise: null, exercises: {},
  sessions: [], workouts: loadWorkouts(), settings: loadSettings(),
  manageOpenId: null, editingNameId: null, selectedWorkoutId: null, expandedSessions: new Set(),
  weightLogs: [], weightGoal: { start_weight: null, goal_weight: null }, historyTab: "workouts",
  workoutNote: "", monthViewYear: null, monthViewMonth: null, pendingGoal: null,
  editingExKey: null, exerciseLibrary: [], workoutExtras: []
};
try { state.sessions = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || "[]"); } catch {}

function saveSessions() { localStorage.setItem(STORAGE_SESSIONS, JSON.stringify(state.sessions)); }

async function saveSessionToSupabase(session) {
  try {
    const rows = await sbPost("workout_sessions", {
      local_id: session.id,
      workout_id: session.workoutId,
      workout_name: getWorkout(session.workoutId)?.name || session.workoutId,
      date: session.date
    });
    const sessionRow = rows[0];
    const sets = [];
    Object.entries(session.exercises || {}).forEach(([exName, exSets]) => {
      exSets.forEach(s => {
        if (s.weight > 0 || s.reps > 0) {
          sets.push({ session_id: sessionRow.id, exercise_name: exName, set_number: s.num, weight: s.weight, reps: s.reps, failed: !!s.failed });
        }
      });
    });
    if (sets.length) await sbPost("session_exercises", sets);
  } catch(e) {
    console.error("Supabase save failed:", e);
  }
}

async function loadSessionsFromSupabase() {
  try {
    const rows = await sbGet("workout_sessions?select=*,sets:session_exercises(*)&order=date.asc");
    state.sessions = rows.map(row => {
      const exercises = {};
      (row.sets || []).forEach(s => {
        if (!exercises[s.exercise_name]) exercises[s.exercise_name] = [];
        exercises[s.exercise_name].push({ num: s.set_number, weight: s.weight, reps: s.reps, failed: s.failed });
      });
      Object.values(exercises).forEach(arr => arr.sort((a,b) => a.num - b.num));
      return { id: row.local_id || row.id, workoutId: row.workout_id, workoutName: row.workout_name || "", date: row.date, exercises };
    });
    localStorage.setItem(STORAGE_SESSIONS, JSON.stringify(state.sessions));
  } catch(e) {
    console.error("Supabase load failed, using localStorage:", e);
    try { state.sessions = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || "[]"); } catch {}
  }
}

async function deleteSessionFromSupabase(localId) {
  try {
    await sbDelete("workout_sessions?local_id=eq." + encodeURIComponent(localId));
  } catch(e) {
    console.error("Supabase delete failed:", e);
  }
}

async function loadWeightData() {
  try {
    const logs = await sbGet("weight_logs?select=*&order=date.asc");
    state.weightLogs = logs || [];
    const goals = await sbGet("weight_goal?select=*&order=updated_at.desc&limit=1");
    if (goals && goals.length) state.weightGoal = goals[0];
  } catch(e) { console.error("Weight load failed:", e); }
}

async function saveWeightLog(weight) {
  try {
    const row = await sbPost("weight_logs", { weight, date: new Date().toISOString() });
    state.weightLogs.push(row[0]);
    showToast("המשקל נשמר ✓");
  } catch(e) { console.error("Weight save failed:", e); showToast("שגיאה בשמירת משקל ⚠️"); throw e; }
}

async function saveWeightGoal(startWeight, goalWeight) {
  try {
    await sbDelete("weight_goal?id=neq.00000000-0000-0000-0000-000000000000");
    const row = await sbPost("weight_goal", { start_weight: startWeight, goal_weight: goalWeight });
    state.weightGoal = row[0];
  } catch(e) { console.error("Weight goal save failed:", e); showToast("שגיאה בשמירת יעד"); throw e; }
}

async function deleteWeightLog(id) {
  try {
    await sbDelete("weight_logs?id=eq." + id);
    state.weightLogs = state.weightLogs.filter(l => l.id !== id);
    render();
  } catch(e) { console.error("Weight delete failed:", e); showToast("שגיאה במחיקה"); }
}

function getLatestWeight() {
  if (!state.weightLogs.length) return null;
  return state.weightLogs[state.weightLogs.length - 1];
}

function getPrevWeight() {
  if (state.weightLogs.length < 2) return null;
  return state.weightLogs[state.weightLogs.length - 2];
}

function daysSinceWeight() {
  const latest = getLatestWeight();
  if (!latest) return null;
  return Math.floor((new Date() - new Date(latest.date)) / (1000 * 60 * 60 * 24));
}

function buildInp(type, step, placeholder, fontSize) {
  const inp = document.createElement("input");
  inp.type = type; inp.step = step; inp.placeholder = placeholder;
  inp.style.cssText = `width:100%;text-align:center;font-size:${fontSize};font-family:inherit;background:var(--surface);border:1px solid var(--border-med);border-radius:10px;padding:10px;color:var(--text-primary);outline:none;box-sizing:border-box`;
  return inp;
}
function buildLabel(text) {
  const l = document.createElement("label");
  l.style.cssText = "font-size:12px;color:var(--text-secondary);font-weight:600;display:block;margin-bottom:6px";
  l.innerHTML = text; return l;
}
function buildWrap(mb) {
  const d = document.createElement("div"); d.style.marginBottom = mb || "16px"; return d;
}

function showWeightModal(changeGoal) {
  const latest = getLatestWeight();
  const wGoal = state.weightGoal;
  const hasGoal = !!(wGoal && wGoal.start_weight && wGoal.goal_weight);
  const isChangingGoal = !!changeGoal;

  document.getElementById("weight-modal")?.remove();

  const overlay = document.createElement("div");
  overlay.id = "weight-modal";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center";

  const sheet = document.createElement("div");
  sheet.style.cssText = "background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:420px;direction:rtl";

  // Header
  const header = document.createElement("div");
  header.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:20px";
  const titleEl = document.createElement("span");
  titleEl.style.cssText = "font-weight:700;font-size:16px;color:var(--text-primary)";
  titleEl.textContent = isChangingGoal ? "שינוי יעד" : "עדכון משקל";
  header.appendChild(titleEl);
  const closeBtn = document.createElement("button");
  closeBtn.textContent = "×";
  closeBtn.style.cssText = "background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:22px;line-height:1";
  closeBtn.addEventListener("click", () => overlay.remove());
  header.appendChild(closeBtn);
  sheet.appendChild(header);

  let currentInp = null;
  let startInp = null;
  let goalInp = null;

  if (!isChangingGoal) {
    // Current weight
    const cWrap = buildWrap("16px");
    cWrap.appendChild(buildLabel("משקל נוכחי (ק״ג)"));
    currentInp = buildInp("number", "0.1", latest ? String(latest.weight) : "85.0", "22px");
    currentInp.style.fontWeight = "700";
    cWrap.appendChild(currentInp);
    sheet.appendChild(cWrap);
  }

  if (!hasGoal || isChangingGoal) {
    // Start weight
    const sWrap = buildWrap("12px");
    sWrap.appendChild(buildLabel("משקל התחלתי (ק״ג)"));
    startInp = buildInp("number", "0.1", hasGoal ? String(wGoal.start_weight) : "91.0", "16px");
    if (hasGoal) startInp.value = wGoal.start_weight;
    sWrap.appendChild(startInp);
    sheet.appendChild(sWrap);
  }

  // Goal weight
  const gWrap = buildWrap("16px");
  const gLabelText = hasGoal && !isChangingGoal
    ? `יעד משקל (ק״ג) <span style="font-weight:400;color:var(--text-hint)">— נוכחי: ${wGoal.goal_weight}</span>`
    : "יעד משקל (ק״ג)";
  gWrap.appendChild(buildLabel(gLabelText));
  goalInp = buildInp("number", "0.1", hasGoal ? String(wGoal.goal_weight) : "78.0", "16px");

        overlay.remove(); haptic("medium"); render(); showToast("היעד עודכן ✓");
        return;
      }
      const current = parseFloat(currentInp.value);
      if (!current || isNaN(current)) { showToast("הזן משקל תקין"); return; }
      const goalVal = parseFloat(goalInp.value);
      const startVal = startInp ? parseFloat(startInp.value) : null;
      if (!hasGoal) {
        if (!startVal || !goalVal || isNaN(startVal) || isNaN(goalVal)) { showToast("הזן משקל התחלתי ויעד"); return; }
        await saveWeightGoal(startVal, goalVal);
      } else if (goalVal && !isNaN(goalVal)) {
        await saveWeightGoal(wGoal.start_weight, goalVal);
      }
      await saveWeightLog(current);
      overlay.remove(); haptic("medium"); render(); showToast("המשקל עודכן ✓");
    } catch(e) { console.error("save error:", e); showToast("שגיאה: " + e.message); }
  });
  sheet.appendChild(submitBtn);

  // Change goal button (only when has goal and not already changing)
  if (hasGoal && !isChangingGoal) {
    const changeBtn = document.createElement("button");

    changeBtn.style.cssText = "width:100%;padding:11px;background:transparent;color:var(--text-hint);border:none;cursor:pointer;font-size:13px;font-family:inherit;margin-top:8px;text-decoration:underline";
    changeBtn.addEventListener("click", () => { overlay.remove(); showWeightModal(true); });

  }

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  setTimeout(() => (currentInp || startInp)?.focus(), 100);
}

async function seedLibraryFromWorkouts() {
  const existingNames = new Set(state.exerciseLibrary.map(e => e.name));
  const toAdd = [];
  state.workouts.forEach(w => {
    w.exercises.forEach(ex => {
      const name = typeof ex === "string" ? ex : ex.name;
      const category = ex.category || null;
      if (name && !existingNames.has(name)) {
        existingNames.add(name);
        toAdd.push({ name, category });
      }
    });
  });
  if (!toAdd.length) return;
  try {
    const added = await sbPost("exercise_library", toAdd);
    state.exerciseLibrary = [...state.exerciseLibrary, ...added];
  } catch(e) { console.error("Seed library failed:", e); }

  const last = state.sessions[state.sessions.length - 1];
  const lastIdx = state.workouts.findIndex(w => w.id === last.workoutId);

  return state.workouts[(lastIdx + 1) % state.workouts.length];
}

function getWeekStreak() {
  if (!state.sessions.length) return 0;
  const getWeekKey = (iso) => getWeekStart(iso).toISOString().slice(0,10);
  const weekCounts = {};

  state.sessions.forEach(s => {
    const k = getWeekKey(s.date);
    weekCounts[k] = (weekCounts[k] || 0) + 1;
  });

  const todayWeekKey = getWeekKey(new Date().toISOString());

  // בדוק רק שבועות שהסתיימו, כדי שהשבוע הנוכחי לא ישבור את הרצף באמצע
  const weeks = Object.keys(weekCounts)
    .sort()
    .reverse()
    .filter(w => w !== todayWeekKey);

  let streak = 0;
  let prevWeekKey = null;

  for (const w of weeks) {
    const goalForWeek = getGoalForWeek(w);

    if (weekCounts[w] >= goalForWeek) {
      // וודא שאין חור בין שבועות שהושלמו
      if (prevWeekKey !== null) {
        const prevDate = new Date(prevWeekKey);
        const thisDate = new Date(w);
        const diffWeeks = Math.round((prevDate - thisDate) / (7 * 24 * 60 * 60 * 1000));
        if (diffWeeks > 1) break;
      }
      streak++;
      prevWeekKey = w;
    } else {
      break;
    }
  }

  return streak;
}

function getThisWeekCount() {
  const weekStart = getWeekStart(new Date());
  return state.sessions.filter(s => new Date(s.date) >= weekStart).length;
}

function getPRs() {
  const prs = {};
  state.sessions.forEach(session => {
    Object.entries(session.exercises||{}).forEach(([name, sets]) => {
      sets.forEach(s => {
        if (s.weight > (prs[name]?.weight || 0)) {
          // חפש קטגוריה — קודם בתוכניות הפעילות, אחר כך במאגר
          let category = null;
          state.workouts.forEach(w => {
            const ex = w.exercises.find(e => (typeof e==="string"?e:e.name) === name);
            if (ex?.category) category = ex.category;
          });
          if (!category) {
            const libEntry = state.exerciseLibrary.find(e => e.name === name);
            if (libEntry?.category) category = libEntry.category;
          }
          prs[name] = { weight: s.weight, date: session.date, category };
        }
      });
    });
  });
  return prs;
}

function startCountUp(el) {
  const target = parseFloat(el.dataset.countup);
  const suffix = el.dataset.suffix || "";
  if (isNaN(target) || target === 0) { el.textContent = "0" + suffix; return; }
  const duration = 1100;
  const start = performance.now();
  const isInt = Number.isInteger(target);
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val = target * ease;
    el.textContent = (isInt ? Math.round(val) : val.toFixed(1)) + suffix;
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function bindScrollAnimations() {
  const cards = document.querySelectorAll(".anim-card");
  if (!cards.length) return;

  function activateCard(card) {
    card.classList.add("visible");
    const delay = parseFloat(card.style.animationDelay) || 0;
    setTimeout(() => {
      card.querySelectorAll("[data-countup]").forEach(startCountUp);
      card.querySelectorAll(".day-cell-anim").forEach(cell => {
        cell.style.animationPlayState = "running";
      });
    }, delay * 1000 + 100);
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { activateCard(entry.target); observer.unobserve(entry.target); }
    });
  }, { threshold: 0.15 });

  const observerEarly = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) { activateCard(entry.target); observerEarly.unobserve(entry.target); }
    });
  }, { threshold: 0.03 });

  cards.forEach(card => {
    const delay = parseFloat(card.style.animationDelay) || 0;
    if (delay >= 1.0) observerEarly.observe(card);
    else observer.observe(card);
  });
}

  const dayNames = ["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"];
  const todayDow = new Date().getDay();
  const weekStart = getWeekStart(new Date());

  const workedDays = new Set();
  state.sessions.forEach(s => {
    const d = new Date(s.date);
    if (d >= weekStart) {
      workedDays.add(d.getDay());
    }
  });

  const pct = goal > 0 ? Math.round((thisWeek / goal) * 100) : 0;
  const pctColor = pct >= 100 ? "var(--green)" : pct >= 50 ? "var(--orange)" : "var(--text-hint)";
  const pctBg = pct >= 100 ? "var(--green-bg)" : pct >= 50 ? "var(--orange-bg)" : "var(--surface)";

  const checkIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

  const dayOrder = [0,1,2,3,4,5,6];
  const dayCells = dayOrder.map((dow, idx) => {
    const isToday = dow === todayDow;
    const isPast = todayDow === 0 ? dow === 0 : dow < todayDow || dow === 0 && todayDow > 0;
    const isFuture = !isToday && !isPast;
    const worked = workedDays.has(dow);
    const labelColor = worked ? "var(--green)" : isFuture ? "var(--border-med)" : "var(--text-hint)";
    const labelWeight = isToday ? "700" : "600";
    const boxBg = worked ? "var(--green-bg)" : isFuture ? "var(--card)" : "var(--surface)";
    const boxBorder = worked
      ? isToday ? "2px solid var(--green)" : "1px solid #86efac"
      : isFuture ? "1px dashed var(--border-med)" : "1px solid var(--border)";
    const animDelay = (idx * 0.08).toFixed(2);
    return `<div class="day-cell-anim" style="display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0;animation-delay:${animDelay}s">
      <span style="font-size:10px;color:${labelColor};font-weight:${labelWeight}">${dayNames[dow]}</span>
      <div style="width:100%;aspect-ratio:1;border-radius:8px;background:${boxBg};border:${boxBorder};display:flex;align-items:center;justify-content:center">
        ${worked ? checkIcon : ""}
      </div>
    </div>`;
  }).join("");

  const dumbbellIcon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5m-2.5 0a2.5 2.5 0 1 0 5 0a2.5 2.5 0 1 0 -5 0"/><path d="M17.5 6.5m-2.5 0a2.5 2.5 0 1 0 5 0a2.5 2.5 0 1 0 -5 0"/><path d="M4 16c0-1.1.9-2 2-2h.5"/><path d="M4 6.5v4"/><path d="M20 6.5v4"/><path d="M9 17h6"/><path d="M15 16.1A2 2 0 0 1 16.5 14H17a2 2 0 0 1 2 2"/><path d="M8 22v-5"/><path d="M16 22v-5"/></svg>`;
  const boltIcon = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>`;

  const weekCard = `<div class="stat-card anim-card" style="margin-bottom:16px;animation-delay:0.25s">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span class="stat-label">השבוע</span>
      <span style="font-size:11px;font-weight:600;color:${pctColor};background:${pctBg};padding:2px 8px;border-radius:20px"><span data-countup="${pct}" data-suffix="% מהיעד">0% מהיעד</span></span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:12px">${dayCells}</div>
    <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;align-items:center;gap:6px">
        ${dumbbellIcon}
        <span style="font-size:12px;color:var(--text-secondary);font-weight:500">${thisWeek} מתוך ${goal} אימונים</span>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        ${boltIcon}
        <span style="font-size:12px;color:var(--orange);font-weight:600">Streak: <span data-countup="${streak}" data-suffix=" שבועות">0 שבועות</span></span>
      </div>
    </div>
  </div>`;

  const inProgress = sessionStorage.getItem("gym_in_progress");
  const inProgressId = inProgress ? JSON.parse(inProgress).workoutId : null;
  const inProgressW = inProgressId ? getWorkout(inProgressId) : null;
  const nextBtn = inProgressW
    ? `<button class="next-btn anim-card" style="background:var(--orange);border-radius:14px;animation-delay:0.1s" onclick="navigate('home')">
         <i data-lucide="play" style="width:20px;height:20px"></i>
         המשך ${inProgressW.name}
       </button>`
    : "";


  // ── Weight card ──────────────────────────────────────────────────
  const latest = getLatestWeight();
  const prev = getPrevWeight();
  const wGoal = state.weightGoal || {};
  const hasGoal = !!(wGoal.start_weight && wGoal.goal_weight);
  const dSinceW = daysSinceWeight();
  const needsUpdate = dSinceW === null || dSinceW >= 7;

  let weightCard = "";
  if (!latest && !hasGoal) {
    weightCard = `<div style="background:var(--surface);border:1px dashed var(--border-med);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="showWeightModal()">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text-secondary)">מעקב משקל</div>
        <div style="font-size:11px;color:var(--text-hint);margin-top:2px">לחץ להגדרת יעד ומשקל</div>
      </div>
      <button onclick="event.stopPropagation();showWeightModal()" style="background:var(--accent);border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;color:#fff;font-family:inherit;font-weight:600">הגדר</button>
    </div>`;
  } else if (!latest && hasGoal) {
    weightCard = `<div style="background:var(--orange-bg);border:1px solid var(--orange);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="showWeightModal()">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--orange)">יעד: ${wGoal.goal_weight} ק״ג</div>
        <div style="font-size:11px;color:var(--orange);margin-top:2px">טרם הוזן משקל — לחץ לעדכון</div>
      </div>
      <button onclick="event.stopPropagation();showWeightModal()" style="background:var(--orange);border:none;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;color:#fff;font-family:inherit;font-weight:600">הזן משקל</button>
    </div>`;
  } else if (latest) {
    const diff = prev ? (latest.weight - prev.weight) : null;
    const diffColor = diff === null ? "var(--text-hint)" : diff < 0 ? "var(--green)" : diff > 0 ? "var(--red)" : "var(--text-hint)";
    const diffArrow = diff === null ? "" : diff < 0
      ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>`
      : diff > 0
      ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`
      : "";
    const diffText = diff === null ? "" : `${diff > 0 ? "+" : ""}${diff.toFixed(1)} ק״ג מהשבוע הקודם`;
    const startW = hasGoal ? wGoal.start_weight : latest.weight;
    const goalW = hasGoal ? wGoal.goal_weight : null;
    const totalToLose = hasGoal ? Math.abs(startW - goalW) : 0;
    const lost = hasGoal ? Math.abs(startW - latest.weight) : 0;
    const pctW = hasGoal && totalToLose > 0 ? Math.min(Math.round((lost / totalToLose) * 100), 100) : 0;
    const remaining = hasGoal ? Math.abs(latest.weight - goalW).toFixed(1) : null;
    const cardBorder = needsUpdate ? "var(--orange)" : "var(--border)";
    const cardBg = needsUpdate ? "var(--orange-bg)" : "var(--card)";

    weightCard = `<div class="anim-card" style="background:${cardBg};border:1px solid ${cardBorder};border-radius:14px;padding:14px 16px;margin-bottom:16px;animation-delay:1.0s">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:${hasGoal?"12px":"8px"}">
        <div>
          <div class="stat-label">משקל נוכחי</div>
          <div style="display:flex;align-items:baseline;gap:5px;margin-top:3px">
            <span style="font-size:32px;font-weight:700;color:var(--text-primary);line-height:1">${latest.weight}</span>
            <span style="font-size:14px;color:var(--text-hint)">ק״ג</span>
          </div>
          ${diff !== null ? `<div style="display:flex;align-items:center;gap:4px;margin-top:4px">${diffArrow}<span style="font-size:12px;color:${diffColor};font-weight:600">${diffText}</span></div>` : ""}
        </div>
        ${hasGoal ? `<div style="text-align:left">
          <div class="stat-label">יעד</div>
          <div style="font-size:18px;font-weight:700;color:var(--text-primary);margin-top:2px">${goalW}</div>
          ${remaining !== null ? `<div style="font-size:11px;color:var(--text-hint);margin-top:2px">נותרו ${remaining} ק״ג</div>` : ""}
        </div>` : ""}
      </div>
      ${hasGoal ? `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-hint);margin-bottom:4px">
          <span>התחלה: ${startW} ק״ג</span>
          <span>${pctW}% מהדרך</span>
        </div>
        <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
          <div class="anim-bar" style="width:${pctW}%;height:100%;background:var(--accent);border-radius:3px;animation-delay:0.7s"></div>
        </div>
      </div>` : ""}
      <div style="display:flex;justify-content:space-between;align-items:center;${hasGoal?"border-top:1px solid var(--border);padding-top:10px":""}">
        <span style="font-size:11px;color:var(--text-hint)">${needsUpdate ? "לא שקלת השבוע" : "עודכן לפני " + dSinceW + " ימים"}</span>
        <button onclick="showWeightModal()" style="display:flex;align-items:center;gap:5px;background:${needsUpdate?"var(--orange)":"var(--surface)"};border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;color:${needsUpdate?"#fff":"var(--text-secondary)"};font-family:inherit;font-weight:600">
          ${needsUpdate ? "הזן משקל שבועי" : "עדכן משקל"}
        </button>
      </div>
    </div>`;
  }
  // ─────────────────────────────────────────────────────────────────

  let daysSinceCard = "";
  if (daysSince) {
    const d = daysSince.days;
    const color = d <= 2 ? "var(--green)" : d <= 3 ? "var(--orange)" : "var(--red)";
    const msg = d === 0 ? "התאמנת היום - מגיע לך לנוח" : d <= 2 ? "מחר אימון" : d <= 3 ? "קום להתאמן" : "בוא נחזור למסלול";
    const barW = Math.min(Math.round((d / 6) * 100), 100);
    const lastW = getWorkout(daysSince.session.workoutId);
    daysSinceCard = `<div class="stat-card anim-card" style="margin-bottom:16px;animation-delay:0.75s">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <div class="stat-label">מאז האימון האחרון</div>
          <div style="display:flex;align-items:baseline;gap:6px;margin-top:2px">
            <span style="font-size:36px;font-weight:700;color:${color};line-height:1"><span data-countup="${d}">0</span></span>
            <span style="font-size:14px;color:${color}">${d === 1 ? "יום" : "ימים"}</span>
          </div>
          <div style="font-size:12px;color:${color};margin-top:2px;font-weight:500">${msg}</div>
        </div>
        <div style="text-align:left">
          <div class="stat-label">אימון אחרון</div>
          <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-top:2px">${lastW?.name || ""}</div>
          <div style="font-size:11px;color:var(--text-hint);margin-top:1px">${formatDate(daysSince.session.date)}</div>
        </div>
      </div>
      <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden">
        <div class="anim-bar" style="width:${barW}%;height:100%;background:${color};border-radius:3px;animation-delay:0.75s"></div>
      </div>
    </div>`;
  }

  return `<div style="padding:16px 14px">
    ${nextBtn}

    ${weekCard}

    ${urgencyCard}
    ${daysSinceCard}

    ${weightCard}

    ${prEntries.length ? `<div class="card anim-card" style="padding:0;overflow:hidden;margin-bottom:16px;animation-delay:1.25s">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px">
        <i data-lucide="trophy" style="width:15px;height:15px;color:#d97706"></i>
        <span style="font-weight:700;font-size:14px;color:var(--text-primary)">שיאים אישיים</span>
      </div>
      ${CAT_ORDER.filter(cat => prByCategory[cat]).map((cat, ci, arr) => {
        const catData = CATEGORIES.find(c => c.id === cat);
        const catLabel = catData ? catData.label : "כללי";
        const catIcon = catData ? catData.icon : "more-horizontal";
        const entries = prByCategory[cat];
        const isLast = ci === arr.length - 1;
        return `<div style="border-bottom:${isLast?"none":"1px solid var(--border)"}">
          <div style="display:flex;align-items:center;gap:5px;padding:8px 16px 4px">
            <i data-lucide="${catIcon}" style="width:12px;height:12px;color:var(--text-hint)"></i>
            <span style="font-size:11px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:0.04em">${catLabel}</span>
          </div>
          <div style="padding:0 16px">
            ${entries.map(([name, pr]) =>
              `<div class="pr-row" onclick="showExerciseGraph(\'${name.replace(/\'/g,"\\\'")}\')">
                <span style="color:var(--text-secondary)">${name}</span>
                <div style="display:flex;align-items:center;gap:8px">
                  <span style="font-weight:700;color:var(--text-primary)">${pr.weight} ק"ג</span>
                  <span style="font-size:10px;color:var(--text-hint)">${formatDateShort(pr.date)}</span>
                  <i data-lucide="chevron-left" style="width:12px;height:12px;color:var(--text-hint)"></i>
                </div>
              </div>`).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>` : ""}
  </div>`;
}

function selectWorkoutDirect(id) {
  navigate("home");
  setTimeout(() => { selectWorkout(id); }, 50);
}

function renderChoose() {
  if (!state.workouts.length) return `<div style="padding:40px;text-align:center;color:var(--text-hint);font-size:14px">אין אימונים — הוסף דרך ניהול תוכנית</div>`;
  const cols = state.workouts.length <= 3 ? state.workouts.length : 2;
  return `<div style="padding:20px 16px">
    <p style="font-size:13px;color:var(--text-hint);margin-bottom:16px;text-align:center">איזה אימון היום?</p>
    <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:12px">
      ${state.workouts.map(w => {
        const last = getLastSession(w.id);
        return `<button class="choose-btn" onclick="selectWorkout('${w.id}')">
          <i data-lucide="dumbbell" style="width:24px;height:24px;color:var(--text-hint)"></i>
          <span style="font-size:18px;font-weight:700;color:var(--text-primary)">${w.name}</span>
          <span style="font-size:11px;color:var(--text-secondary);display:flex;align-items:center;gap:3px">
            <i data-lucide="clock" style="width:11px;height:11px"></i>
            ${last ? formatDate(last.date) : "לא בוצע עדיין"}
          </span>
          <span style="font-size:10px;color:var(--text-hint);text-align:center;line-height:1.6">${getExNames(w).join(" · ")}</span>
        </button>`;
      }).join("")}
    </div>
  </div>`;
}

function selectWorkout(id) {
  const inProgress = sessionStorage.getItem("gym_in_progress");
  if (inProgress) {
    const data = JSON.parse(inProgress);
    if (data.workoutId && data.workoutId !== id) {
      showConfirmSheet(
        "יש אימון בתהליך",
        `האם לבטל את ${getWorkout(data.workoutId)?.name || "האימון הקודם"} ולהתחיל ${getWorkout(id)?.name || ""}?`,
        "התחל חדש", "המשך קודם",
        () => { sessionStorage.removeItem("gym_in_progress"); _doSelectWorkout(id); },
        () => { _doSelectWorkout(data.workoutId); }
      );
      return;
    }
  }
  _doSelectWorkout(id);
}

function _doSelectWorkout(id) {
  haptic("medium");
  state.workoutId = id;
  const w = getWorkout(id); const last = getLastSession(id);
  const names = getExNames(w);
  state.exercises = {};
  state.workoutExtras = [];
  state.openExercise = names[0];
  names.forEach(name => {
    const prev = last?.exercises?.[name];
    state.exercises[name] = prev
      ? prev.map((s,i) => ({ num:i+1, weight:s.weight, reps:0 }))
      : [{num:1,weight:0,reps:0},{num:2,weight:0,reps:0},{num:3,weight:0,reps:0}];
  });
  render();
}

function toggleExercise(name) {
  state.openExercise = state.openExercise === name ? null : name;
  saveInProgress(); render();
}



function renderWorkout() {
  const w = getWorkout(state.workoutId);
  const names = getExNames(w);
  const last = getLastSession(state.workoutId);

  const allExtraNames = state.workoutExtras || [];
  const cards = [...names, ...allExtraNames].map(name => {
    const sets = state.exercises[name] || [];
    const prevSets = last?.exercises?.[name] || null;
    const isOpen = state.openExercise === name;
    const improved = prevSets && sets.some((s,i) => prevSets[i] && s.weight > prevSets[i].weight);
    const hasData = sets.some(s => s.reps > 0);
    const curVol = calcVolume(sets); const prevVol = prevSets ? calcVolume(prevSets) : null;
    const volDiff = prevVol && curVol > 0 ? Math.round(((curVol-prevVol)/prevVol)*100) : null;
    const isExtra = (state.workoutExtras||[]).includes(name);
    const rest = isExtra ? 0 : getExRest(w, name);

    const statusDot = hasData
      ? `<span style="width:8px;height:8px;border-radius:50%;background:${improved?"var(--green)":"#6b7280"};flex-shrink:0"></span>`
      : `<span style="width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border-med);flex-shrink:0"></span>`;

    const exCat = getExCategory(w, name) || getExCatByName(name);
    const catIconName = exCat ? getCategoryIcon(exCat) : null;
    const isCardio = exCat === "cardio";
    const header = `<div class="ex-header" onclick="toggleExercise('${name}')">
      <div style="display:flex;align-items:center;gap:9px;min-width:0">
        ${statusDot}
        ${catIconName ? `<i data-lucide="${catIconName}" style="width:13px;height:13px;color:var(--text-hint);flex-shrink:0"></i>` : ""}
        <div style="min-width:0">
          <div style="font-weight:600;font-size:14px;color:var(--text-primary)">${name}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap">
            ${(!isCardio && rest > 0) ? `<span class="rest-chip"><i data-lucide="timer" style="width:10px;height:10px"></i> ${formatRest(rest)}</span>` : ""}
            ${hasData ? `<span style="font-size:11px;color:var(--text-hint)">${sets.filter(s=>s.weight>0||s.reps>0).length} סטים</span>` : ""}
            ${volDiff !== null ? `<span class="badge ${volDiff>0?"badge-up":volDiff<0?"badge-down":"badge-eq"}" style="font-size:10px">${volDiff>0?"+":""}${volDiff}%</span>` : ""}
            ${improved ? `<span style="font-size:11px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:2px"><i data-lucide="trending-up" style="width:11px;height:11px"></i> שיפרת</span>` : ""}
          </div>
        </div>
      </div>
      <i data-lucide="${isOpen?"chevron-up":"chevron-down"}" style="width:16px;height:16px;color:var(--text-hint);flex-shrink:0"></i>
    </div>`;

    if (!isOpen) return `<div class="card ${improved&&hasData?"improved":""}">${header}</div>`;

    const setsHtml = sets.map((s,i) => {
      const p = prevSets?.[i];
      const isLast = i === sets.length - 1;
      const isFailed = !!s.failed;

      if (isCardio) {
        const prevMin = p?.minutes || null;
        return `<div style="margin-bottom:${isLast?"8px":"14px"}">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="min-width:16px;font-size:12px;color:var(--text-hint);font-weight:600">${s.num}</span>
            <div style="flex:1">
              <input class="inp" type="number" inputmode="numeric" placeholder="${prevMin ? prevMin+" דק׳" : "דקות"}" value="${s.minutes||""}"
                oninput="updateSet('${name}',${i},'minutes',this.value)"
                style="width:100%;text-align:center;font-size:15px">
            </div>
            <button onclick="removeSet('${name}',${i})" class="icon-btn"><i data-lucide="x" style="width:16px;height:16px"></i></button>
          </div>
        </div>`;
      }

      const imp = p && s.weight > p.weight; const reg = p && s.weight > 0 && s.weight < p.weight;
      const icon = s.reps > 0 && p
        ? `<span style="display:flex;align-items:center;color:${imp?"var(--green)":reg?"var(--red)":"var(--text-hint)"}">
             <i data-lucide="${imp?"trending-up":reg?"trending-down":"minus"}" style="width:14px;height:14px"></i>
           </span>`
        : `<button onclick="removeSet('${name}',${i})" class="icon-btn"><i data-lucide="x" style="width:16px;height:16px"></i></button>`;
      const failedChk = isLast ? `<label style="display:flex;align-items:center;gap:4px;margin-top:6px;cursor:pointer;font-size:11px;color:${isFailed?"var(--red)":"var(--text-hint)"}">
        <input type="checkbox" ${isFailed?"checked":""} onchange="toggleFailed('${name}',${i})" style="accent-color:var(--red);width:13px;height:13px">
        כשל
      </label>` : "";
      return `<div style="margin-bottom:${isLast?"8px":"14px"}">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="min-width:16px;font-size:12px;color:${isFailed?"var(--red)":"var(--text-hint)"};font-weight:600">${s.num}</span>
          <div style="flex:1;display:flex;gap:8px">
            <div style="flex:1">
              <input class="inp" type="number" inputmode="decimal" placeholder="${p?p.weight:"ק״ג"}" value="${s.weight||""}" style="${isFailed?"border-color:var(--red);color:var(--red)":s.weight>0?"":"color:var(--text-hint)"}" oninput="updateSet('${name}',${i},'weight',this.value)">
            </div>
            <div style="flex:1">
              <input class="inp" type="number" inputmode="numeric" placeholder="${p?p.reps+" חז׳":"חז׳"}" value="${s.reps||""}" style="${isFailed?"border-color:var(--red);color:var(--red)":""}" oninput="updateSet('${name}',${i},'reps',this.value)">
            </div>
            <div style="width:28px;display:flex;align-items:center;justify-content:center">${icon}</div>
          </div>
        </div>
        ${failedChk}
      </div>`;
    }).join("");

    const colHeaders = isCardio
      ? `<div style="display:flex;margin-bottom:12px">
          <span style="flex:0 0 24px"></span>
          <div style="flex:1;text-align:center;font-size:11px;color:var(--text-hint);font-weight:600">דקות</div>
          <span style="width:28px"></span>
        </div>`
      : `<div style="display:flex;margin-bottom:12px">
          <span style="flex:0 0 24px"></span>
          <div style="flex:1;display:flex;gap:8px">
            <span style="flex:1;text-align:center;font-size:11px;color:var(--text-hint);font-weight:600">משקל ק״ג</span>
            <span style="flex:1;text-align:center;font-size:11px;color:var(--text-hint);font-weight:600">חזרות</span>
            <span style="width:28px"></span>
          </div>
        </div>`;

    return `<div class="card ${improved&&hasData?"improved":""}">
      ${header}
      <div class="ex-body">
        ${last ? `<p style="font-size:11px;color:var(--text-hint);margin-bottom:10px;margin-top:10px;display:flex;align-items:center;gap:4px">
          <i data-lucide="clock" style="width:11px;height:11px"></i> אימון קודם: ${formatDate(last.date)}
        </p>` : ""}
        ${colHeaders}
        ${setsHtml}
        <button onclick="addSet('${name}')" style="width:100%;background:var(--surface);border:1px dashed var(--border-med);border-radius:8px;padding:8px;cursor:pointer;font-size:13px;color:var(--text-secondary);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px">
          <i data-lucide="plus" style="width:14px;height:14px"></i> ${isCardio ? "הוסף פעילות" : "הוסף סט"}
        </button>
      </div>
    </div>`;
  }).join("");

  const allNames = [...names, ...(state.workoutExtras || [])];
  const done = allNames.filter(n => state.exercises[n]?.some(s => s.reps>0||s.minutes>0)).length;

  return `<div style="padding:16px 14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <button onclick="showCancelMenu()" style="background:none;border:none;cursor:pointer;padding:6px;color:var(--text-hint);display:flex;align-items:center;border-radius:8px">
        <i data-lucide="more-horizontal" style="width:20px;height:20px"></i>
      </button>
      <span style="font-weight:600;font-size:15px;color:var(--text-primary)">${w.name}</span>
      <span style="font-size:12px;color:var(--text-hint);background:var(--surface);padding:4px 10px;border-radius:20px">${done}/${allNames.length}</span>
    </div>
    ${cards}
    <button onclick="openWorkoutExtraPicker()" style="width:100%;background:var(--surface);border:1px dashed var(--border-med);border-radius:10px;padding:9px;cursor:pointer;font-size:13px;color:var(--text-secondary);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:10px">
      <i data-lucide="plus" style="width:14px;height:14px"></i> הוסף תרגיל חד-פעמי לאימון זה
    </button>
    <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin:10px 0 8px;font-size:12px;color:var(--text-hint)">
      <i data-lucide="zap" style="width:13px;height:13px;color:var(--orange)"></i>
      <span>נפח כולל: <strong style="color:var(--text-primary)">${formatVolume(calcSessionVolume(state.exercises))}</strong></span>
    </div>
    <textarea id="workout-note-inp"
      placeholder="הערה לאימון (אופציונלי)..."
      oninput="state.workoutNote=this.value"
      style="width:100%;resize:none;height:64px;font-family:inherit;font-size:13px;color:var(--text-primary);background:var(--surface);border:1px solid var(--border-med);border-radius:10px;padding:10px 12px;outline:none;box-sizing:border-box;margin-bottom:8px;direction:rtl">${state.workoutNote||""}</textarea>
    <button class="btn-success" onclick="finishWorkout()" style="margin-top:0">
      <i data-lucide="check-circle" style="width:16px;height:16px"></i> סיום אימון
    </button>
  </div>`;
}

function updateSet(name,i,field,val) {
  const parsed = field==="weight" ? parseFloat(val)||0 : parseInt(val)||0;
  state.exercises[name][i][field] = parsed;
  saveInProgress();
}
function getExCatByName(name) {
  for (const w of state.workouts) {
    const ex = w.exercises.find(e => (typeof e==="string"?e:e.name) === name);
    if (ex?.category) return ex.category;
  }
  const lib = state.exerciseLibrary.find(e => e.name === name);
  return lib?.category || null;
}
function addSet(name) {
  const sets = state.exercises[name];
  sets.push({ num:sets.length+1, weight:0, reps:0, failed:false });
  saveInProgress(); render();
}
function removeSet(name,i) { state.exercises[name].splice(i,1); state.exercises[name].forEach((s,idx) => s.num=idx+1); saveInProgress(); render(); }
function toggleFailed(name,i) { state.exercises[name][i].failed = !state.exercises[name][i].failed; saveInProgress(); render(); }

function finishWorkout() {
  const todayIso = new Date().toISOString().slice(0,10);

  document.getElementById("finish-sheet")?.remove();
  const overlay = document.createElement("div");
  overlay.id = "finish-sheet";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;";

  const sheet = document.createElement("div");
  sheet.style.cssText = "background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;direction:rtl;animation:slideUp 0.3s cubic-bezier(0.22,1,0.36,1) both;box-sizing:border-box;position:absolute;bottom:0;left:0;right:0;";
  sheet.innerHTML = `
    <div style="font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:18px">סיום אימון</div>
    <div style="margin-bottom:16px">
      <label style="font-size:12px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px">תאריך האימון</label>
      <input type="date" id="session-date-inp" value="${todayIso}" max="${todayIso}"
        style="width:100%;font-family:inherit;font-size:14px;background:var(--surface);border:1px solid var(--border-med);border-radius:10px;padding:10px 12px;color:var(--text-primary);outline:none;box-sizing:border-box;direction:ltr;text-align:right">
    </div>
    <button id="fs-save" style="width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:7px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      שמור אימון
    </button>
    <button id="fs-cancel" style="width:100%;padding:14px;background:var(--surface);color:var(--text-secondary);border:1px solid var(--border-med);border-radius:12px;cursor:pointer;font-size:15px;font-family:inherit">המשך לערוך</button>
  `;

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if(e.target===overlay) overlay.remove(); });

  sheet.querySelector("#fs-save").addEventListener("click", () => {
    const dateVal = sheet.querySelector("#session-date-inp").value;
    const now = new Date();
    const sessionDate = dateVal ? (() => {
      const d = new Date(dateVal + "T12:00:00");
      d.setHours(now.getHours(), now.getMinutes(), now.getSeconds(), 0);
      return d.toISOString();
    })() : now.toISOString();
    overlay.remove();
    const session = { id:"s_"+Date.now(), workoutId:state.workoutId, workoutName: getWorkout(state.workoutId)?.name || "", date:sessionDate, exercises:JSON.parse(JSON.stringify(state.exercises)), note: state.workoutNote||"" };
    state.sessions.push(session);
    state.sessions.sort((a,b) => new Date(a.date) - new Date(b.date));
    sessionStorage.removeItem("gym_in_progress");
    state.workoutNote = "";
    state.workoutId = null; state.exercises = {}; state.openExercise = null; state.selectedWorkoutId = null;
    saveSessions();
    saveSessionToSupabase(session).then(() => {
      showToast("נשמר ✓");
    }).catch(() => {
      showToast("שגיאה בשמירה — נסה שוב ⚠️");
    });
    haptic("success");
    navigate("dashboard");
    setTimeout(() => showToast("כל הכבוד! האימון הושלם 💪"), 300);
  });

  sheet.querySelector("#fs-cancel").addEventListener("click", () => overlay.remove());
}

function cancelWorkout() {
  showConfirmSheet(
    "ביטול אימון",
    "האימון לא יישמר. בטוח?",
    "בטל אימון", "המשך",
    () => {
      haptic("light");
      sessionStorage.removeItem("gym_in_progress");
      state.workoutId = null; state.exercises = {}; state.openExercise = null; state.selectedWorkoutId = null;
      navigate("home");
    },
    null,
    true
  );
}

function showCancelMenu() {
  showConfirmSheet(
    "אפשרויות אימון",
    null,
    "בטל אימון", "המשך",
    () => cancelWorkout(),
    null,
    true
  );
}

function showConfirmSheet(title, subtitle, confirmLabel, cancelLabel, onConfirm, onCancel, isDanger) {
  document.getElementById("confirm-sheet")?.remove();
  const overlay = document.createElement("div");
  overlay.id = "confirm-sheet";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;display:flex;align-items:flex-end;justify-content:center";
  const sheet = document.createElement("div");
  sheet.style.cssText = "background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:420px;direction:rtl;animation:slideUp 0.3s cubic-bezier(0.22,1,0.36,1) both";
  sheet.innerHTML = `
    <div style="font-size:16px;font-weight:700;color:var(--text-primary);margin-bottom:${subtitle?"6px":"16px"}">${title}</div>
    ${subtitle ? `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:18px">${subtitle}</div>` : ""}
    <button id="cs-confirm" style="width:100%;padding:14px;background:${isDanger?"var(--red)":"var(--accent)"};color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;margin-bottom:10px">${confirmLabel}</button>
    ${cancelLabel ? `<button id="cs-cancel" style="width:100%;padding:14px;background:var(--surface);color:var(--text-secondary);border:1px solid var(--border-med);border-radius:12px;cursor:pointer;font-size:15px;font-family:inherit">${cancelLabel}</button>` : ""}
  `;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if(e.target===overlay) overlay.remove(); });
  sheet.querySelector("#cs-confirm").addEventListener("click", () => { overlay.remove(); onConfirm && onConfirm(); });
  const cancelBtn = sheet.querySelector("#cs-cancel");
  if (cancelBtn) cancelBtn.addEventListener("click", () => { overlay.remove(); onCancel && onCancel(); });
}

function renderHistory() {
  const tab = state.historyTab || "workouts";
  const tabs = `<div style="display:flex;gap:0;margin:0 14px 14px;background:var(--surface);border-radius:10px;padding:3px">
    <button onclick="state.historyTab='workouts';render()" style="flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:${tab==='workouts'?'var(--card)':'transparent'};color:${tab==='workouts'?'var(--text-primary)':'var(--text-hint)'}">אימונים</button>
    <button onclick="state.historyTab='month';render()" style="flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:${tab==='month'?'var(--card)':'transparent'};color:${tab==='month'?'var(--text-primary)':'var(--text-hint)'}">החודש שלי</button>
    <button onclick="state.historyTab='weight';render()" style="flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:${tab==='weight'?'var(--card)':'transparent'};color:${tab==='weight'?'var(--text-primary)':'var(--text-hint)'}">משקל</button>
  </div>`;

  if (tab === "month") {
    return renderMonthTab(tabs);
  }

  if (tab === "weight") {
    const logs = [...state.weightLogs].reverse();
    if (!logs.length) return `<div style="padding:0 14px">${tabs}<div style="padding:40px;text-align:center;color:var(--text-hint);font-size:14px">אין נתוני משקל עדיין</div></div>`;
    const rows = logs.map((log, ri) => {
      const prev = logs[ri + 1];
      const diff = prev ? (log.weight - prev.weight) : null;
      const diffColor = diff === null ? "" : diff < 0 ? "var(--green)" : diff > 0 ? "var(--red)" : "var(--text-hint)";
      const diffText = diff === null ? "" : `${diff > 0 ? "+" : ""}${diff.toFixed(1)} ק״ג`;
      const diffIcon = diff === null ? "" : diff < 0
        ? `<i data-lucide="trending-down" style="width:13px;height:13px;color:var(--green)"></i>`
        : diff > 0 ? `<i data-lucide="trending-up" style="width:13px;height:13px;color:var(--red)"></i>`
        : `<i data-lucide="minus" style="width:13px;height:13px;color:var(--text-hint)"></i>`;
      return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px">
        <div>
          <div style="font-size:22px;font-weight:700;color:var(--text-primary);line-height:1">${log.weight} <span style="font-size:13px;font-weight:400;color:var(--text-hint)">ק״ג</span></div>
          <div style="font-size:11px;color:var(--text-hint);margin-top:3px;display:flex;align-items:center;gap:3px">
            <i data-lucide="clock" style="width:10px;height:10px"></i> ${formatDate(log.date)}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${diff !== null ? `<div style="display:flex;align-items:center;gap:3px">${diffIcon}<span style="font-size:12px;font-weight:600;color:${diffColor}">${diffText}</span></div>` : ""}
          <button data-del-weight="${log.id}" class="del-btn">
            <i data-lucide="trash-2" style="width:15px;height:15px"></i>
          </button>
        </div>
      </div>`;
    }).join("");
    return `<div style="padding:14px 14px 0">${tabs}${rows}</div>`;
  }

  const exportBtn = `<div style="padding:0 0 10px;display:flex;justify-content:flex-start">
    <button onclick="exportCSV()" style="display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border-med);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text-secondary)">
      <i data-lucide="download" style="width:13px;height:13px"></i> ייצוא CSV
    </button>
  </div>`;

  if (!state.sessions.length) return `<div style="padding:14px">${tabs}${exportBtn}<div style="padding:30px;text-align:center;color:var(--text-hint);font-size:14px">אין אימונים עדיין</div></div>`;
  const reversed = [...state.sessions].reverse();
  if (!state.expandedSessions) state.expandedSessions = new Set();
  return `<div style="padding:14px">${tabs}${exportBtn}${reversed.map((session, ri) => {
    const originalIdx = state.sessions.length - 1 - ri;
    const w = getWorkout(session.workoutId);
    const wName = w ? w.name : (session.workoutName || session.workoutId);
    const prevSameType = state.sessions.slice(0, originalIdx).reverse().find(s => s.workoutId === session.workoutId);
    const isExpanded = state.expandedSessions.has(session.id);

    const exNames = Object.keys(session.exercises);
    const totalEx = exNames.length;
    const improved = exNames.filter(name => {
      const sets = (session.exercises[name]||[]).filter(s=>s.weight>0||s.reps>0);
      const prevSets = prevSameType?.exercises?.[name]||[];
      return prevSets.length>0 && sets.some((s,i)=>prevSets[i]&&s.weight>prevSets[i].weight);
    }).length;

    const sessionVol = calcSessionVolume(session.exercises);
    const summaryChips = `
      <span style="font-size:11px;color:var(--text-hint)">${totalEx} תרגילים</span>
      <span style="font-size:11px;color:var(--text-hint)">·</span>
      <span style="font-size:11px;color:var(--text-hint)">${formatVolume(sessionVol)}</span>
      ${improved > 0 ? `<span style="font-size:11px;color:var(--green);font-weight:600;display:inline-flex;align-items:center;gap:2px"><i data-lucide="trending-up" style="width:11px;height:11px"></i> ${improved} שיפרת</span>` : (prevSameType ? `<span style="font-size:11px;color:var(--text-hint)">ללא שינוי</span>` : "")}
    `;

    const exRows = isExpanded ? exNames.map(name => {
      const sets = (session.exercises[name]||[]).filter(s => s.weight>0||s.reps>0||s.minutes>0);
      if (!sets.length) return "";
      const prevSets = prevSameType?.exercises?.[name]||[];
      const exImproved = prevSets.length>0 && sets.some((s,i) => prevSets[i] && s.weight>prevSets[i].weight);
      const rest = w ? getExRest(w, name) : null;
      const setsTable = sets.map((s,i) => {
        const p=prevSets[i]; const imp=p&&s.weight>p.weight; const reg=p&&s.weight>0&&s.weight<p.weight;
        const failed = !!s.failed;
        if (s.minutes > 0) {
          return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0">
            <span style="min-width:14px;font-size:11px;color:var(--text-hint);font-weight:600">${s.num}</span>
            <span style="font-size:13px;color:var(--text-primary);font-weight:500">${s.minutes} דקות</span>
          </div>`;
        }
        return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0">
          <span style="min-width:14px;font-size:11px;color:${failed?"var(--red)":"var(--text-hint)"};font-weight:600">${s.num}</span>
          <span style="font-size:13px;color:${failed?"var(--red)":"var(--text-primary)"};font-weight:500;min-width:56px">${s.weight} ק״ג</span>
          <span style="font-size:13px;color:${failed?"var(--red)":"var(--text-secondary)"};min-width:44px">× ${s.reps}</span>
          ${failed ? `<span style="font-size:10px;color:var(--red);font-weight:600">כשל</span>` : p?`<i data-lucide="${imp?"trending-up":reg?"trending-down":"minus"}" style="width:13px;height:13px;color:${imp?"var(--green)":reg?"var(--red)":"var(--text-hint)"}"></i>`:""}
        </div>`;
      }).join("");
      return `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:13px;font-weight:600;color:var(--text-primary)">${name}</span>
            ${rest ? `<span class="rest-chip"><i data-lucide="timer" style="width:10px;height:10px"></i> ${formatRest(rest)}</span>` : ""}
          </div>
          ${exImproved ? `<span style="font-size:11px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:3px"><i data-lucide="trending-up" style="width:12px;height:12px"></i> שיפרת</span>` : prevSets.length>0 ? `<span style="font-size:11px;color:var(--text-hint)">ללא שינוי</span>` : ""}
        </div>
        <div style="padding-right:4px">${setsTable}</div>
      </div>`;
    }).join("") : "";

    return `<div class="card" style="padding:0;overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer" onclick="toggleHistorySession('${session.id}')">
        <div style="display:flex;align-items:center;gap:7px">
          <i data-lucide="dumbbell" style="width:16px;height:16px;color:var(--text-secondary)"></i>
          <div>
            <span style="font-weight:700;font-size:15px;color:var(--text-primary)">${wName}</span>
            <div style="display:flex;align-items:center;gap:8px;margin-top:3px">${summaryChips}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-hint);display:flex;align-items:center;gap:3px">
            <i data-lucide="clock" style="width:11px;height:11px"></i> ${formatDate(session.date)}
          </span>
          <button class="del-btn" data-del-session="${originalIdx}" onclick="event.stopPropagation()">
            <i data-lucide="trash-2" style="width:15px;height:15px"></i>
          </button>
          <i data-lucide="${isExpanded?"chevron-up":"chevron-down"}" style="width:15px;height:15px;color:var(--text-hint)"></i>
        </div>
      </div>
      ${isExpanded ? `<div style="padding:4px 16px 14px;border-top:1px solid var(--border)">

  }).join("")}</div>`;
}


function renderMonthTab(tabs) {
  const now = new Date();
  const monthNames = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

  const viewYear = state.monthViewYear ?? now.getFullYear();
  const viewMonth = state.monthViewMonth ?? now.getMonth();
  state.monthViewYear = viewYear;
  state.monthViewMonth = viewMonth;

  const monthStart = new Date(viewYear, viewMonth, 1);
  const monthEnd = new Date(viewYear, viewMonth + 1, 0);

  const sessions = state.sessions.filter(s => {
    const d = new Date(s.date);
    return d >= monthStart && d <= monthEnd;
  });

  const totalVol = sessions.reduce((t, s) => t + calcSessionVolume(s.exercises), 0);
  const totalSets = sessions.reduce((t, s) =>
    t + Object.values(s.exercises||{}).reduce((tt, sets) => tt + sets.filter(x=>x.reps>0).length, 0), 0);

  // PRs broken this month
  const allPRs = {};
  state.sessions.forEach(s => {
    const d = new Date(s.date);
    const inMonth = d >= monthStart && d <= monthEnd;
    Object.entries(s.exercises||{}).forEach(([name, sets]) => {
      const maxW = Math.max(...sets.map(x=>x.weight||0));
      if (!allPRs[name]) allPRs[name] = { before: 0, inMonth: 0 };
      if (inMonth) allPRs[name].inMonth = Math.max(allPRs[name].inMonth, maxW);
      else allPRs[name].before = Math.max(allPRs[name].before, maxW);
    });
  });
  const newPRs = Object.entries(allPRs).filter(([,v]) => v.inMonth > v.before && v.inMonth > 0).length;

  // Most improved exercise
  const improvements = {};
  sessions.forEach(s => {
    const d = new Date(s.date);
    const prevSession = state.sessions.filter(x => new Date(x.date) < monthStart && x.workoutId === s.workoutId).slice(-1)[0];
    if (!prevSession) return;
    Object.entries(s.exercises||{}).forEach(([name, sets]) => {
      const cur = Math.max(...sets.map(x=>x.weight||0));
      const prev = Math.max(...(prevSession.exercises?.[name]||[]).map(x=>x.weight||0));
      if (cur > prev) improvements[name] = (improvements[name]||0) + (cur - prev);
    });
  });
  const topEx = Object.entries(improvements).sort((a,b)=>b[1]-a[1])[0];

  // calendar grid
  const firstDow = monthStart.getDay();
  const daysInMonth = monthEnd.getDate();
  const workoutDays = new Set(sessions.map(s => new Date(s.date).getDate()));
  const dayNames = ["א","ב","ג","ד","ה","ו","ש"];
  const calCells = [];
  for (let i = 0; i < firstDow; i++) calCells.push(`<div></div>`);
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === now.getDate() && viewMonth === now.getMonth() && viewYear === now.getFullYear();
    const worked = workoutDays.has(d);
    const bg = worked ? "var(--green-bg)" : isToday ? "var(--surface)" : "transparent";
    const border = worked ? "1px solid #86efac" : isToday ? "1px solid var(--border-med)" : "none";
    const color = worked ? "var(--green)" : isToday ? "var(--text-primary)" : "var(--text-hint)";
    const fw = isToday ? "700" : "400";
    calCells.push(`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;background:${bg};border:${border};font-size:13px;color:${color};font-weight:${fw}">${d}</div>`);
  }

  const firstSession = state.sessions.length ? state.sessions[0] : null;
  const firstD = firstSession ? new Date(firstSession.date) : now;
  const firstYear = firstD.getFullYear();
  const firstMonth = firstD.getMonth();
  const isPrev = viewYear > firstYear || (viewYear === firstYear && viewMonth > firstMonth);
  const isNext = viewMonth < now.getMonth() || viewYear < now.getFullYear();

  return `<div style="padding:0 14px 16px">
    ${tabs}

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px">
      <button onclick="prevMonth()" style="background:none;border:none;cursor:pointer;padding:6px;color:${isPrev?"var(--text-primary)":"var(--border-med)"};display:flex" ${isPrev?"":"disabled"}>
        <i data-lucide="chevron-right" style="width:18px;height:18px"></i>
      </button>
      <span style="font-weight:700;font-size:15px;color:var(--text-primary)">${monthNames[viewMonth]} ${viewYear}</span>
      <button onclick="nextMonth()" style="background:none;border:none;cursor:pointer;padding:6px;color:${isNext?"var(--text-primary)":"var(--border-med)"};display:flex" ${isNext?"":"disabled"}>
        <i data-lucide="chevron-left" style="width:18px;height:18px"></i>
      </button>
    </div>

    <div class="card" style="padding:14px;margin-bottom:14px">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px">
        ${dayNames.map(d=>`<div style="text-align:center;font-size:10px;color:var(--text-hint);font-weight:600;padding:4px 0">${d}</div>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
        ${calCells.join("")}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="stat-card">
        <div class="stat-label">אימונים</div>
        <div class="stat-value">${sessions.length}</div>
        <div class="stat-sub">החודש</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">נפח כולל</div>
        <div class="stat-value" style="font-size:18px">${formatVolume(totalVol)}</div>
        <div class="stat-sub">סה״כ הורם</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">סטים</div>
        <div class="stat-value">${totalSets}</div>
        <div class="stat-sub">כולל חזרות</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">שיאים חדשים</div>
        <div class="stat-value" style="color:${newPRs>0?"var(--green)":"var(--text-primary)"}">${newPRs}</div>
        <div class="stat-sub">נשברו החודש</div>
      </div>
    </div>

    ${topEx ? `<div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:10px">
      <i data-lucide="trending-up" style="width:18px;height:18px;color:var(--green);flex-shrink:0"></i>
      <div>
        <div style="font-size:11px;color:var(--text-hint);font-weight:600">הכי השתפרת</div>
        <div style="font-size:14px;font-weight:700;color:var(--text-primary);margin-top:2px">${topEx[0]}</div>
        <div style="font-size:11px;color:var(--green)">+${topEx[1]} ק״ג מעל האימון הקודם</div>
      </div>
    </div>` : sessions.length === 0 ? `<div style="padding:30px;text-align:center;color:var(--text-hint);font-size:14px">אין אימונים בחודש זה</div>` : ""}
  </div>`;
}

function prevMonth() {
  const firstSession = state.sessions.length ? state.sessions[0] : null;
  const firstD = firstSession ? new Date(firstSession.date) : new Date();
  const firstYear = firstD.getFullYear();
  const firstMonth = firstD.getMonth();
  if (state.monthViewYear === firstYear && state.monthViewMonth <= firstMonth) return;
  if (state.monthViewMonth === 0) { state.monthViewYear--; state.monthViewMonth = 11; }
  else state.monthViewMonth--;
  render();
}
function nextMonth() {
  const now = new Date();
  if (state.monthViewYear > now.getFullYear() || (state.monthViewYear === now.getFullYear() && state.monthViewMonth >= now.getMonth())) return;
  if (state.monthViewMonth === 11) { state.monthViewYear++; state.monthViewMonth = 0; }
  else state.monthViewMonth++;
  render();
}

function toggleHistorySession(id) {
  if (!state.expandedSessions) state.expandedSessions = new Set();
  if (state.expandedSessions.has(id)) state.expandedSessions.delete(id);
  else state.expandedSessions.add(id);
  render();
}
