function changeGoalTemp(delta) {
  const thisWeekIso = getWeekStart(new Date()).toISOString().slice(0,10);
  const currentWeekGoal = getGoalForWeek(thisWeekIso);
  const base = state.pendingGoal ?? currentWeekGoal;
  const next = Math.max(1, Math.min(7, base + delta));
  state.pendingGoal = next;
  const el = document.getElementById("goal-display");
  if (el) el.textContent = next;
  render();
}

function promptSaveGoal() {
  const newGoal = state.pendingGoal;

  const thisWeekStart = getWeekStart(new Date());
  const thisWeekIso = thisWeekStart.toISOString().slice(0,10);

  const currentWeekGoal = getGoalForWeek(thisWeekIso);

  if (newGoal == null || newGoal === currentWeekGoal) return;

  const nextWeekStart = new Date(thisWeekStart.getTime() + 7 * 86400000);
  const nextWeekIso = nextWeekStart.toISOString().slice(0,10);

  showConfirmSheet(
    `עדכון יעד ל-${newGoal} אימונים`,
    "מאיזה שבוע לתחיל?",
    "החל מהשבוע הנוכחי",
    "החל משבוע הבא",
    () => { applyGoal(newGoal, thisWeekIso); },
    () => { applyGoal(newGoal, nextWeekIso); }
  );
}

function applyGoal(newGoal, fromIso) {
  const thisWeekIso = getWeekStart(new Date()).toISOString().slice(0,10);
  const currentWeekGoalBefore = getGoalForWeek(thisWeekIso);

  state.pendingGoal = null;
  if (!state.settings.goalHistory) state.settings.goalHistory = [];
  state.settings.goalHistory = state.settings.goalHistory.filter(e => e.from !== fromIso);
  state.settings.goalHistory.push({ goal: newGoal, from: fromIso });

  state.settings.weeklyGoal = fromIso <= thisWeekIso ? newGoal : currentWeekGoalBefore;

  saveSettings();
  haptic("medium");
  showToast(fromIso <= thisWeekIso ? "היעד השבועי עודכן ✓" : "היעד נשמר לשבוע הבא ✓");
  render();
}

function toggleManageOpen(id) { state.manageOpenId = state.manageOpenId===id ? null : id; state.editingNameId=null; state.editingExKey=null; render(); }
function startEditName(id) {
  state.editingNameId=id; if(state.manageOpenId!==id) state.manageOpenId=id;
  render(); setTimeout(()=>{ const inp=document.getElementById("name-inp-"+id); if(inp){inp.focus();inp.select();} },30);
}
function saveWorkoutName(id) {
  const inp=document.getElementById("name-inp-"+id); const val=inp?inp.value.trim():"";
  if(val){ const w=getWorkout(id); if(w) w.name=val; saveWorkouts(); }
  state.editingNameId=null; render();
}
function addWorkout() {
  const inp=document.getElementById("new-workout-name"); const name=inp?inp.value.trim():"";
  if(!name) return;
  state.workouts.push({id:"w_"+Date.now(), name, exercises:[]});
  state.manageOpenId=state.workouts[state.workouts.length-1].id;
  state.editingNameId=null; saveWorkouts(); render();
}
function deleteWorkout(id) {
  if(!confirm("למחוק את האימון לצמיתות?")) return;
  state.workouts=state.workouts.filter(w=>w.id!==id);
  if(state.manageOpenId===id) state.manageOpenId=null;
  saveWorkouts(); render();
}
function addExercise(workoutId) {
  const inp=document.getElementById("new-ex-"+workoutId); const val=inp?inp.value.trim():"";
  const restInp=document.getElementById("new-rest-"+workoutId);
  const rest=restInp?parseInt(restInp.value)||60:60;
  const catEl=document.getElementById("new-cat-"+workoutId);
  const category=catEl?catEl.value||null:null;
  if(!val) return; const w=getWorkout(workoutId);
  if(w){
    w.exercises.push({name:val, rest, category});
    saveWorkouts(); render();
    addToLibrary(val, category);
  }
}
function removeExercise(workoutId,i) {
  const w=getWorkout(workoutId);
  if(!w) return;
  if(w.exercises.length === 1) {
    if(confirm("אם תמחק תרגיל זה, האימון יישאר ריק. האם למחוק את האימון לגמרי?")) {
      state.workouts = state.workouts.filter(x => x.id !== workoutId);
      if(state.manageOpenId === workoutId) state.manageOpenId = null;
      saveWorkouts(); render();
    }
    return;
  }
  w.exercises.splice(i,1); saveWorkouts(); render();
}
function updateExRest(workoutId,i,val) {
  const w=getWorkout(workoutId);
  if(w && w.exercises[i]){ w.exercises[i].rest=parseInt(val)||60; saveWorkouts(); }
}
function updateExField(workoutId,i,field,val) {
  const w=getWorkout(workoutId);
  if(!w || !w.exercises[i]) return;
  if(field==="rest") w.exercises[i].rest=parseInt(val)||60;
  else if(field==="name") { if(val.trim()) w.exercises[i].name=val.trim(); }
  else if(field==="category") w.exercises[i].category=val||null;

}

function exportCSV() {
  if (!state.sessions.length) { showToast("אין נתונים לייצוא"); return; }
  const rows = [["תאריך","אימון","תרגיל","סט","משקל","חזרות","כשל"]];
  state.sessions.forEach(session => {
    const w = getWorkout(session.workoutId);
    const wName = w ? w.name : (session.workoutName || session.workoutId);
    Object.entries(session.exercises||{}).forEach(([exName, sets]) => {
      sets.forEach(s => {
        if (s.weight > 0 || s.reps > 0) {
          rows.push([
            new Date(session.date).toLocaleDateString("he-IL"),
            wName, exName, s.num, s.weight, s.reps, s.failed ? "כן" : "לא"
          ]);
        }
      });
    });
  });
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(",")).join("\n");
  const blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "gym-tracker.csv"; a.click();
  URL.revokeObjectURL(url);
  showToast("הנתונים יוצאו בהצלחה ✓");
}

let dragSrc = null;
let touchDragSrc = null;
let touchPlaceholder = null;

function bindDragDrop() {
  document.querySelectorAll(".ex-row-drag").forEach(row => {

    // ── Desktop drag ──────────────────────────────────────────────
    row.setAttribute("draggable", "true");
    row.addEventListener("dragstart", e => {
      dragSrc = row;
      row.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      dragSrc = null;
    });
    row.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
    });
    row.addEventListener("drop", e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === row) return;
      const wid = row.dataset.wid;
      const fromIdx = parseInt(dragSrc.dataset.idx);
      const toIdx = parseInt(row.dataset.idx);
      const w = getWorkout(wid);
      if (!w) return;
      const moved = w.exercises.splice(fromIdx, 1)[0];
      w.exercises.splice(toIdx, 0, moved);
      saveWorkouts(); render();
    });

    // ── Mobile touch ──────────────────────────────────────────────
    const handle = row.querySelector(".drag-handle");
    if (!handle) return;

    handle.addEventListener("touchstart", e => {
      touchDragSrc = row;
      row.classList.add("dragging");
      e.preventDefault();
    }, { passive: false });

    handle.addEventListener("touchmove", e => {
      if (!touchDragSrc) return;
      e.preventDefault();
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest(".ex-row-drag") : null;
      document.querySelectorAll(".ex-row-drag").forEach(r => r.style.borderTop = "");
      if (target && target !== touchDragSrc) {
        target.style.borderTop = "2px solid var(--accent)";
      }
    }, { passive: false });

    handle.addEventListener("touchend", e => {
      if (!touchDragSrc) return;
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest(".ex-row-drag") : null;
      document.querySelectorAll(".ex-row-drag").forEach(r => r.style.borderTop = "");
      touchDragSrc.classList.remove("dragging");
      if (target && target !== touchDragSrc) {
        const wid = target.dataset.wid;
        const fromIdx = parseInt(touchDragSrc.dataset.idx);
        const toIdx = parseInt(target.dataset.idx);
        const w = getWorkout(wid);
        if (w) {
          const moved = w.exercises.splice(fromIdx, 1)[0];
          w.exercises.splice(toIdx, 0, moved);
          saveWorkouts(); render();
        }
      }
      touchDragSrc = null;
    }, { passive: false });
  });
}


function showExerciseGraph(exName) {
  document.getElementById("ex-graph-modal")?.remove();
  const dataPoints = [];
  state.sessions.forEach(session => {
    const sets = session.exercises?.[exName];
    if (!sets || !sets.length) return;
    const maxW = Math.max(...sets.map(s => s.weight || 0));
    if (maxW > 0) dataPoints.push({ date: session.date, weight: maxW });
  });
  if (!dataPoints.length) { showToast("אין נתונים לתרגיל זה"); return; }

  const overlay = document.createElement("div");
  overlay.id = "ex-graph-modal";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:flex-end;justify-content:center";

  const maxW = Math.max(...dataPoints.map(d => d.weight));
  const minW = Math.min(...dataPoints.map(d => d.weight));
  const pad = 40; const W = 340; const H = 180; const gH = H - pad*0.8;

  const pts = dataPoints.map((d, i) => {
    const x = pad + (i / Math.max(dataPoints.length - 1, 1)) * (W - pad*1.5);
    const y = pad*0.4 + (1 - (d.weight - minW) / Math.max(maxW - minW, 1)) * gH;
    return { x, y, ...d };
  });

  const polyline = pts.map(p => `${p.x},${p.y}`).join(" ");
  const areaPath = `M${pts[0].x},${H} ` + pts.map(p=>`L${p.x},${p.y}`).join(" ") + ` L${pts[pts.length-1].x},${H} Z`;

  const dots = pts.map((p,i) => {
    const isFirst = i === 0;
    const isLast = i === pts.length - 1;
    const isPR = p.weight === maxW;
    const showLabel = isFirst || isLast || isPR || pts.length <= 6;
    const anchor = isFirst ? "start" : isLast ? "end" : "middle";
    const labelColor = isPR ? "#15803d" : "#111827";
    const labelY = p.y > 28 ? p.y - 10 : p.y + 20;
    return `
      <circle cx="${p.x}" cy="${p.y}" r="${isPR ? 5 : 4}" fill="${isPR ? "#15803d" : "#111827"}" stroke="#fff" stroke-width="2"/>
      ${showLabel ? `<text x="${p.x}" y="${labelY}" text-anchor="${anchor}" font-size="11" font-weight="700" fill="${labelColor}">${p.weight}</text>` : ""}
    `;
  }).join("");

  const labels = pts.filter((_,i) => i===0 || i===pts.length-1 || pts.length<=5).map(p =>
    `<text x="${p.x}" y="${H+14}" text-anchor="middle" font-size="10" fill="#9ca3af">${new Date(p.date).toLocaleDateString("he-IL",{day:"numeric",month:"numeric"})}</text>`
  ).join("");

  const sheet = document.createElement("div");
  sheet.style.cssText = "background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:420px;direction:rtl;animation:slideUp 0.3s cubic-bezier(0.22,1,0.36,1) both";
  sheet.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div style="font-size:16px;font-weight:700;color:var(--text-primary)">${exName}</div>
        <div style="font-size:12px;color:var(--text-hint);margin-top:2px">שיא: ${maxW} ק"ג · ${dataPoints.length} אימונים</div>
      </div>
      <button onclick="document.getElementById('ex-graph-modal').remove()" style="background:var(--surface);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--text-hint);display:flex;align-items:center;justify-content:center">×</button>
    </div>
    <svg viewBox="0 0 ${W} ${H+20}" width="100%" style="overflow:visible">
      <defs>
        <linearGradient id="gfill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#111827" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#gfill)"/>
      <polyline points="${polyline}" fill="none" stroke="#111827" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
      ${labels}
    </svg>
  `;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if(e.target===overlay) overlay.remove(); });
}

      : `<div style="padding:20px;text-align:center;color:var(--text-hint);font-size:13px">לא נמצא — הוסף תרגיל חדש</div>`;
    bindPickerItems(list, workoutId);
  });

  bindPickerItems(sheet.querySelector("#ex-picker-list"), workoutId);
}

function bindPickerItems(container, workoutId) {
  container.querySelectorAll(".ex-pick-item").forEach(item => {
    item.addEventListener("click", () => {
      const name = item.dataset.name;
      const category = item.dataset.cat || null;
      if (category === "cardio") {
        // קרדיו — הוסף ישירות ללא מנוחה
        const w = getWorkout(workoutId);
        if (w) { w.exercises.push({ name, rest: 0, category }); saveWorkouts(); }
        document.getElementById("ex-picker-modal")?.remove();
        render();
      } else {
        openRestPicker(workoutId, name, category);
      }
    });
    item.addEventListener("mouseenter", () => item.style.background = "var(--surface)");
    item.addEventListener("mouseleave", () => item.style.background = "");
  });
}

function openRestPicker(workoutId, name, category) {
  document.getElementById("ex-picker-modal")?.remove();
  const overlay = document.createElement("div");
  overlay.id = "ex-picker-modal";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:flex-end;justify-content:center";
  const catData = CATEGORIES.find(c => c.id === category);
  const catLabel = catData ? catData.label : "";
  const sheet = document.createElement("div");
  sheet.style.cssText = "background:var(--card);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:420px;direction:rtl;animation:slideUp 0.3s cubic-bezier(0.22,1,0.36,1) both";
  sheet.innerHTML = `
    <div style="font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:4px">${name}</div>
    ${catLabel ? `<div style="font-size:12px;color:var(--text-hint);margin-bottom:18px">${catLabel}</div>` : `<div style="margin-bottom:18px"></div>`}
    <label style="font-size:12px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:8px">זמן מנוחה (שניות)</label>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <button onclick="adjustRest(-15)" style="width:36px;height:36px;background:var(--surface);border:1px solid var(--border-med);border-radius:8px;cursor:pointer;font-size:18px;color:var(--text-primary);font-family:inherit">−</button>
      <span id="rest-val-display" style="font-size:22px;font-weight:700;color:var(--text-primary);min-width:60px;text-align:center">60</span>
      <button onclick="adjustRest(15)" style="width:36px;height:36px;background:var(--surface);border:1px solid var(--border-med);border-radius:8px;cursor:pointer;font-size:18px;color:var(--text-primary);font-family:inherit">+</button>
      <span style="font-size:13px;color:var(--text-hint)">שנ׳</span>
    </div>
    <button id="rest-confirm-btn" style="width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit">הוסף לאימון</button>
  `;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if(e.target===overlay) overlay.remove(); });

  let restVal = 60;
  window._pickerRestVal = restVal;
  window.adjustRest = (delta) => {
    window._pickerRestVal = Math.max(15, Math.min(600, window._pickerRestVal + delta));
    sheet.querySelector("#rest-val-display").textContent = window._pickerRestVal;
  };
  sheet.querySelector("#rest-confirm-btn").addEventListener("click", () => {
    const w = getWorkout(workoutId);
    if (w) { w.exercises.push({ name, rest: window._pickerRestVal, category: category||null }); saveWorkouts(); }
    overlay.remove();
    render();
  });
}

// ─── ניהול מאגר ───
function renderLibraryManager() {
  const byCategory = {};
  const CAT_ORDER_LIB = ["chest","back","shoulders","arms","legs","core","cardio"];
  state.exerciseLibrary.forEach(ex => {
    const cat = ex.category || null;
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(ex);
  });

  if (!state.exerciseLibrary.length) return `<div style="padding:20px;text-align:center;color:var(--text-hint);font-size:13px">המאגר ריק</div>`;

  return CAT_ORDER_LIB.filter(cat => byCategory[cat]).map(cat => {
    const catData = CATEGORIES.find(c => c.id === cat);
    const catLabel = catData ? catData.label : "כללי";
    const catIcon = catData ? catData.icon : "more-horizontal";
    return `<div style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:5px;padding:6px 2px 4px">
        <i data-lucide="${catIcon}" style="width:12px;height:12px;color:var(--text-hint)"></i>
        <span style="font-size:11px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:0.04em">${catLabel}</span>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        ${byCategory[cat].map((ex,i,arr) => `
          <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:${i<arr.length-1?"1px solid var(--border)":"none"}">
            <span style="flex:1;font-size:13px;color:var(--text-primary)">${ex.name}</span>
            <button onclick="openLibraryEdit('${ex.id}','${ex.name.replace(/'/g,"\'")}','${ex.category||""}')"
              class="icon-btn"><i data-lucide="pencil" style="width:13px;height:13px"></i></button>
            <button onclick="if(confirm('למחוק מהמאגר?'))deleteFromLibrary('${ex.id}')"
              class="icon-btn" style="color:var(--red)"><i data-lucide="trash-2" style="width:13px;height:13px"></i></button>
          </div>`).join("")}
      </div>
    </div>`;
  }).join("");
}

function bindWorkoutDragDrop() {
  let dragSrcW = null, touchDragSrcW = null;
  document.querySelectorAll(".workout-drag").forEach(card => {
    card.addEventListener("dragstart", e => {
      dragSrcW = card; card.classList.add("dragging"); e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => { card.classList.remove("dragging"); dragSrcW = null; });
    card.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; });
    card.addEventListener("drop", e => {
      e.preventDefault();
      if (!dragSrcW || dragSrcW === card) return;
      const fromIdx = parseInt(dragSrcW.dataset.widx);
      const toIdx = parseInt(card.dataset.widx);
      const moved = state.workouts.splice(fromIdx, 1)[0];
      state.workouts.splice(toIdx, 0, moved);
      saveWorkouts(); render();
    });

    const handle = card.querySelector(".workout-drag-handle");
    if (!handle) return;
    handle.addEventListener("touchstart", e => {
      touchDragSrcW = card; card.classList.add("dragging"); e.stopPropagation();
    }, { passive: true });
    handle.addEventListener("touchmove", e => {
      if (!touchDragSrcW) return;
      e.preventDefault();
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest(".workout-drag") : null;
      document.querySelectorAll(".workout-drag").forEach(c => c.style.borderTop = "");
      if (target && target !== touchDragSrcW) target.style.borderTop = "2px solid var(--accent)";
    }, { passive: false });
    handle.addEventListener("touchend", e => {
      if (!touchDragSrcW) return;
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest(".workout-drag") : null;
      document.querySelectorAll(".workout-drag").forEach(c => c.style.borderTop = "");
      touchDragSrcW.classList.remove("dragging");
      if (target && target !== touchDragSrcW) {
        const fromIdx = parseInt(touchDragSrcW.dataset.widx);
        const toIdx = parseInt(target.dataset.widx);
        const moved = state.workouts.splice(fromIdx, 1)[0];
        state.workouts.splice(toIdx, 0, moved);
        saveWorkouts(); render();
      }
      touchDragSrcW = null;
    }, { passive: false });
  });
}

window.addEventListener("load", async function() {
  state.screen = "dashboard";
  const loader = document.getElementById("app-loader");
  await Promise.all([loadSessionsFromSupabase(), loadWeightData(), loadWorkoutsFromSupabase(), loadSettingsFromSupabase(), loadExerciseLibrary()]);
  if (loader) {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 350);
  }
  render();
});
