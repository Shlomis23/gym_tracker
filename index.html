// ── Supabase ─────────────────────────────────────────────────────
const APP_BUILD = "2026-03-23-audit-2";
const DEBUG = localStorage.getItem("gym_debug") === "1";
const ALLOW_EMPTY_WORKOUT_SYNC = false;
const dlog = (...args) => { if (DEBUG) console.debug(...args); };
const dinfo = (...args) => { if (DEBUG) console.info(...args); };
dinfo("[GymBuddy] build:", APP_BUILD, "supabase:", SUPABASE_URL);
window.__GYMBUDDY_BUILD__ = APP_BUILD;
const STORAGE_USER_ID = "gym_user_id_v1";

function ensureUserId() {
  if (state.userId) return state.userId;
  const saved = localStorage.getItem(STORAGE_USER_ID);
  if (saved) {
    state.userId = saved;
    return saved;
  }
  const generated = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : ("uid-" + Date.now());
  state.userId = generated;
  localStorage.setItem(STORAGE_USER_ID, generated);
  return generated;
}

function requireUserIdOrThrow(contextLabel) {
  const userId = ensureUserId();
  if (!userId || typeof userId !== "string" || !userId.trim()) {
    throw new Error(`${contextLabel}: missing user_id`);
  }
  return userId;
}

function setDataSource(key, source) {
  if (!state.syncStatus) return;
  state.syncStatus.dataSource[key] = source;
}
function setSyncError(message) {
  if (!state.syncStatus) return;
  state.syncStatus.lastError = message;
}
function clearSyncError() {
  if (!state.syncStatus) return;
  state.syncStatus.lastError = null;
}
function renderSyncNotice() {
  const status = state.syncStatus || {};
  const localSources = Object.entries(status.dataSource || {})
    .filter(([, src]) => src === "local")
    .map(([k]) => k);
  const fallbackLine = localSources.length
    ? `<div style="font-size:11px;color:var(--orange)">מציג נתונים מקומיים: ${localSources.join(", ")}</div>`
    : "";
  const errorLine = status.lastError
    ? `<div style="font-size:11px;color:var(--red);margin-top:${fallbackLine ? "4px" : "0"}">${escapeHtml(status.lastError)}</div>`
    : "";
  if (!fallbackLine && !errorLine) return "";
  return `<div style="margin:10px 14px 0;padding:8px 10px;border-radius:10px;background:var(--surface);border:1px solid var(--border-med)">${fallbackLine}${errorLine}</div>`;
}

async function sbGet(path) {
  const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, { headers: SB_HEADERS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPost(path, body) {
  const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, { method:"POST", headers: SB_HEADERS, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPatch(path, body) {
  const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, { method:"PATCH", headers: SB_HEADERS, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbDelete(path) {
  const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, { method:"DELETE", headers: SB_HEADERS });
  if (!r.ok) throw new Error(await r.text());
}
// ─────────────────────────────────────────────────────────────────

function getGoalForWeek(weekStartIso) {
  const history = state.settings.goalHistory || [];
  const sorted = [...history].sort((a,b) => a.from > b.from ? -1 : 1);
  const entry = sorted.find(e => e.from <= weekStartIso);
  return entry ? entry.goal : (state.settings.weeklyGoal || 4);
}

try { state.sessions = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || "[]"); } catch {}

function saveSessions() { localStorage.setItem(STORAGE_SESSIONS, JSON.stringify(state.sessions)); }

async function saveSessionToSupabase(session) {
  try {
    const userId = requireUserIdOrThrow("saveSessionToSupabase");
    const rows = await sbPost("workout_sessions", {
      user_id: userId,
      local_id: session.id,
      workout_id: session.workoutId,
      workout_name: getWorkout(session.workoutId)?.name || session.workoutId,
      date: session.date,
      note: session.note || ""
    });
    if (!Array.isArray(rows) || !rows.length || !rows[0]?.id) {
      throw new Error("Invalid workout_sessions write response");
    }
    const sessionRow = rows[0];
    const sets = [];
    Object.entries(session.exercises || {}).forEach(([exName, exSets]) => {
      exSets.forEach(s => {
        if (s.weight > 0 || s.reps > 0) {
          sets.push({ user_id: userId, session_id: sessionRow.id, exercise_name: exName, set_number: s.num, weight: s.weight, reps: s.reps, failed: !!s.failed });
        }
      });
    });
    if (sets.length) await sbPost("session_exercises", sets);
    clearSyncError();
  } catch(e) {
    console.error("Supabase save failed:", e);
    setSyncError("האימון נשמר מקומית בלבד (סנכרון לענן נכשל)");
    throw e;
  }
}

async function loadSessionsFromSupabase() {
  try {
    const sessionQuery = "workout_sessions?select=*,sets:session_exercises(*),session_exercises(*)&order=date.asc";
    const rowsWithEmbed = await sbGet(sessionQuery);
    dlog("[loadSessionsFromSupabase] workout_sessions (embedded sets) raw response:", rowsWithEmbed);

    const rows = Array.isArray(rowsWithEmbed) ? rowsWithEmbed : [];
    let exerciseRows = [];
    try {
      exerciseRows = await sbGet("session_exercises?select=*");
    } catch (exerciseLoadErr) {
      if (DEBUG) console.warn("Supabase session_exercises standalone fetch failed, using embedded relation only:", exerciseLoadErr);
    }
    dlog("[loadSessionsFromSupabase] workout_sessions raw response:", rows);
    dlog("[loadSessionsFromSupabase] session_exercises raw response:", exerciseRows);

    const setsBySessionId = new Map();
    const getSetSessionKey = s => String(
      s.session_id ??
      s.workout_session_id ??
      s.workout_session ??
      s.session_local_id ??
      s.local_session_id ??
      ""
    );

    (exerciseRows || []).forEach(s => {
      const key = getSetSessionKey(s);
      if (!key) return;
      if (!setsBySessionId.has(key)) setsBySessionId.set(key, []);
      setsBySessionId.get(key).push(s);
    });

    const sessionIdSet = new Set(rows.map(r => String(r.id ?? "")).filter(Boolean));
    const sessionLocalIdSet = new Set(rows.map(r => String(r.local_id ?? "")).filter(Boolean));
    const unmatchedSessionExerciseRows = (exerciseRows || []).filter(s => {
      const sid = getSetSessionKey(s);
      if (!sid) return false;
      return !sessionIdSet.has(sid) && !sessionLocalIdSet.has(sid);
    });
    if (unmatchedSessionExerciseRows.length) {
      console.warn("[loadSessionsFromSupabase] Found session_exercises rows with non-matching FK (session_id/workout_session_id):", unmatchedSessionExerciseRows);
    }

    const hasUserIdFilter = /user_id=eq\./.test(sessionQuery);
    dlog("[loadSessionsFromSupabase] user_id filter in query:", hasUserIdFilter);

    const normalizeSet = s => ({
      num: Number(s.set_number ?? s.set_no ?? s.set_index ?? s.num ?? 0),
      weight: Number(s.weight ?? 0),
      reps: Number(s.reps ?? 0),
      failed: !!s.failed,
      minutes: Number(s.minutes ?? 0)
    });

    state.sessions = rows.map(row => {
      const exercises = {};
      const rowKeys = [row.id, row.local_id].filter(Boolean).map(v => String(v));
      const standaloneSets = rowKeys.flatMap(k => setsBySessionId.get(k) || []);
      const rowSets = [
        ...(Array.isArray(row.sets) ? row.sets : []),
        ...(Array.isArray(row.session_exercises) ? row.session_exercises : []),
        ...standaloneSets
      ];
      const uniqueSetMap = new Map();
      rowSets.forEach(s => {
        const dedupeKey = String(s.id ?? `${getSetSessionKey(s)}|${s.exercise_name ?? s.exercise?.name ?? s.exercise ?? s.name ?? ""}|${s.set_number ?? s.set_no ?? s.set_index ?? s.num ?? ""}|${s.weight ?? ""}|${s.reps ?? ""}|${s.minutes ?? ""}`);
        if (!uniqueSetMap.has(dedupeKey)) uniqueSetMap.set(dedupeKey, s);
      });

      [...uniqueSetMap.values()].forEach(rawSet => {
        const exName = rawSet.exercise_name ?? rawSet.exercise?.name ?? rawSet.exercise ?? rawSet.name;
        if (!exName) return;
        if (!exercises[exName]) exercises[exName] = [];
        exercises[exName].push(normalizeSet(rawSet));
      });
      Object.values(exercises).forEach(arr => arr.sort((a,b) => a.num - b.num));
      return { id: row.local_id || row.id, workoutId: row.workout_id, workoutName: row.workout_name || "", date: row.date, exercises, note: row.note || "" };
    });
    const sessionsWithoutExercises = state.sessions.filter(s => !Object.keys(s.exercises || {}).length).length;
    if (state.sessions.length && sessionsWithoutExercises === state.sessions.length) {
      console.warn("[loadSessionsFromSupabase] Sessions loaded but no exercise rows were mapped.");
    }
    localStorage.setItem(STORAGE_SESSIONS, JSON.stringify(state.sessions));
    setDataSource("sessions", "supabase");
  } catch(e) {
    console.error("Supabase load failed, using localStorage:", e);
    try { state.sessions = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || "[]"); } catch {}
    setDataSource("sessions", "local");
    setSyncError("טעינת אימונים מהענן נכשלה — מוצגים נתונים מקומיים");
  }
}

async function runRuntimeDataAudit() {
  if (!DEBUG) return;
  try {
    const [sessionsWithEmbed, standaloneSets, goals] = await Promise.all([
      sbGet("workout_sessions?select=*,sets:session_exercises(*)&order=date.asc"),
      sbGet("session_exercises?select=*"),
      sbGet("weight_goal?select=*&order=updated_at.desc&limit=1")
    ]);

    const sessionRows = Array.isArray(sessionsWithEmbed) ? sessionsWithEmbed : [];
    const hasSetsProp = sessionRows.some(r => Object.prototype.hasOwnProperty.call(r, "sets"));
    const embeddedSetCount = sessionRows.reduce((n, r) => n + (Array.isArray(r.sets) ? r.sets.length : 0), 0);
    const setRows = Array.isArray(standaloneSets) ? standaloneSets : [];

    const sessionKeys = new Set(
      sessionRows
        .flatMap(r => [r.id, r.local_id])
        .filter(Boolean)
        .map(v => String(v))
    );
    const matchedStandalone = setRows.filter(s => {
      const key = String(
        s.session_id ??
        s.workout_session_id ??
        s.workout_session ??
        s.session_local_id ??
        s.local_session_id ??
        ""
      );
      return key && sessionKeys.has(key);
    }).length;
    const orphanStandalone = setRows.length - matchedStandalone;

    const goalRows = Array.isArray(goals) ? goals : (goals ? [goals] : []);
    const goalParsed = goalRows[0] ? getWeightGoalValues(goalRows[0]) : { hasGoal: false, start: NaN, target: NaN };

    console.info("[runtime-audit]", {
      build: APP_BUILD,
      supabaseUrl: SUPABASE_URL,
      sessionsCount: sessionRows.length,
      hasSetsProp,
      embeddedSetCount,
      standaloneSetCount: setRows.length,
      matchedStandalone,
      orphanStandalone,
      weightGoalRows: goalRows.length,
      weightGoalParsed: goalParsed,
      prsFromStateCount: Object.keys(getPRs?.() || {}).length
    });
  } catch (err) {
    console.warn("[runtime-audit] failed:", err);
  }
}

async function deleteSessionFromSupabase(localId) {
  try {
    await sbDelete("workout_sessions?local_id=eq." + encodeURIComponent(localId));
  } catch(e) {
    console.error("Supabase delete failed:", e);
  }
}

async function loadWeightData() {
  try {
    const logs = await sbGet("body_weight_logs?select=*&order=measured_at.asc");
    dlog("[loadWeightData] body_weight_logs raw response:", logs);
    const knownUserId = (logs || []).find(l => l.user_id)?.user_id;
    if (knownUserId) {
      state.userId = knownUserId;
      localStorage.setItem(STORAGE_USER_ID, knownUserId);
    } else {
      ensureUserId();
    }
    state.weightLogs = (logs || []).map(mapWeightLog);
    const goalsRaw = await sbGet("weight_goal?select=*&order=updated_at.desc&limit=1");
    dlog("[loadWeightData] weight_goal raw response:", goalsRaw);
    const goalRows = Array.isArray(goalsRaw) ? goalsRaw : (goalsRaw ? [goalsRaw] : []);
    const goalUserId = goalRows.find(g => g.user_id)?.user_id;
    if (!state.userId && goalUserId) {
      state.userId = goalUserId;
      localStorage.setItem(STORAGE_USER_ID, goalUserId);
    }
    const normalizedGoals = goalRows.map(g => ({
      ...g,
      start_weight: g.start_weight ?? g.startWeight ?? g.starting_weight ?? null,
      goal_weight: g.goal_weight ?? g.goalWeight ?? g.target_weight ?? null
    }));
    const validGoal = normalizedGoals.find(g => getWeightGoalValues(g).hasGoal);
    if (validGoal) state.weightGoal = validGoal;
    else if (goalRows.length) console.warn("[loadWeightData] weight_goal row exists but could not be parsed:", goalRows[0]);
    setDataSource("weight", "supabase");
  } catch(e) { console.error("Weight load failed:", e); setDataSource("weight", "local"); setSyncError("טעינת נתוני משקל מהענן נכשלה"); }
}

function mapWeightLog(log) {
  return {
    id: log.id,
    user_id: log.user_id || null,
    weight: Number(log.weight),
    measured_at: log.measured_at || log.date || new Date().toISOString(),
    measured_date: log.measured_date || (log.date ? log.date.slice(0, 10) : new Date().toISOString().slice(0,10)),
    note: log.note || ""
  };
}

function getWeightLogsAsc() {
  return [...state.weightLogs]
    .map(mapWeightLog)
    .sort((a, b) => new Date(a.measured_at) - new Date(b.measured_at));
}

function formatWeightDate(log) {
  return formatDate(log.measured_at || log.date);
}

function getWeightGoalValues(goal) {
  const g = goal || state.weightGoal || {};
  const pickNumber = keys => {
    for (const key of keys) {
      const raw = g[key] ?? g?.goal?.[key] ?? null;
      if (raw === null || raw === undefined || raw === "") continue;
      const num = Number(String(raw).replace(",", "."));
      if (Number.isFinite(num)) return num;
    }
    return NaN;
  };

  const start = pickNumber(["start_weight", "startWeight", "starting_weight", "start", "initial_weight"]);
  const target = pickNumber(["goal_weight", "goalWeight", "target_weight", "target", "goal"]);
  return { start, target, hasGoal: Number.isFinite(start) && Number.isFinite(target) };
}

function hasWeightGoal(goal) {
  return getWeightGoalValues(goal).hasGoal;
}

function isoDateFromLocal(dateLike) {
  const dt = new Date(dateLike);
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, "0");
  const d = String(dt.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function buildDateSelector(prefix, isoDate) {
  const [yStr, mStr, dStr] = (isoDate || isoDateFromLocal(new Date())).split("-");
  const year = parseInt(yStr, 10);
  const month = parseInt(mStr, 10);
  const day = parseInt(dStr, 10);
  const currentYear = new Date().getFullYear();

  const yearOptions = Array.from({ length: 8 }, (_, i) => currentYear - i)
    .map(y => `<option value="${y}" ${y === year ? "selected" : ""}>${y}</option>`)
    .join("");
  const monthOptions = Array.from({ length: 12 }, (_, i) => i + 1)
    .map(m => `<option value="${m}" ${m === month ? "selected" : ""}>${m}</option>`)
    .join("");
  const maxDays = new Date(year, month, 0).getDate();
  const dayOptions = Array.from({ length: maxDays }, (_, i) => i + 1)
    .map(d => `<option value="${d}" ${d === day ? "selected" : ""}>${d}</option>`)
    .join("");

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <select id="${prefix}-day" style="width:100%;box-sizing:border-box;padding:10px;border:1px solid var(--border-med);border-radius:10px;background:var(--card);font-family:inherit">${dayOptions}</select>
      <select id="${prefix}-month" style="width:100%;box-sizing:border-box;padding:10px;border:1px solid var(--border-med);border-radius:10px;background:var(--card);font-family:inherit">${monthOptions}</select>
      <select id="${prefix}-year" style="width:100%;box-sizing:border-box;padding:10px;border:1px solid var(--border-med);border-radius:10px;background:var(--card);font-family:inherit">${yearOptions}</select>
    </div>
  `;
}

function readIsoDateFromSelector(container, prefix) {
  const day = parseInt(container.querySelector(`#${prefix}-day`)?.value || "", 10);
  const month = parseInt(container.querySelector(`#${prefix}-month`)?.value || "", 10);
  const year = parseInt(container.querySelector(`#${prefix}-year`)?.value || "", 10);
  if (!day || !month || !year) return null;
  const maxDays = new Date(year, month, 0).getDate();
  const normalizedDay = Math.min(day, maxDays);
  return `${year}-${String(month).padStart(2, "0")}-${String(normalizedDay).padStart(2, "0")}`;
}

async function saveWeightLog(weight, measuredAtIso, note) {
  try {
    const userId = ensureUserId();
    const measuredAt = measuredAtIso || new Date().toISOString();
    const path = "body_weight_logs?on_conflict=user_id,measured_date";
    const headers = { ...SB_HEADERS, Prefer: "return=representation,resolution=merge-duplicates" };
    const payload = [{
      user_id: userId,
      weight,
      measured_at: measuredAt,
      note: note || ""
    }];
    const r = await fetch(SUPABASE_URL + "/rest/v1/" + path, {
      method: "POST",
      headers,
      body: JSON.stringify(payload)
    });
    if (!r.ok) throw new Error(await r.text());
    const rows = await r.json();
    if (!Array.isArray(rows) || !rows.length) throw new Error("Invalid body_weight_logs write response");
    const saved = mapWeightLog(rows[0]);
    const idx = state.weightLogs.findIndex(l => l.id === saved.id);
    if (idx >= 0) state.weightLogs[idx] = saved;
    else state.weightLogs.push(saved);
    state.weightLogs = getWeightLogsAsc();
    clearSyncError();
    showToast("המשקל נשמר ✓");
    return saved;
  } catch(e) { console.error("Weight save failed:", e); showToast("שגיאה בשמירת משקל ⚠️"); throw e; }
}

async function updateWeightLog(id, weight, measuredAtIso, note) {
  try {
    const rows = await sbPatch("body_weight_logs?id=eq." + encodeURIComponent(id), {
      weight,
      measured_at: measuredAtIso,
      note: note || ""
    });
    if (!rows || !rows.length) throw new Error("No row returned after update");
    const updated = mapWeightLog(rows[0]);
    const idx = state.weightLogs.findIndex(l => l.id === id);
    if (idx >= 0) state.weightLogs[idx] = updated;
    state.weightLogs = getWeightLogsAsc();
    showToast("השקילה עודכנה ✓");
    return updated;
  } catch(e) {
    console.error("Weight update failed:", e);
    showToast("שגיאה בעדכון שקילה ⚠️");
    throw e;
  }
}

async function saveWeightGoal(startWeight, goalWeight) {
  try {
    const userId = ensureUserId();
    await sbDelete("weight_goal?user_id=eq." + encodeURIComponent(userId));
    const row = await sbPost("weight_goal", { user_id: userId, start_weight: startWeight, goal_weight: goalWeight });
    if (!Array.isArray(row) || !row.length) throw new Error("Invalid weight_goal write response");
    state.weightGoal = row[0];
    clearSyncError();
  } catch(e) { console.error("Weight goal save failed:", e); showToast("שגיאה בשמירת יעד"); throw e; }
}

async function deleteWeightLog(id) {
  try {
    await sbDelete("body_weight_logs?id=eq." + id);
    state.weightLogs = state.weightLogs.filter(l => l.id !== id);
    if (!state.weightLogs.length) {
      state.weightGoal = { start_weight: null, goal_weight: null };
    }
    render();

function getLatestWeight() {
  const logs = getWeightLogsAsc();
  if (!logs.length) return null;
  return logs[logs.length - 1];
}

function getPrevWeight() {
  const logs = getWeightLogsAsc();
  if (logs.length < 2) return null;
  return logs[logs.length - 2];
}

function daysSinceWeight() {
  const latest = getLatestWeight();
  if (!latest) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const latestDay = new Date(latest.measured_at); latestDay.setHours(0,0,0,0);
  return Math.round((today - latestDay) / (1000 * 60 * 60 * 24));
}

async function saveWorkoutsToSupabase() {
  try {
    const userId = requireUserIdOrThrow("saveWorkoutsToSupabase");
    const rows = state.workouts.map((w, i) => ({
      user_id: userId,
      plan_id: w.id,
      name: w.name,
      exercises: w.exercises,
      sort_order: i
    }));
    if (!rows.length) {
      if (!ALLOW_EMPTY_WORKOUT_SYNC) {
        setSyncError("נחסמה מחיקה גורפת של תוכניות בענן (ALLOW_EMPTY_WORKOUT_SYNC=false)");
        showToast("המחיקה בענן נחסמה להגנה על הנתונים ⚠️");
        return;
      }
    } else {
      await sbPost("workout_plans?on_conflict=plan_id", rows);
    }

    const remoteRows = await sbGet("workout_plans?select=plan_id,user_id");
    const localIds = new Set(rows.map(r => String(r.plan_id)));
    const staleRemoteIds = (remoteRows || [])
      .filter(r => String(r.user_id || "") === String(userId))
      .map(r => String(r.plan_id))
      .filter(id => id && !localIds.has(id));

    if (staleRemoteIds.length) {
      console.warn("[saveWorkoutsToSupabase] deleting stale workout plans:", staleRemoteIds);
      for (const staleId of staleRemoteIds) {
        await sbDelete("workout_plans?user_id=eq." + encodeURIComponent(userId) + "&plan_id=eq." + encodeURIComponent(staleId));
      }
    }
    showToast("התוכנית נשמרה ✓");
    clearSyncError();
  } catch(e) { console.error("Workout plan save failed:", e); setSyncError("שמירת תוכנית לענן נכשלה"); showToast("שגיאה בשמירת התוכנית ⚠️"); }
}

async function loadWorkoutsFromSupabase() {
  const fetchWorkoutRows = async (path, diagLabel) => {
    const res = await fetch(SUPABASE_URL + "/rest/v1/" + path, { headers: SB_HEADERS });
    const rawText = await res.text();
    dlog("[loadWorkoutsFromSupabase]", diagLabel, "status:", res.status, "body:", rawText);
    if (!res.ok) throw new Error(`${diagLabel} failed (${res.status}): ${rawText}`);
    if (!rawText) return [];
    try {
      return JSON.parse(rawText);
    } catch (parseErr) {
      throw new Error(`${diagLabel} parse failed: ${parseErr.message}`);
    }
  };

  try {
    let rows;
    let fallbackReason = "";
    try {
      rows = await fetchWorkoutRows("workout_plans?select=*&order=sort_order.asc", "ordered_fetch");
    } catch (orderedErr) {
      const orderedMsg = String(orderedErr?.message || orderedErr);
      if (orderedMsg.includes("sort_order")) {
        fallbackReason = "sort_order_missing_or_invalid";
        console.warn("[loadWorkoutsFromSupabase] ordered query failed, retrying without order:", orderedMsg);
        rows = await fetchWorkoutRows("workout_plans?select=*", "unordered_fetch");
      } else {
        throw orderedErr;
      }
    }

    const rowsArray = Array.isArray(rows) ? rows : (rows ? [rows] : []);
    dlog("[loadWorkoutsFromSupabase] parsed rows:", rowsArray.length, "fallbackReason:", fallbackReason || "none");
    if (rowsArray.length) {
      // תמיד החלף את כל ה-state — אל תצרף
      const normalized = rowsArray.map((r, idx) => {
        const id = r.plan_id ?? r.id ?? r.workout_id ?? null;
        if (!id) return null;
        const rawName = (r.name ?? r.workout_name ?? "").toString().trim();
        return {
          id: String(id),
          name: rawName || `אימון ${idx + 1}`,
          exercises: Array.isArray(r.exercises) ? r.exercises : []
        };
      }).filter(Boolean);

      if (normalized.length) {
        state.workouts = normalized;
        localStorage.setItem(STORAGE_WORKOUTS, JSON.stringify(state.workouts));
        setDataSource("workouts", "supabase");
      } else {
        // הגיעו rows אבל בלי מזהה תקין — אל תדרוס state קיים
        if (!state.workouts?.length) state.workouts = JSON.parse(JSON.stringify(DEFAULT_WORKOUTS));
        setDataSource("workouts", "local");
        setSyncError("תוכניות בענן בפורמט לא תקין — מוצגות תוכניות מקומיות");
      }
    } else {
      // Supabase ריק — השאר נתונים מקומיים קיימים כדי לא להעלים את רשימת האימונים
      if (!state.workouts?.length) {
        state.workouts = JSON.parse(JSON.stringify(DEFAULT_WORKOUTS));
      }
      setDataSource("workouts", "local");
      setSyncError("לא נמצאו תוכניות בענן — מוצגות תוכניות מקומיות");
    }
  } catch(e) { console.error("Workout plan load failed (fetch/parse/normalize):", e); setSyncError("טעינת תוכנית מהענן נכשלה"); }
  if ((state.syncStatus?.dataSource?.workouts) !== "supabase") {
    setDataSource("workouts", "local");
  }
}

function getNextWorkout() {
  if (!state.sessions.length) return state.workouts[0] || null;
  const last = state.sessions[state.sessions.length - 1];
  const lastIdx = state.workouts.findIndex(w => w.id === last.workoutId);
  if (lastIdx === -1) return state.workouts[0] || null;
  return state.workouts[(lastIdx + 1) % state.workouts.length];
}

function navigate(screen) {
  if (state.screen === "manage" && screen !== "manage") {
    // נקה pending goal אם לא נשמר
    state.pendingGoal = null;
    const empty = state.workouts.filter(w => w.exercises.length === 0);
    if (empty.length > 0) {
      const names = empty.map(w => w.name).join(", ");
      if (confirm("השארת אימון ריק (" + names + "), האם למחוק?")) {
        state.workouts = state.workouts.filter(w => w.exercises.length > 0);
        saveWorkouts();
      } else {
        return;
      }
    }
  }
  if (state.workoutId) saveInProgress();
  state.screen = screen;
  if (screen === "home") {
    loadInProgress();
  }
  ["dashboard","home","history","manage","library"].forEach(s => {
    const el = document.getElementById("nav-"+s);
    if (el) el.classList.toggle("active", s === screen);
  });
  const titles = { dashboard:"דשבורד", home:"אימון חדש", history:"היסטוריה", manage:"ניהול תוכנית", library:"מאגר תרגילים" };
  document.getElementById("screen-title").textContent = titles[screen] || "";
  render();
}

function render() {
  const el = document.getElementById("main-content");
  let screenHtml = "";
  if (state.screen === "dashboard") screenHtml = renderDashboard();
  else if (state.screen === "home") screenHtml = state.workoutId ? renderWorkout() : renderChoose();
  else if (state.screen === "history") screenHtml = renderHistory();
  else if (state.screen === "library") screenHtml = renderLibraryScreen();
  else screenHtml = renderManage();
  el.innerHTML = renderSyncNotice() + screenHtml;
  if (window.lucide) lucide.createIcons();
  bindDelButtons();
  bindDragDrop();
  const dot = document.getElementById("inprogress-dot");
  if (dot) dot.style.display = state.workoutId ? "block" : "none";
  if (state.screen === "dashboard") {
    requestAnimationFrame(() => requestAnimationFrame(bindScrollAnimations));
  }
  if (state.screen === "manage") setTimeout(bindWorkoutDragDrop, 0);
}

function selectWorkout(id) {
  const inProgress = sessionStorage.getItem("gym_in_progress");
  if (inProgress) {
    const data = JSON.parse(inProgress);
    if (data.workoutId && data.workoutId !== id) {
      showConfirmSheet(
        "יש אימון בתהליך",
        `האם לבטל את ${getWorkout(data.workoutId)?.name || "האימון הקודם"} ולהתחיל ${getWorkout(id)?.name || ""}?`,
        "התחל חדש", "המשך קודם",
        () => { sessionStorage.removeItem("gym_in_progress"); _doSelectWorkout(id); },
        () => { _doSelectWorkout(data.workoutId); }
      );
      return;
    }
  }
  _doSelectWorkout(id);
}

function _doSelectWorkout(id) {
  haptic("medium");
  state.workoutId = id;
  const w = getWorkout(id); const last = getLastSession(id);
  const names = getExNames(w);
  state.exercises = {};
  state.workoutExtras = [];
  state.openExercise = names[0];
  names.forEach(name => {
    const prev = last?.exercises?.[name];
    state.exercises[name] = prev
      ? prev.map((s,i) => ({ num:i+1, weight:s.weight, reps:0 }))
      : [{num:1,weight:0,reps:0},{num:2,weight:0,reps:0},{num:3,weight:0,reps:0}];
  });
  render();
}

function toggleExercise(name) {
  state.openExercise = state.openExercise === name ? null : name;
  saveInProgress(); render();
}



function renderWorkout() {

  const last = getLastSession(state.workoutId);

  const allExtraNames = state.workoutExtras || [];
  const cards = [...names, ...allExtraNames].map(name => {
    const safeNameArg = encodeURIComponent(name);
    const safeNameText = escapeHtml(name);
    const sets = state.exercises[name] || [];
    const prevSets = last?.exercises?.[name] || null;
    const isOpen = state.openExercise === name;
    const improved = prevSets && sets.some((s,i) => prevSets[i] && s.weight > prevSets[i].weight);
    const hasData = sets.some(s => s.reps > 0);
    const curVol = calcVolume(sets); const prevVol = prevSets ? calcVolume(prevSets) : null;
    const volDiff = prevVol && curVol > 0 ? Math.round(((curVol-prevVol)/prevVol)*100) : null;

      ? `<span style="width:8px;height:8px;border-radius:50%;background:${improved?"var(--green)":"#6b7280"};flex-shrink:0"></span>`

    const exCat = getExCategory(w, name) || getExCatByName(name);
    const catIconName = exCat ? getCategoryIcon(exCat) : null;
    const isCardio = exCat === "cardio";
    const header = `<div class="ex-header" onclick="toggleExercise(decodeURIComponent('${safeNameArg}'))">

        ${catIconName ? `<i data-lucide="${catIconName}" style="width:13px;height:13px;color:var(--text-hint);flex-shrink:0"></i>` : ""}
        <div style="min-width:0">
          <div style="font-weight:600;font-size:14px;color:var(--text-primary)">${safeNameText}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap">
            ${(!isCardio && rest > 0) ? `<span class="rest-chip"><i data-lucide="timer" style="width:10px;height:10px"></i> ${formatRest(rest)}</span>` : ""}
            ${hasData ? `<span style="font-size:11px;color:var(--text-hint)">${sets.filter(s=>s.weight>0||s.reps>0).length} סטים</span>` : ""}
            ${volDiff !== null ? `<span class="badge ${volDiff>0?"badge-up":volDiff<0?"badge-down":"badge-eq"}" style="font-size:10px">${volDiff>0?"+":""}${volDiff}%</span>` : ""}
            ${improved ? `<span style="font-size:11px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:2px"><i data-lucide="trending-up" style="width:11px;height:11px"></i> שיפרת</span>` : ""}
          </div>
        </div>
      </div>
      <i data-lucide="${isOpen?"chevron-up":"chevron-down"}" style="width:16px;height:16px;color:var(--text-hint);flex-shrink:0"></i>
    </div>`;

    if (!isOpen) return `<div class="card ${improved&&hasData?"improved":""}">${header}</div>`;

      const p = prevSets?.[i];

        return `<div style="margin-bottom:${isLast?"8px":"14px"}">

          <span style="font-size:12px;color:${isFailed?"var(--red)":"var(--text-hint)"};font-weight:600;text-align:center">${s.num}</span>

          <span style="text-align:center;font-size:16px;color:${isFailed?"var(--red)":"var(--text-hint)"};line-height:1">×</span>

    return `<div class="card ${improved&&hasData?"improved":""}">
      ${header}

  const allNames = [...names, ...(state.workoutExtras || [])];
  const done = allNames.filter(n => state.exercises[n]?.some(s => s.reps>0||s.minutes>0)).length;

  return `<div style="padding:16px 14px">

    </button>

function updateSet(name,i,field,val) {
  const parsed = field==="weight" ? parseFloat(val)||0 : parseInt(val)||0;
  state.exercises[name][i][field] = parsed;
  saveInProgress();
}
function getExCatByName(name) {
  for (const w of state.workouts) {
    const ex = w.exercises.find(e => (typeof e==="string"?e:e.name) === name);
    if (ex?.category) return ex.category;
  }
  const lib = state.exerciseLibrary.find(e => e.name === name);
  return lib?.category || null;
}
function addSet(name) {
  const sets = state.exercises[name];
  sets.push({ num:sets.length+1, weight:0, reps:0, failed:false });
  saveInProgress(); render();
}
function removeSet(name,i) { state.exercises[name].splice(i,1); state.exercises[name].forEach((s,idx) => s.num=idx+1); saveInProgress(); render(); }
function toggleFailed(name,i) { state.exercises[name][i].failed = !state.exercises[name][i].failed; saveInProgress(); render(); }

  const sheet = document.createElement("div");

    <div style="margin-bottom:16px">

      <input type="date" id="session-date-inp" value="${todayIso}" max="${todayIso}"
        style="width:100%;font-family:inherit;font-size:14px;background:var(--surface);border:1px solid var(--border-med);border-radius:10px;padding:10px 12px;color:var(--text-primary);outline:none;box-sizing:border-box;direction:ltr;text-align:right">
    </div>
    <button id="fs-save" style="width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:7px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      שמור אימון
    </button>
    <button id="fs-cancel" style="width:100%;padding:14px;background:var(--surface);color:var(--text-secondary);border:1px solid var(--border-med);border-radius:12px;cursor:pointer;font-size:15px;font-family:inherit">המשך לערוך</button>

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if(e.target===overlay) overlay.remove(); });

  sheet.querySelector("#fs-save").addEventListener("click", () => {
    const dateVal = sheet.querySelector("#session-date-inp").value;
    const now = new Date();
    const sessionDate = dateVal ? (() => {
      const d = new Date(dateVal + "T12:00:00");
      d.setHours(now.getHours(), now.getMinutes(), now.getSeconds(), 0);
      return d.toISOString();
    })() : now.toISOString();
    overlay.remove();
    const session = { id:"s_"+Date.now(), workoutId:state.workoutId, workoutName: getWorkout(state.workoutId)?.name || "", date:sessionDate, exercises:JSON.parse(JSON.stringify(state.exercises)), note: sanitizeText(state.workoutNote||"", 500) };
    state.sessions.push(session);
    state.sessions.sort((a,b) => new Date(a.date) - new Date(b.date));
    sessionStorage.removeItem("gym_in_progress");
    state.workoutNote = "";
    state.workoutId = null; state.exercises = {}; state.openExercise = null; state.selectedWorkoutId = null;
    saveSessions();
    saveSessionToSupabase(session).then(() => {
      showToast("נשמר ✓");
    }).catch(() => {
      showToast("האימון נשמר מקומית בלבד — סנכרון לענן נכשל ⚠️");
      render();
    });
    haptic("success");
    navigate("dashboard");
    setTimeout(() => showToast("כל הכבוד! האימון הושלם 💪"), 300);
  });

  sheet.querySelector("#fs-cancel").addEventListener("click", () => overlay.remove());
}
