<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב אימונים</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
:root {
  --bg: #eef0f8; --surface: #f5f6fc; --card: #ffffff;
  --border: rgba(120,110,200,0.15); --border-med: rgba(120,110,200,0.3);
  --accent: #8b7fd4; --accent-light: #ede9fa; --accent-mid: #c4baf0;
  --text-primary: #2d2756; --text-secondary: #7b74a8; --text-hint: #b3aed4;
  --green: #5db88a; --green-bg: #eaf6f0; --red: #d46b6b; --red-bg: #faeaea;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); direction: rtl; }
.app { max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
.topbar { background: linear-gradient(135deg, #d6d0f5 0%, #c8d4f5 100%); border-bottom: 0.5px solid var(--border); padding: 16px 18px 12px; position: sticky; top: 0; z-index: 10; }
.topbar-title { font-weight: 600; font-size: 17px; color: var(--text-primary); }
.content { flex: 1; }
.bottomnav { background: #fff; border-top: 0.5px solid var(--border); display: flex; position: sticky; bottom: 0; }
.navbtn { flex: 1; padding: 10px 0; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; font-family: inherit; border-top: 2px solid transparent; }
.navbtn.active { color: var(--accent); border-top-color: var(--accent); }
.navbtn:not(.active) { color: var(--text-hint); }
.card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; }
.card.improved { border-color: var(--green); background: linear-gradient(180deg, #f6fdf9 0%, #fff 60%); }
.inp { width: 100%; text-align: center; font-size: 15px; font-family: inherit; background: var(--surface); border: 0.5px solid var(--border-med); border-radius: 10px; padding: 8px 4px; color: var(--text-primary); outline: none; }
.inp:focus { border-color: var(--accent); background: #fff; }
.inp-text { text-align: right; padding: 8px 10px; }
.btn-primary { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; }
.btn-secondary { width: 100%; padding: 12px; background: var(--surface); border: 0.5px solid var(--border-med); border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--text-secondary); font-family: inherit; }
.btn-success { width: 100%; padding: 12px; background: var(--green-bg); color: var(--green); border: 0.5px solid var(--green); border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; }
.btn-copy { padding: 5px 10px; background: var(--accent-light); border: 0.5px solid var(--accent-mid); border-radius: 8px; cursor: pointer; font-size: 11px; color: var(--accent); font-family: inherit; white-space: nowrap; }
.badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 8px; }
.badge-up { background: var(--green-bg); color: var(--green); }
.badge-down { background: var(--red-bg); color: var(--red); }
.badge-eq { background: var(--surface); color: var(--text-hint); }
.progress-bar { display: flex; gap: 4px; margin-bottom: 16px; }
.progress-seg { flex: 1; height: 4px; border-radius: 4px; cursor: pointer; }
.choose-btn { flex: 1; padding: 22px 8px; background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 7px; font-family: inherit; min-width: 0; }
.choose-btn:hover { border-color: var(--accent-mid); }
.workout-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; cursor: pointer; }
.name-edit-inp { font-weight: 600; font-size: 15px; font-family: inherit; color: var(--text-primary); background: var(--accent-light); border: 0.5px solid var(--accent-mid); border-radius: 8px; padding: 4px 8px; outline: none; width: 140px; text-align: right; }
.name-edit-inp:focus { border-color: var(--accent); }
.del-session-btn { background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 15px; padding: 2px 4px; line-height: 1; border-radius: 6px; }
.del-session-btn:hover { color: var(--red); background: var(--red-bg); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><span class="topbar-title" id="screen-title">אימון חדש</span></div>
  <div class="content" id="main-content"></div>
  <div class="bottomnav">
    <button class="navbtn active" id="nav-home" onclick="navigate('home')"><span style="font-size:17px">&#9711;</span><span>אימון</span></button>
    <button class="navbtn" id="nav-history" onclick="navigate('history')"><span style="font-size:17px">&#9776;</span><span>היסטוריה</span></button>
    <button class="navbtn" id="nav-manage" onclick="navigate('manage')"><span style="font-size:17px">&#9998;</span><span>תרגילים</span></button>
  </div>
</div>
<script>
const STORAGE_SESSIONS = "gym_sessions_v2";
const STORAGE_WORKOUTS = "gym_workouts_v3";
const DEFAULT_WORKOUTS = [
  { id: "A", name: "אימון A", exercises: ["לחיצת חזה", "כתפיים קדמי", "טרייספס", "בטן"] },
  { id: "B", name: "אימון B", exercises: ["גב רחב", "בייספס", "כתפיים אחורי", "כרעיים"] }
];
function loadWorkouts() {
  try { const s = localStorage.getItem(STORAGE_WORKOUTS); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_WORKOUTS)); }
  catch { return JSON.parse(JSON.stringify(DEFAULT_WORKOUTS)); }
}
let state = {
  screen: "home", workoutId: null, step: 0, exercises: {},
  sessions: [], workouts: loadWorkouts(), manageOpenId: null, editingNameId: null
};
try { state.sessions = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || "[]"); } catch {}

function saveSessions() { localStorage.setItem(STORAGE_SESSIONS, JSON.stringify(state.sessions)); }
function saveWorkouts() { localStorage.setItem(STORAGE_WORKOUTS, JSON.stringify(state.workouts)); }
function formatDate(iso) { return new Date(iso).toLocaleDateString("he-IL", { day:"numeric", month:"numeric", year:"2-digit", weekday:"short" }); }
function calcVolume(sets) { return sets.reduce((s,r) => s + (r.weight||0)*(r.reps||0), 0); }
function getWorkout(id) { return state.workouts.find(w => w.id === id); }
function getLastSession(id) { return [...state.sessions].reverse().find(s => s.workoutId === id) || null; }

function navigate(screen) {
  state.screen = screen;
  if (screen === "home") state.workoutId = null;
  ["home","history","manage"].forEach(s => document.getElementById("nav-"+s).classList.toggle("active", s === screen));
  document.getElementById("screen-title").textContent = { home:"אימון חדש", history:"היסטוריה", manage:"ניהול אימונים" }[screen];
  render();
}

function render() {
  const el = document.getElementById("main-content");
  if (state.screen === "home") el.innerHTML = state.workoutId ? renderWorkout() : renderChoose();
  else if (state.screen === "history") el.innerHTML = renderHistory();
  else el.innerHTML = renderManage();
}

function renderChoose() {
  if (!state.workouts.length) return `<div style="padding:40px;text-align:center;color:var(--text-secondary);font-size:14px">אין אימונים — הוסף דרך לשונית תרגילים</div>`;
  const cols = state.workouts.length <= 3 ? state.workouts.length : 2;
  return `<div style="padding:20px 16px">
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:20px;text-align:center">איזה אימון היום?</p>
    <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:12px">
      ${state.workouts.map(w => { const last = getLastSession(w.id); return `<button class="choose-btn" onclick="selectWorkout('${w.id}')">
        <span style="font-size:20px;font-weight:600;color:var(--accent)">${w.name}</span>
        <span style="font-size:11px;color:var(--text-secondary)">${last ? formatDate(last.date) : "לא בוצע עדיין"}</span>
        <span style="font-size:10px;color:var(--text-hint);text-align:center;line-height:1.6">${w.exercises.join(" · ")}</span>
      </button>`; }).join("")}
    </div></div>`;
}

function selectWorkout(id) {
  state.workoutId = id; state.step = 0;
  const w = getWorkout(id); const last = getLastSession(id);
  state.exercises = {};
  w.exercises.forEach(name => {
    const prev = last?.exercises?.[name];
    state.exercises[name] = prev ? prev.map((_,i) => ({ num:i+1, weight:0, reps:0 })) : [{num:1,weight:0,reps:0},{num:2,weight:0,reps:0},{num:3,weight:0,reps:0}];
  });
  render();
}

function copyPrevSets(name) {
  const prev = getLastSession(state.workoutId)?.exercises?.[name];
  if (!prev) return;
  state.exercises[name] = prev.map((s,i) => ({ num:i+1, weight:s.weight, reps:s.reps }));
  render();
}

function renderWorkout() {
  const w = getWorkout(state.workoutId); const exList = w.exercises; const step = state.step; const name = exList[step];
  const sets = state.exercises[name] || []; const last = getLastSession(state.workoutId);
  const prevSets = last?.exercises?.[name] || null;
  const improved = prevSets && sets.some((s,i) => prevSets[i] && s.weight > prevSets[i].weight);
  const curVol = calcVolume(sets); const prevVol = prevSets ? calcVolume(prevSets) : null;
  const volDiff = prevVol && curVol > 0 ? Math.round(((curVol-prevVol)/prevVol)*100) : null;
  const segs = exList.map((_,i) => `<div class="progress-seg" style="background:${i<=step?"var(--accent)":"var(--border-med)"}" onclick="goStep(${i})"></div>`).join("");
  const setsHtml = sets.map((s,i) => {
    const p = prevSets?.[i]; const imp = p && s.weight > p.weight; const reg = p && s.weight > 0 && s.weight < p.weight;
    const icon = s.weight > 0 && p
      ? `<span style="font-size:13px;color:${imp?"var(--green)":reg?"var(--red)":"var(--text-hint)"}">${imp?"▲":reg?"▼":"="}</span>`
      : `<button onclick="removeSet('${name}',${i})" style="background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:18px;line-height:1;padding:0">×</button>`;
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:13px">
      <span style="min-width:16px;font-size:12px;color:var(--text-hint)">${s.num}</span>
      <div style="flex:1;display:flex;gap:8px">
        <div style="flex:1"><input class="inp" type="number" placeholder="ק״ג" value="${s.weight||""}" oninput="updateSet('${name}',${i},'weight',this.value)">
          ${p?`<div style="text-align:center;font-size:10px;color:var(--text-hint);margin-top:3px">לפני: ${p.weight}</div>`:""}</div>
        <div style="flex:1"><input class="inp" type="number" placeholder="חז׳" value="${s.reps||""}" oninput="updateSet('${name}',${i},'reps',this.value)">
          ${p?`<div style="text-align:center;font-size:10px;color:var(--text-hint);margin-top:3px">לפני: ${p.reps}</div>`:""}</div>
        <div style="width:28px;display:flex;align-items:center;justify-content:center">${icon}</div>
      </div></div>`;
  }).join("");
  const copyBtn = prevSets ? `<button class="btn-copy" onclick="copyPrevSets('${name}')">↙ העתק מהפעם הקודמת</button>` : "";
  return `<div style="padding:18px 14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <button onclick="navigate('home')" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:13px;font-family:inherit">← חזור</button>
      <span style="font-weight:500;font-size:14px;color:var(--text-primary)">${w.name}</span>
      <span style="font-size:12px;color:var(--text-secondary)">${step+1}/${exList.length}</span>
    </div>
    <div class="progress-bar">${segs}</div>
    ${last?`<p style="font-size:11px;color:var(--text-hint);text-align:center;margin-bottom:10px">אימון קודם: ${formatDate(last.date)}</p>`:""}
    <div class="card ${improved?"improved":""}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-weight:600;font-size:15px;color:var(--text-primary)">${name}</span>
        <div style="display:flex;gap:6px;align-items:center">
          ${copyBtn}
          ${volDiff!==null?`<span class="badge ${volDiff>0?"badge-up":volDiff<0?"badge-down":"badge-eq"}">${volDiff>0?"+":""}${volDiff}%</span>`:""}
          ${improved?`<span style="font-size:12px;color:var(--green);font-weight:500">שיפרת ✓</span>`:""}
        </div>
      </div>
      <div style="display:flex;margin-bottom:14px"><span style="flex:0 0 24px"></span>
        <div style="flex:1;display:flex;gap:8px">
          <span style="flex:1;text-align:center;font-size:11px;color:var(--text-secondary)">משקל ק״ג</span>
          <span style="flex:1;text-align:center;font-size:11px;color:var(--text-secondary)">חזרות</span>
          <span style="width:28px"></span>
        </div>
      </div>
      ${setsHtml}
      <button onclick="addSet('${name}')" style="margin-top:8px;width:100%;background:var(--accent-light);border:0.5px dashed var(--accent-mid);border-radius:10px;padding:7px;cursor:pointer;font-size:13px;color:var(--accent);font-family:inherit">+ הוסף סט</button>
    </div>
    <div style="display:flex;gap:10px;margin-top:10px">
      ${step>0?`<button class="btn-secondary" onclick="goStep(${step-1})" style="flex:1">← הקודם</button>`:""}
      ${step<exList.length-1?`<button class="btn-primary" onclick="goStep(${step+1})" style="flex:1">הבא →</button>`:`<button class="btn-success" onclick="finishWorkout()">סיום אימון ✓</button>`}
    </div></div>`;
}

function updateSet(name,i,field,val) { state.exercises[name][i][field] = field==="weight" ? parseFloat(val)||0 : parseInt(val)||0; }
function addSet(name) { state.exercises[name].push({ num:state.exercises[name].length+1, weight:0, reps:0 }); render(); }
function removeSet(name,i) { state.exercises[name].splice(i,1); state.exercises[name].forEach((s,idx) => s.num=idx+1); render(); }
function goStep(i) { state.step=i; render(); }
function finishWorkout() {
  state.sessions.push({ id:Date.now(), workoutId:state.workoutId, date:new Date().toISOString(), exercises:JSON.parse(JSON.stringify(state.exercises)) });
  saveSessions(); navigate("history");
}

function deleteSession(id) {
  if (!confirm("למחוק את האימון מההיסטוריה?")) return;
  state.sessions = state.sessions.filter(s => s.id !== id);
  saveSessions(); render();
}

function renderHistory() {
  if (!state.sessions.length) return `<div style="padding:40px;text-align:center;color:var(--text-secondary);font-size:14px">אין אימונים עדיין</div>`;
  return `<div style="padding:14px">${[...state.sessions].reverse().map(session => {
    const w = getWorkout(session.workoutId); const wName = w ? w.name : session.workoutId;
    const idx = state.sessions.findIndex(s => s.id === session.id);
    const prevSameType = [...state.sessions].slice(0,idx).reverse().find(s => s.workoutId === session.workoutId);
    const exRows = Object.keys(session.exercises).map(name => {
      const sets = (session.exercises[name]||[]).filter(s => s.weight>0||s.reps>0);
      if (!sets.length) return "";
      const prevSets = prevSameType?.exercises?.[name]||[];
      const improved = prevSets.length>0 && sets.some((s,i) => prevSets[i] && s.weight>prevSets[i].weight);
      const setsTable = sets.map((s,i) => {
        const p=prevSets[i]; const imp=p&&s.weight>p.weight; const reg=p&&s.weight>0&&s.weight<p.weight;
        return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0">
          <span style="min-width:14px;font-size:11px;color:var(--text-hint)">${s.num}</span>
          <span style="font-size:13px;color:var(--text-primary);min-width:52px">${s.weight} ק״ג</span>
          <span style="font-size:13px;color:var(--text-secondary);min-width:44px">× ${s.reps}</span>
          ${p?`<span style="font-size:11px;color:${imp?"var(--green)":reg?"var(--red)":"var(--text-hint)"}">${imp?"▲":reg?"▼":"="}</span>`:""}
        </div>`;
      }).join("");
      return `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:13px;font-weight:500;color:var(--text-primary)">${name}</span>
          ${improved?`<span style="font-size:11px;color:var(--green);font-weight:500">▲ שיפרת</span>`:prevSets.length>0?`<span style="font-size:11px;color:var(--text-hint)">→ ללא שינוי</span>`:""}
        </div>
        <div style="padding-right:4px">${setsTable}</div>
      </div>`;
    }).join("");
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:0.5px solid var(--border)">
        <span style="font-weight:600;font-size:15px;color:var(--text-primary)">${wName}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-secondary)">${formatDate(session.date)}</span>
          <button class="del-session-btn" onclick="deleteSession(${session.id})" title="מחק אימון">🗑</button>
        </div>
      </div>
      ${exRows}
    </div>`;
  }).join("")}</div>`;
}

function renderManage() {
  const workoutSections = state.workouts.map(w => {
    const isOpen = state.manageOpenId === w.id; const isEditing = state.editingNameId === w.id;
    const nameEl = isEditing
      ? `<input class="name-edit-inp" id="name-inp-${w.id}" value="${w.name}" onblur="saveWorkoutName('${w.id}')" onkeydown="if(event.key==='Enter')saveWorkoutName('${w.id}');if(event.key==='Escape'){state.editingNameId=null;render();}">`
      : `<span style="font-weight:600;font-size:15px;color:var(--text-primary)">${w.name}</span>
         <button onclick="event.stopPropagation();startEditName('${w.id}')" style="background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:13px;padding:2px 4px;margin-right:4px">✎</button>`;
    const exRows = isOpen ? w.exercises.map((ex,i) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:14px;color:var(--text-primary)">
        <span>${ex}</span>
        <button onclick="removeExercise('${w.id}',${i})" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:18px;padding:0">×</button>
      </div>`).join("") : "";
    const addRow = isOpen ? `<div style="display:flex;gap:8px;margin-top:10px">
      <input class="inp inp-text" id="new-ex-${w.id}" placeholder="שם תרגיל..." style="flex:1" onkeydown="if(event.key==='Enter')addExercise('${w.id}')">
      <button onclick="addExercise('${w.id}')" style="padding:0 14px;background:var(--accent-light);border:0.5px solid var(--accent-mid);border-radius:10px;cursor:pointer;font-size:16px;color:var(--accent);font-family:inherit">+</button>
    </div>` : "";
    return `<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px">
      <div class="workout-header" onclick="toggleManageOpen('${w.id}')">
        <div style="display:flex;align-items:center;gap:6px" onclick="event.stopPropagation()">${nameEl}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-hint)">${w.exercises.length} תרגילים</span>
          <button onclick="event.stopPropagation();deleteWorkout('${w.id}')" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:15px;padding:2px 4px">🗑</button>
          <span style="color:var(--accent);font-size:13px">${isOpen?"▲":"▼"}</span>
        </div>
      </div>
      ${isOpen?`<div style="padding:0 14px 14px">${exRows}${addRow}</div>`:""}
    </div>`;
  }).join("");
  return `<div style="padding:14px">${workoutSections}
    <div style="margin-top:8px;padding:14px 16px;background:var(--card);border:0.5px solid var(--border);border-radius:16px">
      <p style="font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:10px">+ הוסף אימון חדש</p>
      <div style="display:flex;gap:8px">
        <input class="inp inp-text" id="new-workout-name" placeholder='למשל "אימון C"' style="flex:1">
        <button onclick="addWorkout()" style="padding:0 14px;background:var(--accent);border:none;border-radius:10px;cursor:pointer;font-size:14px;color:#fff;font-family:inherit;white-space:nowrap">הוסף</button>
      </div>
    </div></div>`;
}

function toggleManageOpen(id) { state.manageOpenId = state.manageOpenId===id ? null : id; state.editingNameId=null; render(); }
function startEditName(id) {
  state.editingNameId=id; if(state.manageOpenId!==id) state.manageOpenId=id;
  render(); setTimeout(()=>{ const inp=document.getElementById("name-inp-"+id); if(inp){inp.focus();inp.select();} },30);
}
function saveWorkoutName(id) {
  const inp=document.getElementById("name-inp-"+id); const val=inp?inp.value.trim():"";
  if(val){ const w=getWorkout(id); if(w) w.name=val; saveWorkouts(); }
  state.editingNameId=null; render();
}
function addWorkout() {
  const inp=document.getElementById("new-workout-name"); const name=inp?inp.value.trim():"";
  if(!name) return;
  const id="w_"+Date.now();
  state.workouts.push({id,name,exercises:[]});
  state.manageOpenId=id; state.editingNameId=null;
  saveWorkouts(); render();
}
function deleteWorkout(id) {
  if(!confirm("למחוק את האימון לצמיתות?")) return;
  state.workouts=state.workouts.filter(w=>w.id!==id);
  if(state.manageOpenId===id) state.manageOpenId=null;
  saveWorkouts(); render();
}
function addExercise(workoutId) {
  const inp=document.getElementById("new-ex-"+workoutId); const val=inp?inp.value.trim():"";
  if(!val) return; const w=getWorkout(workoutId);
  if(w){ w.exercises.push(val); saveWorkouts(); render(); }
}
function removeExercise(workoutId,i) {
  const w=getWorkout(workoutId);
  if(w){ w.exercises.splice(i,1); saveWorkouts(); render(); }
}
render();
</script>
</body>
</html>
