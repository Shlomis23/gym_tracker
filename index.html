<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GymBuddy</title>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<link rel="stylesheet" href="./styles.css">
  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#000000">

<link rel="apple-touch-icon" href="icon-192x192.png">
<link rel="icon" type="image/png" href="icon-192x192.png">
</head>
<body>
<div id="app-loader" style="position:fixed;inset:0;background:#ffffff;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 0.35s ease">
  <svg xmlns="http://www.w3.org/2000/svg" width="64" height="28" viewBox="0 0 164 72" style="animation:dumbPulse 1.1s ease-in-out infinite">
    <!-- bar -->
    <rect x="27" y="33" width="110" height="6" rx="3" fill="#111827"/>
    <!-- left plate stack -->
    <rect x="0" y="18" width="16" height="36" rx="2" fill="#111827"/>
    <rect x="16" y="24" width="12" height="24" rx="2" fill="#111827"/>
    <!-- right plate stack -->
    <rect x="136" y="24" width="12" height="24" rx="2" fill="#111827"/>
    <rect x="148" y="18" width="16" height="36" rx="2" fill="#111827"/>
  </svg>
  <style>
    @keyframes dumbPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.88); }
    }
  </style>
</div>
<div id="toast" class="toast"></div>
<div class="app">
  <div class="topbar">
    <i data-lucide="dumbbell" style="width:20px;height:20px;color:#fff"></i>
    <span class="topbar-title" id="screen-title">דשבורד</span>
  </div>
  <div class="content" id="main-content"></div>
  <div class="bottomnav">
    <button class="navbtn active" id="nav-dashboard" onclick="navigate('dashboard')">
      <i data-lucide="layout-dashboard" style="width:18px;height:18px"></i><span>דשבורד</span>
    </button>
    <button class="navbtn" id="nav-home" onclick="navigate('home')" style="position:relative">
      <i data-lucide="dumbbell" style="width:18px;height:18px"></i><span>אימון</span>
      <span id="inprogress-dot" style="display:none;position:absolute;top:8px;right:calc(50% - 12px);width:7px;height:7px;background:#dc2626;border-radius:50%;border:1.5px solid #fff"></span>
    </button>
    <button class="navbtn" id="nav-history" onclick="navigate('history')">
      <i data-lucide="calendar" style="width:18px;height:18px"></i><span>היסטוריה</span>
    </button>
    <button class="navbtn" id="nav-manage" onclick="navigate('manage')">
      <i data-lucide="list-checks" style="width:18px;height:18px"></i><span>ניהול תוכנית</span>
    </button>
  </div>
</div>

<script src="./config.js"></script>
<script src="./state.js"></script>
<script src="./utils.js"></script>
<script src="./library.js"></script>
<script src="./dashboard.js"></script>
<script src="./api.js"></script>
<script src="./sync-status.js"></script>
<script src="./workouts-domain.js"></script>
<script src="./workouts-data.js"></script>
<script src="./weight-domain.js"></script>
<script src="./weight-data.js"></script>
<script src="./share.js"></script>
<script src="./workout-sync.js"></script>
<script src="./weight-ui.js"></script>
<script src="./home-ui.js"></script>
<script src="./history-ui.js"></script>
<script src="./manage-ui.js"></script>
<script src="./render.js"></script>
<script src="./init.js"></script>

  <script>
  function showUpdateBanner(registration) {
    if (document.getElementById("sw-update-banner")) return;
    const banner = document.createElement("div");
    banner.id = "sw-update-banner";
    banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:4000;background:var(--accent);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-size:14px;direction:rtl;box-shadow:0 2px 8px rgba(0,0,0,0.2)";
    banner.innerHTML = `<span>גרסה חדשה זמינה</span><button id="sw-update-btn" style="padding:6px 14px;background:#fff;color:var(--accent);border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">עדכן עכשיו</button>`;
    document.body.appendChild(banner);
    document.getElementById("sw-update-btn").addEventListener("click", () => {
      const sw = registration.waiting;
      if (sw) sw.postMessage({ type: "SKIP_WAITING" });
      window.location.reload();
    });
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
        .then(async registration => {
          console.log('ServiceWorker registration successful:', registration.scope);
          registration.update().catch(() => {});
          await syncPushSubscriptionState();
          render();

          // Show banner when a new SW is waiting
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateBanner(registration);
              }
            });
          });

          // Also check if a SW is already waiting on page load
          if (registration.waiting && navigator.serviceWorker.controller) {
            showUpdateBanner(registration);
          }
        })
        .catch(err => {
          console.log('ServiceWorker registration failed:', err);
        });
    });
  }
</script>
</body>
</html>
