<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב אימונים</title>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
:root {
  --bg: #f8f9fa; --surface: #f3f4f6; --card: #ffffff;
  --border: #e5e7eb; --border-med: #d1d5db;
  --accent: #111827;
  --text-primary: #111827; --text-secondary: #4b5563; --text-hint: #9ca3af;
  --green: #15803d; --green-bg: #dcfce7;
  --red: #dc2626; --red-bg: #fee2e2;
  --blue: #1d4ed8; --blue-bg: #dbeafe;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); direction: rtl; }
.app { max-width: 420px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
.topbar { background: var(--accent); padding: 16px 18px 12px; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 10px; }
.topbar-title { font-weight: 600; font-size: 17px; color: #fff; }
.content { flex: 1; }
.bottomnav { background: var(--card); border-top: 1px solid var(--border); display: flex; position: sticky; bottom: 0; }
.navbtn { flex: 1; padding: 10px 0 8px; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; font-family: inherit; border-top: 2px solid transparent; color: var(--text-hint); }
.navbtn.active { color: var(--accent); border-top-color: var(--accent); }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
.card.improved { border-color: var(--green); }
.ex-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; cursor: pointer; }
.ex-header:hover { background: var(--surface); }
.ex-body { padding: 0 16px 14px; border-top: 1px solid var(--border); }
.inp { width: 100%; text-align: center; font-size: 15px; font-family: inherit; background: var(--surface); border: 1px solid var(--border-med); border-radius: 8px; padding: 8px 4px; color: var(--text-primary); outline: none; }
.inp:focus { border-color: var(--accent); background: #fff; }
.inp-text { text-align: right; padding: 8px 10px; }
.btn-primary { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-secondary { width: 100%; padding: 13px; background: var(--surface); border: 1px solid var(--border-med); border-radius: 10px; cursor: pointer; font-size: 14px; color: var(--text-secondary); font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-success { width: 100%; padding: 13px; background: var(--green-bg); color: var(--green); border: 1px solid #86efac; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-copy { padding: 5px 10px; background: var(--blue-bg); border: 1px solid #93c5fd; border-radius: 8px; cursor: pointer; font-size: 11px; color: var(--blue); font-family: inherit; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; }
.badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
.badge-up { background: var(--green-bg); color: var(--green); }
.badge-down { background: var(--red-bg); color: var(--red); }
.badge-eq { background: var(--surface); color: var(--text-hint); }
.choose-btn { flex: 1; padding: 20px 8px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 7px; font-family: inherit; min-width: 0; }
.choose-btn:hover { border-color: var(--accent); }
.workout-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; cursor: pointer; }
.name-edit-inp { font-weight: 600; font-size: 15px; font-family: inherit; color: var(--text-primary); background: var(--surface); border: 1px solid var(--border-med); border-radius: 8px; padding: 4px 8px; outline: none; width: 150px; text-align: right; }
.name-edit-inp:focus { border-color: var(--accent); }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text-hint); padding: 4px; border-radius: 6px; display: flex; align-items: center; }
.del-btn:hover { color: var(--red); background: var(--red-bg); }
.icon-btn { background: none; border: none; cursor: pointer; padding: 2px; display: flex; align-items: center; color: var(--text-hint); }
.icon-btn:hover { color: var(--text-primary); }
.rest-chip { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: #c2410c; background: #fff7ed; padding: 2px 7px; border-radius: 20px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <i data-lucide="dumbbell" style="width:20px;height:20px;color:#fff"></i>
    <span class="topbar-title" id="screen-title">אימון חדש</span>
  </div>
  <div class="content" id="main-content"></div>
  <div class="bottomnav">
    <button class="navbtn active" id="nav-home" onclick="navigate('home')">
      <i data-lucide="dumbbell" style="width:18px;height:18px"></i><span>אימון</span>
    </button>
    <button class="navbtn" id="nav-history" onclick="navigate('history')">
      <i data-lucide="calendar" style="width:18px;height:18px"></i><span>היסטוריה</span>
    </button>
    <button class="navbtn" id="nav-manage" onclick="navigate('manage')">
      <i data-lucide="pencil" style="width:18px;height:18px"></i><span>תרגילים</span>
    </button>
  </div>
</div>

<script>
const STORAGE_SESSIONS = "gym_sessions_v2";
const STORAGE_WORKOUTS = "gym_workouts_v4";
const DEFAULT_WORKOUTS = [
  { id: "A", name: "אימון A", exercises: [
    { name: "לחיצת חזה", rest: 90 },
    { name: "כתפיים קדמי", rest: 60 },
    { name: "טרייספס", rest: 60 },
    { name: "בטן", rest: 45 }
  ]},
  { id: "B", name: "אימון B", exercises: [
    { name: "גב רחב", rest: 90 },
    { name: "בייספס", rest: 60 },
    { name: "כתפיים אחורי", rest: 60 },
    { name: "כרעיים", rest: 90 }
  ]}
];

function loadWorkouts() {
  try {
    const s = localStorage.getItem(STORAGE_WORKOUTS);
    if (s) return JSON.parse(s);
    const old = localStorage.getItem("gym_workouts_v3");
    if (old) {
      const parsed = JSON.parse(old);
      return parsed.map(w => ({
        ...w,
        exercises: w.exercises.map(e => typeof e === "string" ? { name: e, rest: 60 } : e)
      }));
    }
    return JSON.parse(JSON.stringify(DEFAULT_WORKOUTS));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_WORKOUTS)); }
}

let state = {
  screen: "home", workoutId: null, openExercise: null, exercises: {},
  sessions: [], workouts: loadWorkouts(), manageOpenId: null, editingNameId: null
};
try { state.sessions = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || "[]"); } catch {}

function saveSessions() { localStorage.setItem(STORAGE_SESSIONS, JSON.stringify(state.sessions)); }
function saveWorkouts() { localStorage.setItem(STORAGE_WORKOUTS, JSON.stringify(state.workouts)); }
function formatDate(iso) { return new Date(iso).toLocaleDateString("he-IL", { day:"numeric", month:"numeric", year:"2-digit", weekday:"short" }); }
function calcVolume(sets) { return sets.reduce((s,r) => s + (r.weight||0)*(r.reps||0), 0); }
function getWorkout(id) { return state.workouts.find(w => w.id === id); }
function getLastSession(id) { return [...state.sessions].reverse().find(s => s.workoutId === id) || null; }
function formatRest(sec) { return sec >= 60 ? Math.floor(sec/60)+":" + String(sec%60).padStart(2,"0") + " דק׳" : sec + " שנ׳"; }
function getExNames(w) { return w.exercises.map(e => typeof e === "string" ? e : e.name); }
function getExRest(w, name) { const e = w.exercises.find(ex => (typeof ex === "string" ? ex : ex.name) === name); return e?.rest || 60; }

function navigate(screen) {
  state.screen = screen;
  if (screen === "home") { state.workoutId = null; state.openExercise = null; }
  ["home","history","manage"].forEach(s => document.getElementById("nav-"+s).classList.toggle("active", s === screen));
  document.getElementById("screen-title").textContent = { home:"אימון חדש", history:"היסטוריה", manage:"ניהול אימונים" }[screen];
  render();
}

function render() {
  const el = document.getElementById("main-content");
  if (state.screen === "home") el.innerHTML = state.workoutId ? renderWorkout() : renderChoose();
  else if (state.screen === "history") el.innerHTML = renderHistory();
  else el.innerHTML = renderManage();
  if (window.lucide) lucide.createIcons();
  bindDelButtons();
}

function bindDelButtons() {
  document.querySelectorAll("[data-del-session]").forEach(btn => {
    btn.addEventListener("click", function() {
      const idx = parseInt(this.dataset.delSession);
      if (confirm("למחוק את האימון מההיסטוריה?")) {
        state.sessions.splice(idx, 1);
        saveSessions(); render();
      }
    });
  });
}

function renderChoose() {
  if (!state.workouts.length) return `<div style="padding:40px;text-align:center;color:var(--text-hint);font-size:14px">אין אימונים — הוסף דרך לשונית תרגילים</div>`;
  const cols = state.workouts.length <= 3 ? state.workouts.length : 2;
  return `<div style="padding:20px 16px">
    <p style="font-size:13px;color:var(--text-hint);margin-bottom:20px;text-align:center">איזה אימון היום?</p>
    <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:12px">
      ${state.workouts.map(w => {
        const last = getLastSession(w.id);
        const names = getExNames(w);
        return `<button class="choose-btn" onclick="selectWorkout('${w.id}')">
          <i data-lucide="dumbbell" style="width:24px;height:24px;color:var(--accent)"></i>
          <span style="font-size:18px;font-weight:700;color:var(--text-primary)">${w.name}</span>
          <span style="font-size:11px;color:var(--text-secondary);display:flex;align-items:center;gap:3px">
            <i data-lucide="clock" style="width:11px;height:11px"></i>
            ${last ? formatDate(last.date) : "לא בוצע עדיין"}
          </span>
          <span style="font-size:10px;color:var(--text-hint);text-align:center;line-height:1.6">${names.join(" · ")}</span>
        </button>`;
      }).join("")}
    </div>
  </div>`;
}

function selectWorkout(id) {
  state.workoutId = id;
  const w = getWorkout(id); const last = getLastSession(id);
  const names = getExNames(w);
  state.exercises = {};
  state.openExercise = names[0];
  names.forEach(name => {
    const prev = last?.exercises?.[name];
    state.exercises[name] = prev
      ? prev.map((_,i) => ({ num:i+1, weight:0, reps:0 }))
      : [{num:1,weight:0,reps:0},{num:2,weight:0,reps:0},{num:3,weight:0,reps:0}];
  });
  render();
}

function toggleExercise(name) {
  state.openExercise = state.openExercise === name ? null : name;
  render();
}

function copyPrevSets(name) {
  const prev = getLastSession(state.workoutId)?.exercises?.[name];
  if (!prev) return;
  state.exercises[name] = prev.map((s,i) => ({ num:i+1, weight:s.weight, reps:s.reps }));
  render();
}

function renderWorkout() {
  const w = getWorkout(state.workoutId);
  const names = getExNames(w);
  const last = getLastSession(state.workoutId);
  const allDone = names.every(name => state.exercises[name]?.some(s => s.weight > 0 || s.reps > 0));

  const cards = names.map((name, idx) => {
    const sets = state.exercises[name] || [];
    const prevSets = last?.exercises?.[name] || null;
    const isOpen = state.openExercise === name;
    const improved = prevSets && sets.some((s,i) => prevSets[i] && s.weight > prevSets[i].weight);
    const hasData = sets.some(s => s.weight > 0 || s.reps > 0);
    const curVol = calcVolume(sets); const prevVol = prevSets ? calcVolume(prevSets) : null;
    const volDiff = prevVol && curVol > 0 ? Math.round(((curVol-prevVol)/prevVol)*100) : null;
    const rest = getExRest(w, name);

    const statusDot = hasData
      ? `<span style="width:8px;height:8px;border-radius:50%;background:${improved?"var(--green)":"#6b7280"};flex-shrink:0"></span>`
      : `<span style="width:8px;height:8px;border-radius:50%;border:1.5px solid var(--border-med);flex-shrink:0"></span>`;

    const header = `<div class="ex-header ${isOpen?"":""}` + `" onclick="toggleExercise('${name}')">
      <div style="display:flex;align-items:center;gap:9px;min-width:0">
        ${statusDot}
        <div style="min-width:0">
          <div style="font-weight:600;font-size:14px;color:var(--text-primary)">${name}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap">
            <span class="rest-chip"><i data-lucide="timer" style="width:10px;height:10px"></i> ${formatRest(rest)}</span>
            ${hasData ? `<span style="font-size:11px;color:var(--text-hint)">${sets.filter(s=>s.weight>0||s.reps>0).length} סטים</span>` : ""}
            ${volDiff !== null ? `<span class="badge ${volDiff>0?"badge-up":volDiff<0?"badge-down":"badge-eq"}" style="font-size:10px">${volDiff>0?"+":""}${volDiff}%</span>` : ""}
            ${improved ? `<span style="font-size:11px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:2px"><i data-lucide="trending-up" style="width:11px;height:11px"></i> שיפרת</span>` : ""}
          </div>
        </div>
      </div>
      <i data-lucide="${isOpen?"chevron-up":"chevron-down"}" style="width:16px;height:16px;color:var(--text-hint);flex-shrink:0"></i>
    </div>`;

    if (!isOpen) return `<div class="card ${improved&&hasData?"improved":""}">${header}</div>`;

    const copyBtn = prevSets
      ? `<button class="btn-copy" onclick="copyPrevSets('${name}')">
           <i data-lucide="copy" style="width:12px;height:12px"></i> העתק מהפעם הקודמת
         </button>` : "";

    const prevInfo = last
      ? `<p style="font-size:11px;color:var(--text-hint);margin:10px 0 6px;display:flex;align-items:center;gap:4px">
           <i data-lucide="clock" style="width:11px;height:11px"></i> אימון קודם: ${formatDate(last.date)}
         </p>` : "";

    const setsHtml = sets.map((s,i) => {
      const p = prevSets?.[i]; const imp = p && s.weight > p.weight; const reg = p && s.weight > 0 && s.weight < p.weight;
      const icon = s.weight > 0 && p
        ? `<span style="display:flex;align-items:center;color:${imp?"var(--green)":reg?"var(--red)":"var(--text-hint)"}">
             <i data-lucide="${imp?"trending-up":reg?"trending-down":"minus"}" style="width:14px;height:14px"></i>
           </span>`
        : `<button onclick="removeSet('${name}',${i})" class="icon-btn"><i data-lucide="x" style="width:16px;height:16px"></i></button>`;
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <span style="min-width:16px;font-size:12px;color:var(--text-hint);font-weight:600">${s.num}</span>
        <div style="flex:1;display:flex;gap:8px">
          <div style="flex:1">
            <input class="inp" type="number" placeholder="ק״ג" value="${s.weight||""}" oninput="updateSet('${name}',${i},'weight',this.value)">
            ${p?`<div style="text-align:center;font-size:10px;color:var(--text-hint);margin-top:3px">לפני: ${p.weight}</div>`:""}
          </div>
          <div style="flex:1">
            <input class="inp" type="number" placeholder="חז׳" value="${s.reps||""}" oninput="updateSet('${name}',${i},'reps',this.value)">
            ${p?`<div style="text-align:center;font-size:10px;color:var(--text-hint);margin-top:3px">לפני: ${p.reps}</div>`:""}
          </div>
          <div style="width:28px;display:flex;align-items:center;justify-content:center">${icon}</div>
        </div>
      </div>`;
    }).join("");

    const body = `<div class="ex-body">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0 8px">
        <div style="display:flex;gap:4px">
          <span style="flex:1;min-width:0"></span>
        </div>
        ${copyBtn}
      </div>
      ${prevInfo}
      <div style="display:flex;margin-bottom:12px">
        <span style="flex:0 0 24px"></span>
        <div style="flex:1;display:flex;gap:8px">
          <span style="flex:1;text-align:center;font-size:11px;color:var(--text-hint);font-weight:600">משקל ק״ג</span>
          <span style="flex:1;text-align:center;font-size:11px;color:var(--text-hint);font-weight:600">חזרות</span>
          <span style="width:28px"></span>
        </div>
      </div>
      ${setsHtml}
      <button onclick="addSet('${name}')" style="width:100%;background:var(--surface);border:1px dashed var(--border-med);border-radius:8px;padding:8px;cursor:pointer;font-size:13px;color:var(--text-secondary);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px">
        <i data-lucide="plus" style="width:14px;height:14px"></i> הוסף סט
      </button>
    </div>`;

    return `<div class="card ${improved&&hasData?"improved":""}">${header}${body}</div>`;
  }).join("");

  return `<div style="padding:16px 14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <button onclick="navigate('home')" class="btn-secondary" style="width:auto;padding:7px 12px;font-size:13px;gap:4px">
        <i data-lucide="chevron-right" style="width:14px;height:14px"></i> חזור
      </button>
      <span style="font-weight:600;font-size:15px;color:var(--text-primary)">${w.name}</span>
      <span style="font-size:12px;color:var(--text-hint);background:var(--surface);padding:4px 10px;border-radius:20px">${names.filter(n=>state.exercises[n]?.some(s=>s.weight>0||s.reps>0)).length}/${names.length}</span>
    </div>
    ${cards}
    <button class="btn-success" onclick="finishWorkout()" style="margin-top:6px">
      <i data-lucide="check-circle" style="width:16px;height:16px"></i> סיום אימון
    </button>
  </div>`;
}

function updateSet(name,i,field,val) { state.exercises[name][i][field] = field==="weight" ? parseFloat(val)||0 : parseInt(val)||0; }
function addSet(name) { state.exercises[name].push({ num:state.exercises[name].length+1, weight:0, reps:0 }); render(); }
function removeSet(name,i) { state.exercises[name].splice(i,1); state.exercises[name].forEach((s,idx) => s.num=idx+1); render(); }

function finishWorkout() {
  state.sessions.push({ id:"s_"+Date.now(), workoutId:state.workoutId, date:new Date().toISOString(), exercises:JSON.parse(JSON.stringify(state.exercises)) });
  saveSessions(); navigate("history");
}

function renderHistory() {
  if (!state.sessions.length) return `<div style="padding:40px;text-align:center;color:var(--text-hint);font-size:14px">אין אימונים עדיין</div>`;
  const reversed = [...state.sessions].reverse();
  return `<div style="padding:14px">${reversed.map((session, ri) => {
    const originalIdx = state.sessions.length - 1 - ri;
    const w = getWorkout(session.workoutId);
    const wName = w ? w.name : session.workoutId;
    const prevSameType = state.sessions.slice(0, originalIdx).reverse().find(s => s.workoutId === session.workoutId);
    const exRows = Object.keys(session.exercises).map(name => {
      const sets = (session.exercises[name]||[]).filter(s => s.weight>0||s.reps>0);
      if (!sets.length) return "";
      const prevSets = prevSameType?.exercises?.[name]||[];
      const improved = prevSets.length>0 && sets.some((s,i) => prevSets[i] && s.weight>prevSets[i].weight);
      const rest = w ? getExRest(w, name) : null;
      const setsTable = sets.map((s,i) => {
        const p=prevSets[i]; const imp=p&&s.weight>p.weight; const reg=p&&s.weight>0&&s.weight<p.weight;
        return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0">
          <span style="min-width:14px;font-size:11px;color:var(--text-hint);font-weight:600">${s.num}</span>
          <span style="font-size:13px;color:var(--text-primary);font-weight:500;min-width:56px">${s.weight} ק״ג</span>
          <span style="font-size:13px;color:var(--text-secondary);min-width:44px">× ${s.reps}</span>
          ${p?`<i data-lucide="${imp?"trending-up":reg?"trending-down":"minus"}" style="width:13px;height:13px;color:${imp?"var(--green)":reg?"var(--red)":"var(--text-hint)"}"></i>`:""}
        </div>`;
      }).join("");
      return `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:13px;font-weight:600;color:var(--text-primary)">${name}</span>
            ${rest ? `<span class="rest-chip"><i data-lucide="timer" style="width:10px;height:10px"></i> ${formatRest(rest)}</span>` : ""}
          </div>
          ${improved
            ? `<span style="font-size:11px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:3px"><i data-lucide="trending-up" style="width:12px;height:12px"></i> שיפרת</span>`
            : prevSets.length>0 ? `<span style="font-size:11px;color:var(--text-hint)">ללא שינוי</span>` : ""}
        </div>
        <div style="padding-right:4px">${setsTable}</div>
      </div>`;
    }).join("");
    return `<div class="card" style="padding:0;overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:7px">
          <i data-lucide="dumbbell" style="width:16px;height:16px;color:var(--text-secondary)"></i>
          <span style="font-weight:700;font-size:15px;color:var(--text-primary)">${wName}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-hint);display:flex;align-items:center;gap:3px">
            <i data-lucide="clock" style="width:11px;height:11px"></i> ${formatDate(session.date)}
          </span>
          <button class="del-btn" data-del-session="${originalIdx}">
            <i data-lucide="trash-2" style="width:15px;height:15px"></i>
          </button>
        </div>
      </div>
      <div style="padding:12px 16px">${exRows}</div>
    </div>`;
  }).join("")}</div>`;
}

function renderManage() {
  const workoutSections = state.workouts.map(w => {
    const isOpen = state.manageOpenId === w.id;
    const isEditing = state.editingNameId === w.id;
    const nameEl = isEditing
      ? `<input class="name-edit-inp" id="name-inp-${w.id}" value="${w.name}"
           onblur="saveWorkoutName('${w.id}')"
           onkeydown="if(event.key==='Enter')saveWorkoutName('${w.id}');if(event.key==='Escape'){state.editingNameId=null;render();}">`
      : `<span style="font-weight:700;font-size:15px;color:var(--text-primary)">${w.name}</span>
         <button onclick="event.stopPropagation();startEditName('${w.id}')" class="icon-btn" style="margin-right:4px">
           <i data-lucide="pencil" style="width:13px;height:13px"></i>
         </button>`;
    const exRows = isOpen ? w.exercises.map((ex,i) => {
      const name = typeof ex === "string" ? ex : ex.name;
      const rest = typeof ex === "string" ? 60 : (ex.rest || 60);
      return `<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)">
        <span style="flex:1;font-size:14px;color:var(--text-primary)">${name}</span>
        <div style="display:flex;align-items:center;gap:6px">
          <i data-lucide="timer" style="width:13px;height:13px;color:var(--text-hint)"></i>
          <input type="number" value="${rest}" min="15" max="600" step="15"
            onchange="updateExRest('${w.id}',${i},this.value)"
            style="width:54px;text-align:center;font-size:13px;font-family:inherit;background:var(--surface);border:1px solid var(--border-med);border-radius:6px;padding:4px;color:var(--text-primary);outline:none">
          <span style="font-size:11px;color:var(--text-hint)">שנ׳</span>
        </div>
        <button onclick="removeExercise('${w.id}',${i})" class="icon-btn" style="color:var(--red)">
          <i data-lucide="x" style="width:16px;height:16px"></i>
        </button>
      </div>`;
    }).join("") : "";
    const addRow = isOpen ? `
      <div style="display:flex;gap:8px;margin-top:12px;align-items:center">
        <input class="inp inp-text" id="new-ex-${w.id}" placeholder="שם תרגיל..." style="flex:1"
          onkeydown="if(event.key==='Enter')addExercise('${w.id}')">
        <div style="display:flex;align-items:center;gap:4px">
          <i data-lucide="timer" style="width:13px;height:13px;color:var(--text-hint)"></i>
          <input type="number" id="new-rest-${w.id}" value="60" min="15" max="600" step="15"
            style="width:54px;text-align:center;font-size:13px;font-family:inherit;background:var(--surface);border:1px solid var(--border-med);border-radius:6px;padding:6px 4px;color:var(--text-primary);outline:none">
          <span style="font-size:11px;color:var(--text-hint)">שנ׳</span>
        </div>
        <button onclick="addExercise('${w.id}')" style="padding:0 12px;height:38px;background:var(--accent);border:none;border-radius:8px;cursor:pointer;color:#fff;display:flex;align-items:center;">
          <i data-lucide="plus" style="width:16px;height:16px"></i>
        </button>
      </div>` : "";
    return `<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px">
      <div class="workout-header" onclick="toggleManageOpen('${w.id}')">
        <div style="display:flex;align-items:center;gap:6px" onclick="event.stopPropagation()">${nameEl}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-hint)">${w.exercises.length} תרגילים</span>
          <button onclick="event.stopPropagation();deleteWorkout('${w.id}')" class="del-btn">
            <i data-lucide="trash-2" style="width:15px;height:15px"></i>
          </button>
          <i data-lucide="${isOpen?"chevron-up":"chevron-down"}" style="width:16px;height:16px;color:var(--text-hint)"></i>
        </div>
      </div>
      ${isOpen ? `<div style="padding:0 14px 14px">${exRows}${addRow}</div>` : ""}
    </div>`;
  }).join("");
  return `<div style="padding:14px">${workoutSections}
    <div style="margin-top:8px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:14px">
      <p style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:5px">
        <i data-lucide="plus-circle" style="width:14px;height:14px"></i> הוסף אימון חדש
      </p>
      <div style="display:flex;gap:8px">
        <input class="inp inp-text" id="new-workout-name" placeholder='למשל "אימון C"' style="flex:1">
        <button onclick="addWorkout()" style="padding:0 16px;background:var(--accent);border:none;border-radius:8px;cursor:pointer;font-size:14px;color:#fff;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:5px">
          <i data-lucide="plus" style="width:16px;height:16px"></i> הוסף
        </button>
      </div>
    </div>
  </div>`;
}

function toggleManageOpen(id) { state.manageOpenId = state.manageOpenId===id ? null : id; state.editingNameId=null; render(); }
function startEditName(id) {
  state.editingNameId=id; if(state.manageOpenId!==id) state.manageOpenId=id;
  render(); setTimeout(()=>{ const inp=document.getElementById("name-inp-"+id); if(inp){inp.focus();inp.select();} },30);
}
function saveWorkoutName(id) {
  const inp=document.getElementById("name-inp-"+id); const val=inp?inp.value.trim():"";
  if(val){ const w=getWorkout(id); if(w) w.name=val; saveWorkouts(); }
  state.editingNameId=null; render();
}
function addWorkout() {
  const inp=document.getElementById("new-workout-name"); const name=inp?inp.value.trim():"";
  if(!name) return;
  state.workouts.push({id:"w_"+Date.now(), name, exercises:[]});
  state.manageOpenId=state.workouts[state.workouts.length-1].id;
  state.editingNameId=null; saveWorkouts(); render();
}
function deleteWorkout(id) {
  if(!confirm("למחוק את האימון לצמיתות?")) return;
  state.workouts=state.workouts.filter(w=>w.id!==id);
  if(state.manageOpenId===id) state.manageOpenId=null;
  saveWorkouts(); render();
}
function addExercise(workoutId) {
  const inp=document.getElementById("new-ex-"+workoutId); const val=inp?inp.value.trim():"";
  const restInp=document.getElementById("new-rest-"+workoutId);
  const rest=restInp?parseInt(restInp.value)||60:60;
  if(!val) return; const w=getWorkout(workoutId);
  if(w){ w.exercises.push({name:val, rest}); saveWorkouts(); render(); }
}
function removeExercise(workoutId,i) {
  const w=getWorkout(workoutId);
  if(w){ w.exercises.splice(i,1); saveWorkouts(); render(); }
}
function updateExRest(workoutId,i,val) {
  const w=getWorkout(workoutId);
  if(w && w.exercises[i]){ w.exercises[i].rest=parseInt(val)||60; saveWorkouts(); }
}

window.addEventListener("load", function() { render(); });
</script>
</body>
</html>
