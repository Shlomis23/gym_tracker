function getWeightRangeDays() {
  return Number(state.weightRangeDays || 7);
}

function getWeightCustomRange() {
  if (!state.weightCustomRange) {
    state.weightCustomRange = { from: "", to: "" };
  }
  return state.weightCustomRange;
}

function selectCustomWeightRange() {
  const logs = getWeightLogsAsc();
  const customRange = getWeightCustomRange();
  if (!customRange.from && logs.length) customRange.from = logs[0].measured_date;
  if (!customRange.to && logs.length) customRange.to = logs[logs.length - 1].measured_date;
  state.weightRangeMode = "custom";
  render();
}

function setCustomWeightRangeDate(field, value) {
  const customRange = getWeightCustomRange();
  customRange[field] = value || "";
  state.weightRangeMode = "custom";
  render();
}

async function copyWeightRangeSummary() {
  if (state.weightRangeMode !== "custom") return;
  const logs = getWeightRangeLogs(getWeightRangeDays());
  if (!logs.length) return;

  const first = logs[0];
  const last = logs[logs.length - 1];
  const avg = logs.reduce((sum, log) => sum + Number(log.weight), 0) / logs.length;
  const customRange = getWeightCustomRange();
  const fromDate = customRange.from ? new Date(`${customRange.from}T00:00:00`) : new Date(first.measured_at);
  const toDate = customRange.to ? new Date(`${customRange.to}T00:00:00`) : new Date(last.measured_at);
  const selectedRangeDays = Math.max(1, Math.floor((toDate - fromDate) / (1000 * 60 * 60 * 24)) + 1);

  const rangeLine = `${formatDateShort(first.measured_at)} - ${formatDateShort(last.measured_at)}`;
  const lines = selectedRangeDays <= 7
    ? [
        "*סיכום שקילות*",
        rangeLine,
        "",
        ...logs.map(log => {
          const dayName = new Date(log.measured_at).toLocaleDateString("he-IL", { weekday: "short" });
          return `${dayName}, ${formatDateShort(log.measured_at)} - ${Number(log.weight).toFixed(1)} ק״ג`;
        }),
        "",
        `*ממוצע שבועי: ${avg.toFixed(1)} ק״ג*`
      ]
    : [
        "*סיכום שקילות*",
        rangeLine,
        "",
        `*משקל ממוצע לתקופה זו: ${avg.toFixed(1)} ק״ג*`
      ];
  const text = lines.join("\n");

  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();
  }
  showToast("סיכום הטווח הועתק");
}

function getWeightRangeLogs(days) {
  const logs = getWeightLogsAsc();
  if (!logs.length) return [];
  if (state.weightRangeMode === "custom") {
    const customRange = getWeightCustomRange();
    if (!customRange.from || !customRange.to) return logs;
    const fromDate = new Date(`${customRange.from}T00:00:00`);
    const toDate = new Date(`${customRange.to}T23:59:59.999`);
    if (Number.isNaN(fromDate.getTime()) || Number.isNaN(toDate.getTime())) return logs;
    if (fromDate > toDate) return [];
    return logs.filter(l => {
      const measured = new Date(l.measured_at);
      return measured >= fromDate && measured <= toDate;
    });
  }
  if (days === 0) return logs;
  const lastDate = new Date(logs[logs.length - 1].measured_at);
  const threshold = new Date(lastDate);
  threshold.setDate(threshold.getDate() - (days - 1));
  return logs.filter(l => new Date(l.measured_at) >= threshold);
}

function getWeightMovingAverage(logs, windowSize) {
  return logs.map((log, idx) => {
    const from = Math.max(0, idx - windowSize + 1);
    const subset = logs.slice(from, idx + 1);
    const avg = subset.reduce((sum, item) => sum + Number(item.weight), 0) / subset.length;
    return { ...log, movingAvg: Number(avg.toFixed(2)) };
  });
}

function aggregateWeightByWeek(logs) {
  if (!logs.length) return [];
  const buckets = new Map();
  logs.forEach(log => {
    const weekKey = getWeekStart(log.measured_at).toISOString().slice(0, 10);
    if (!buckets.has(weekKey)) buckets.set(weekKey, []);
    buckets.get(weekKey).push(log);
  });
  return [...buckets.entries()]
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([, weekLogs]) => {
      const avgWeight = weekLogs.reduce((sum, item) => sum + Number(item.weight), 0) / weekLogs.length;
      const lastLog = weekLogs[weekLogs.length - 1];
      return {
        ...lastLog,
        weight: Number(avgWeight.toFixed(2))
      };
    });
}

function renderWeightChart(series, options = {}) {
  if (series.length < 2) {
    return `<div style="height:190px;display:flex;align-items:center;justify-content:center;color:var(--text-hint);font-size:13px">צריך לפחות 2 שקילות להצגת גרף</div>`;
  }
  const rangeDays = Number(options.rangeDays || 0);
  const denseThreshold = rangeDays >= 180 ? 28 : rangeDays >= 90 ? 40 : 55;
  const isDense = series.length > denseThreshold || !!options.denseHint;
  const targetPoints = rangeDays >= 180 ? 30 : rangeDays >= 90 ? 42 : 56;
  const keepEvery = Math.max(1, Math.ceil(series.length / targetPoints));
  const chartSeries = !isDense
    ? series
    : series.filter((_, idx) => idx === 0 || idx === series.length - 1 || idx % keepEvery === 0);

  const width = 1000;
  const height = 220;
  const pad = 28;
  const minY = Math.min(...series.map(p => Math.min(p.weight, p.movingAvg)));
  const maxY = Math.max(...series.map(p => Math.max(p.weight, p.movingAvg)));
  const spanY = Math.max(maxY - minY, 0.1);
  const stepX = (width - pad * 2) / Math.max(chartSeries.length - 1, 1);
  const points = chartSeries.map((p, i) => {
    const x = pad + i * stepX;
    const yW = height - pad - ((p.weight - minY) / spanY) * (height - pad * 2);
    const yAvg = height - pad - ((p.movingAvg - minY) / spanY) * (height - pad * 2);
    return { ...p, x, yW, yAvg };
  });
  const lineWeight = points.map(p => `${p.x},${p.yW}`).join(" ");
  const lineAvg = points.map(p => `${p.x},${p.yAvg}`).join(" ");
  const first = points[0];
  const last = points[points.length - 1];
  const areaAvg = `${first.x},${height - pad} ${points.map(p => `${p.x},${p.yAvg}`).join(" ")} ${last.x},${height - pad}`;
  const gridLines = [0.25, 0.5, 0.75].map(ratio => {
    const y = height - pad - (height - pad * 2) * ratio;
    return `<line x1="${pad}" y1="${y}" x2="${width - pad}" y2="${y}" stroke="var(--border)" stroke-width="1" stroke-opacity="0.7" />`;
  }).join("");
  const circlePoints = isDense
    ? points.filter((_, idx) => idx === 0 || idx === points.length - 1 || idx % Math.max(1, Math.ceil(points.length / 12)) === 0)
    : points;
  const weightStrokeOpacity = isDense ? 0.32 : 0.55;
  const weightStrokeWidth = isDense ? 1.2 : 1.8;
  const chartId = `weight-chart-${Math.random().toString(36).slice(2, 8)}`;
  const selected = circlePoints[circlePoints.length - 1];
  const minLabel = minY.toFixed(1);
  const maxLabel = maxY.toFixed(1);
  const midLabel = ((minY + maxY) / 2).toFixed(1);
  const widestScaleLabel = [maxLabel, midLabel, minLabel].sort((a, b) => b.length - a.length)[0];
  return `
    <div class="card" style="padding:10px;border-radius:12px">
      <div id="${chartId}-selected" style="display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:8px">
        <div>
          <div style="font-size:11px;color:var(--text-hint)">נקודה נבחרת</div>
          <div id="${chartId}-date" style="font-size:12px;color:var(--text-secondary);margin-top:2px">${formatDate(selected.measured_at)}</div>
        </div>
        <div style="text-align:left">
          <div id="${chartId}-weight" style="font-size:18px;font-weight:700;color:var(--text-primary)">${Number(selected.weight).toFixed(1)} ק״ג</div>
          <div id="${chartId}-avg" style="font-size:11px;color:var(--green)">ממוצע: ${Number(selected.movingAvg).toFixed(1)}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:stretch;direction:ltr">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0 5px;position:relative;overflow:hidden">
          <div style="visibility:hidden;font-size:11px;font-weight:700;white-space:nowrap">${widestScaleLabel}</div>
          <div style="position:absolute;top:${(pad / height) * 100}%;left:6px;transform:translateY(-50%);font-size:11px;font-weight:700;color:var(--text-secondary);text-align:left">${maxLabel}</div>
          <div style="position:absolute;top:50%;left:6px;transform:translateY(-50%);font-size:10px;color:var(--text-hint);text-align:left">${midLabel}</div>
          <div style="position:absolute;top:${((height - pad) / height) * 100}%;left:6px;transform:translateY(-50%);font-size:11px;font-weight:700;color:var(--text-secondary);text-align:left">${minLabel}</div>
          <div style="position:absolute;bottom:6px;left:6px;font-size:9px;color:var(--text-hint);text-align:left">ק״ג</div>
        </div>
        <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" style="display:block;flex:1;height:190px;background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);border:1px solid var(--border);border-radius:12px;overflow:hidden">
          <defs>
            <linearGradient id="${chartId}-avg-fill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#22c55e" stop-opacity="0.18"></stop>
              <stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"></stop>
            </linearGradient>
          </defs>
          ${gridLines}
          <polygon points="${areaAvg}" fill="url(#${chartId}-avg-fill)"></polygon>
          <polyline points="${lineWeight}" fill="none" stroke="var(--text-hint)" stroke-opacity="${weightStrokeOpacity}" stroke-width="${weightStrokeWidth}" stroke-linecap="round"></polyline>
          <polyline points="${lineAvg}" fill="none" stroke="var(--green)" stroke-width="3.2" stroke-linecap="round"></polyline>
          ${circlePoints.map((p, idx) => {
            const isActive = idx === circlePoints.length - 1;
            const baseR = isDense ? 4.8 : 6;
            return `<circle data-chart-id="${chartId}" data-base-r="${baseR}" data-idx="${idx}" cx="${p.x}" cy="${p.yW}" r="${isActive ? baseR + 1.6 : baseR}" fill="${isActive ? "var(--blue)" : "var(--accent)"}" opacity="${isActive ? "1" : "0.9"}" stroke="#fff" stroke-width="1.5" style="cursor:pointer" onclick="selectWeightChartPoint('${chartId}', ${idx}, '${p.measured_at}', ${Number(p.weight).toFixed(2)}, ${Number(p.movingAvg).toFixed(2)})"><title>${formatDate(p.measured_at)} · ${Number(p.weight).toFixed(1)} ק״ג</title></circle>`;
          }).join("")}
        </svg>
      </div>
      <div style="display:flex;gap:12px;align-items:center;justify-content:flex-start;margin-top:8px;font-size:11px;color:var(--text-secondary)">
        <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:16px;height:0;border-top:2px solid var(--text-hint);opacity:${weightStrokeOpacity}"></span>משקל בפועל</span>
        <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:16px;height:0;border-top:3px solid var(--green)"></span>ממוצע נע</span>
      </div>
    </div>
  `;
}

function selectWeightChartPoint(chartId, idx, measuredAt, weight, movingAvg) {
  const dateEl = document.getElementById(`${chartId}-date`);
  const weightEl = document.getElementById(`${chartId}-weight`);
  const avgEl = document.getElementById(`${chartId}-avg`);
  if (dateEl) dateEl.textContent = formatDate(measuredAt);
  if (weightEl) weightEl.textContent = `${Number(weight).toFixed(1)} ק״ג`;
  if (avgEl) avgEl.textContent = `ממוצע: ${Number(movingAvg).toFixed(1)}`;

  const nodes = document.querySelectorAll(`circle[data-chart-id="${chartId}"]`);
  nodes.forEach(node => {
    const nodeIdx = Number(node.getAttribute("data-idx"));
    const baseR = Number(node.getAttribute("data-base-r")) || 6;
    const isActive = nodeIdx === Number(idx);
    node.setAttribute("r", isActive ? String(baseR + 1.6) : String(baseR));
    node.setAttribute("fill", isActive ? "var(--blue)" : "var(--accent)");
    node.setAttribute("opacity", isActive ? "1" : "0.9");
  });
}

async function openWeightEntryModal(logId) {
  const logs = getWeightLogsAsc();
  const editing = logId ? logs.find(l => l.id === logId) : null;
  const todayIso = isoDateFromLocal(new Date());
  const defaultDate = editing ? isoDateFromLocal(editing.measured_at) : todayIso;
  const defaultWeight = editing ? editing.weight : (getLatestWeight()?.weight || "");
  const defaultNote = editing?.note || "";

  document.getElementById("weight-entry-modal")?.remove();
  const overlay = document.createElement("div");
  overlay.id = "weight-entry-modal";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2100;display:flex;align-items:flex-end;justify-content:center";
  overlay.innerHTML = `
    <div style="background:var(--card);border-radius:22px 22px 0 0;padding:20px 16px 16px;width:100%;max-width:430px;box-sizing:border-box;direction:rtl;animation:slideUp 0.28s ease both;max-height:86vh;overflow:auto">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
        <div>
          <div style="font-size:17px;font-weight:800;color:var(--text-primary)">${editing ? "עריכת שקילה" : "הוספת שקילה"}</div>
          <div style="font-size:12px;color:var(--text-hint);margin-top:3px">ניהול שקילה לפי תאריך</div>
        </div>
        <button id="weight-close" style="width:30px;height:30px;border:none;background:var(--surface);border-radius:999px;cursor:pointer;color:var(--text-hint);font-size:18px">×</button>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border-med);border-radius:12px;padding:12px;margin-bottom:10px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);font-weight:600;margin-bottom:6px">תאריך מדידה</label>
        ${buildDateSelector("entry-date", defaultDate)}
      </div>
      <div style="background:var(--surface);border:1px solid var(--border-med);border-radius:12px;padding:12px;margin-bottom:10px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);font-weight:600;margin-bottom:6px">משקל (ק״ג)</label>
        <input id="weight-value-inp" type="number" inputmode="decimal" step="0.1" min="1" value="${defaultWeight}" style="width:100%;box-sizing:border-box;display:block;padding:12px;border:1px solid var(--border-med);border-radius:10px;background:var(--card);font-family:inherit;font-size:20px;font-weight:700">
      </div>
      <div style="background:var(--surface);border:1px solid var(--border-med);border-radius:12px;padding:12px;margin-bottom:14px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);font-weight:600;margin-bottom:6px">הערה (אופציונלי)</label>
        <textarea id="weight-note-inp" rows="2" style="width:100%;box-sizing:border-box;display:block;padding:10px;border:1px solid var(--border-med);border-radius:10px;background:var(--card);font-family:inherit;resize:vertical">${escapeHtml(defaultNote)}</textarea>
      </div>
      <button id="weight-save-btn" class="btn-primary" style="margin-bottom:8px">${editing ? "שמור שינויים" : "שמור שקילה"}</button>
      <button id="weight-cancel-btn" style="width:100%;padding:12px;background:var(--surface);color:var(--text-secondary);border:1px solid var(--border-med);border-radius:10px;font-family:inherit;cursor:pointer">ביטול</button>
    </div>
  `;
  document.body.appendChild(overlay);

  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector("#weight-close").addEventListener("click", () => overlay.remove());
  overlay.querySelector("#weight-cancel-btn").addEventListener("click", () => overlay.remove());
  overlay.querySelector("#weight-save-btn").addEventListener("click", async () => {
    const dateVal = readIsoDateFromSelector(overlay, "entry-date");
    const weightVal = parseFloat(overlay.querySelector("#weight-value-inp").value);
    const noteVal = overlay.querySelector("#weight-note-inp").value.trim();
    if (!dateVal || !Number.isFinite(weightVal) || weightVal <= 0) {
      showToast("נא למלא תאריך ומשקל תקין");
      return;
    }
    const measuredAt = new Date(`${dateVal}T09:00:00`).toISOString();
    const matchedDay = logs.find(l => l.measured_date === dateVal);
    try {
      if (editing) {
        if (matchedDay && matchedDay.id !== editing.id) {
          showToast("כבר קיימת שקילה בתאריך הזה");
          return;
        }
        await updateWeightLog(editing.id, weightVal, measuredAt, noteVal);
      } else if (matchedDay) {
        await updateWeightLog(matchedDay.id, weightVal, measuredAt, noteVal);
        showToast("עודכן במקום רשומה קיימת לאותו יום ✓");
      } else {
        await saveWeightLog(weightVal, measuredAt, noteVal);
      }
      overlay.remove();
      render();
    } catch (_) {}
  });
}

function renderHistory() {
  const tab = state.historyTab || "workouts";
  const tabs = `<div style="display:flex;gap:0;margin:0 14px 14px;background:var(--surface);border-radius:10px;padding:3px">
    <button onclick="state.historyTab='workouts';render()" style="flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:${tab==='workouts'?'var(--card)':'transparent'};color:${tab==='workouts'?'var(--text-primary)':'var(--text-hint)'}">אימונים</button>
    <button onclick="state.historyTab='month';render()" style="flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:${tab==='month'?'var(--card)':'transparent'};color:${tab==='month'?'var(--text-primary)':'var(--text-hint)'}">החודש שלי</button>
    <button onclick="state.historyTab='weight';render()" style="flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;background:${tab==='weight'?'var(--card)':'transparent'};color:${tab==='weight'?'var(--text-primary)':'var(--text-hint)'}">משקל</button>
  </div>`;

  if (tab === "month") {
    return renderMonthTab(tabs);
  }

  if (tab === "weight") {
    const allLogs = getWeightLogsAsc();
    if (!allLogs.length) {
      return `<div style="padding:0 14px">${tabs}
        <div class="card" style="padding:26px 18px;text-align:center">
          <div style="font-size:15px;color:var(--text-secondary);margin-bottom:12px">אין נתוני משקל עדיין</div>
          <button onclick="openWeightEntryModal()" class="btn-primary" style="max-width:220px;margin:0 auto">הוסף שקילה ראשונה</button>
        </div>
      </div>`;
    }
    const range = getWeightRangeDays();
    const filtered = getWeightRangeLogs(range);
    const isCustomRange = state.weightRangeMode === "custom";
    const customRange = getWeightCustomRange();
    const customFrom = customRange.from || "";
    const customTo = customRange.to || "";
    const customRangeDays = (customFrom && customTo)
      ? Math.max(1, Math.floor((new Date(`${customTo}T00:00:00`) - new Date(`${customFrom}T00:00:00`)) / (1000 * 60 * 60 * 24)) + 1)
      : 90;
    const avgWindowDays = Math.max(1, isCustomRange ? customRangeDays : range);
    const customRangeInvalid = isCustomRange && customFrom && customTo && new Date(`${customFrom}T00:00:00`) > new Date(`${customTo}T00:00:00`);
    const hasFilteredData = filtered.length > 0;
    const withAvg = getWeightMovingAverage(filtered, avgWindowDays);
    const chartBase = !isCustomRange && range >= 180 ? aggregateWeightByWeek(filtered) : filtered;
    const chartAvgWindow = !isCustomRange && range >= 180 ? Math.max(2, Math.round(avgWindowDays / 7)) : avgWindowDays;
    const chartSeries = getWeightMovingAverage(chartBase, chartAvgWindow);
    const latest = hasFilteredData ? filtered[filtered.length - 1] : null;
    const first = hasFilteredData ? filtered[0] : null;
    const delta = hasFilteredData ? (latest.weight - first.weight) : 0;
    const avg7 = hasFilteredData ? (withAvg[withAvg.length - 1]?.movingAvg ?? latest.weight) : 0;
    const summaryCards = `
      <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px">
        <div class="card" style="padding:10px"><div style="font-size:11px;color:var(--text-hint)">אחרון</div><div style="font-size:19px;font-weight:700">${hasFilteredData ? latest.weight.toFixed(1) : "-"}</div></div>
        <div class="card" style="padding:10px"><div style="font-size:11px;color:var(--text-hint)">ממוצע ${avgWindowDays} ימים</div><div style="font-size:19px;font-weight:700;color:var(--green)">${hasFilteredData ? avg7.toFixed(1) : "-"}</div></div>
        <div class="card" style="padding:10px"><div style="font-size:11px;color:var(--text-hint)">שינוי בטווח</div><div style="font-size:19px;font-weight:700;color:${delta < 0 ? "var(--green)" : delta > 0 ? "var(--red)" : "var(--text-primary)"}">${hasFilteredData ? `${delta > 0 ? "+" : ""}${delta.toFixed(1)}` : "-"}</div></div>
      </div>
    `;

    const rangeButtons = [
      { days: 7, label: "7 ימים" },
      { days: 30, label: "30 ימים" },
      { days: 90, label: "90 ימים" },
      { days: 180, label: "6 חודשים" },
      { days: 365, label: "שנה" }
    ].map(r => `<button onclick="state.weightRangeMode='preset';state.weightRangeDays=${r.days};render()" style="padding:7px 10px;border-radius:999px;border:1px solid ${!isCustomRange&&range===r.days?"var(--accent)":"var(--border-med)"};background:${!isCustomRange&&range===r.days?"var(--accent)":"var(--surface)"};color:${!isCustomRange&&range===r.days?"#fff":"var(--text-secondary)"};font-family:inherit;font-size:11px;cursor:pointer">${r.label}</button>`).join("");
    const customRangeBtn = `<button onclick="selectCustomWeightRange()" style="padding:7px 10px;border-radius:999px;border:1px solid ${isCustomRange?"var(--accent)":"var(--border-med)"};background:${isCustomRange?"var(--accent)":"var(--surface)"};color:${isCustomRange?"#fff":"var(--text-secondary)"};font-family:inherit;font-size:11px;cursor:pointer">טווח תאריכים</button>`;
    const showRangeCopy = isCustomRange && hasFilteredData;
    const customRangeControls = isCustomRange ? `
      <div class="card" style="padding:10px;margin-bottom:10px">
        <div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px">בחר טווח תאריכים להצגת המשקלים</div>
        <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
          <label style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px">
            <span style="font-size:10px;color:var(--text-hint)">מתאריך</span>
            <input type="date" value="${customFrom}" onchange="setCustomWeightRangeDate('from', this.value)" style="padding:8px;border-radius:8px;border:1px solid var(--border-med);background:var(--surface);color:var(--text-primary);font-family:inherit">
          </label>
          <label style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px">
            <span style="font-size:10px;color:var(--text-hint)">עד תאריך</span>
            <input type="date" value="${customTo}" onchange="setCustomWeightRangeDate('to', this.value)" style="padding:8px;border-radius:8px;border:1px solid var(--border-med);background:var(--surface);color:var(--text-primary);font-family:inherit">
          </label>
        </div>
        ${customRangeInvalid ? `<div style="font-size:11px;color:var(--red);margin-top:8px">תאריך התחלה חייב להיות מוקדם או שווה לתאריך הסיום</div>` : ""}
      </div>
    ` : "";
    const rows = [...withAvg].reverse().map((log, ri, arr) => {
      const prev = arr[ri + 1];
      const diff = prev ? (log.weight - prev.weight) : null;
      const diffColor = diff === null ? "" : diff < 0 ? "var(--green)" : diff > 0 ? "var(--red)" : "var(--text-hint)";
      const diffText = diff === null ? "" : `${diff > 0 ? "+" : ""}${diff.toFixed(1)} ק״ג`;
      return `<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px">
        <div>
          <div style="font-size:18px;font-weight:700">${log.weight.toFixed(1)} <span style="font-size:12px;font-weight:500;color:var(--text-hint)">ק״ג</span></div>
          <div style="font-size:11px;color:var(--text-hint);margin-top:2px">${formatWeightDate(log)} · ממוצע ${avgWindowDays}י: ${log.movingAvg.toFixed(1)}</div>
          ${log.note ? `<div style="font-size:11px;color:var(--text-secondary);margin-top:3px">${escapeHtml(log.note)}</div>` : ""}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${diff !== null ? `<span style="font-size:11px;font-weight:700;color:${diffColor}">${diffText}</span>` : ""}
          <button onclick="openWeightEntryModal('${log.id}')" class="icon-btn"><i data-lucide="pencil" style="width:14px;height:14px"></i></button>
          <button data-del-weight="${log.id}" class="del-btn"><i data-lucide="trash-2" style="width:14px;height:14px"></i></button>
        </div>
      </div>`;
    }).join("");
    return `<div style="padding:14px 14px 0">${tabs}
      <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-bottom:10px">${rangeButtons}${customRangeBtn}</div>
      ${customRangeControls}
      ${summaryCards}
      ${hasFilteredData ? renderWeightChart(chartSeries, { rangeDays: isCustomRange ? customRangeDays : range, denseHint: isCustomRange ? customRangeDays >= 90 : range >= 90 }) : `<div class="card" style="padding:18px;text-align:center;color:var(--text-hint);font-size:13px">אין נתוני משקל בטווח התאריכים שנבחר</div>`}
      <div style="display:flex;justify-content:flex-start;margin-top:10px">
        <button onclick="openWeightEntryModal()" class="btn-primary" style="width:auto;padding:8px 14px;font-size:12px">הוסף</button>
        ${showRangeCopy ? `<button onclick="copyWeightRangeSummary()" style="width:auto;padding:8px 12px;font-size:12px;margin-right:8px;background:var(--surface);color:var(--text-secondary);border:1px solid var(--border-med);border-radius:10px;cursor:pointer;font-family:inherit;font-weight:600">העתק סיכום</button>` : ""}
      </div>
      <div style="margin-top:10px;display:grid;gap:8px;padding-bottom:12px">${rows}</div>
    </div>`;
  }

  const exportBtn = `<div style="padding:0 0 10px;display:flex;justify-content:flex-start">
    <button onclick="exportCSV()" style="display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border-med);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text-secondary)">
      <i data-lucide="download" style="width:13px;height:13px"></i> ייצוא CSV
    </button>
  </div>`;

  if (!state.sessions.length) return `<div style="padding:14px">${tabs}${exportBtn}<div style="padding:30px;text-align:center;color:var(--text-hint);font-size:14px">אין אימונים עדיין</div></div>`;

  const improvedCount = (session, prevSameType) => {
    const exNames = Object.keys(session.exercises || {});
    return exNames.filter(name => {
      const sets = (session.exercises[name]||[]).filter(s=>s.weight>0||s.reps>0);
      const prevSets = prevSameType?.exercises?.[name]||[];
      return prevSets.length>0 && sets.some((s,i)=>prevSets[i]&&s.weight>prevSets[i].weight);
    }).length;
  };

  const mode = state.historyWorkoutFilterMode || "all";
  const workoutId = state.historyWorkoutId || "all";
  const exQuery = (state.historyExerciseQuery || "").trim().toLowerCase();

  const workoutOptions = [
    `<option value="all" ${workoutId === "all" ? "selected" : ""}>כל התוכניות</option>`,
    ...state.workouts.map(w => `<option value="${w.id}" ${workoutId === w.id ? "selected" : ""}>${escapeHtml(w.name)}</option>`)
  ].join("");

  const filteredSessions = [...state.sessions].filter((session, idx) => {
    if (workoutId !== "all" && session.workoutId !== workoutId) return false;
    if (exQuery) {
      const names = Object.keys(session.exercises || {}).map(x => x.toLowerCase());
      if (!names.some(n => n.includes(exQuery))) return false;
    }
    if (mode === "improved") {
      const prevSameType = state.sessions.slice(0, idx).reverse().find(s => s.workoutId === session.workoutId);
      return improvedCount(session, prevSameType) > 0;
    }
    return true;
  }).reverse();

  if (!state.expandedSessions) state.expandedSessions = new Set();
  return `<div style="padding:14px">${tabs}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <button onclick="state.historyWorkoutFilterMode='all';render()" style="padding:8px 10px;border-radius:10px;border:1px solid ${mode==='all'?'var(--accent)':'var(--border-med)'};background:${mode==='all'?'var(--accent)':'var(--card)'};color:${mode==='all'?'#fff':'var(--text-secondary)'};font-family:inherit;font-size:12px;cursor:pointer">הכול</button>
      <button onclick="state.historyWorkoutFilterMode='improved';render()" style="padding:8px 10px;border-radius:10px;border:1px solid ${mode==='improved'?'var(--green)':'var(--border-med)'};background:${mode==='improved'?'var(--green-bg)':'var(--card)'};color:${mode==='improved'?'var(--green)':'var(--text-secondary)'};font-family:inherit;font-size:12px;cursor:pointer">רק עם שיפור</button>
    </div>
    <div style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:8px;margin-bottom:10px">
      <select onchange="state.historyWorkoutId=this.value;render()" style="padding:9px 10px;border:1px solid var(--border-med);border-radius:10px;background:var(--card);font-family:inherit;font-size:12px;color:var(--text-primary)">${workoutOptions}</select>
      <input id="history-exercise-search" type="text" value="${escapeHtml(state.historyExerciseQuery || "")}" oninput="onHistoryExerciseQueryInput(this)" placeholder="חפש לפי תרגיל" style="padding:9px 10px;border:1px solid var(--border-med);border-radius:10px;background:var(--card);font-family:inherit;font-size:12px;color:var(--text-primary)">
    </div>
    ${exportBtn}
    ${filteredSessions.length === 0 ? `<div style="padding:30px;text-align:center;color:var(--text-hint);font-size:14px">לא נמצאו אימונים לפי הסינון שבחרת</div>` : filteredSessions.map((session) => {
    const originalIdx = state.sessions.findIndex(s => s.id === session.id);
    const w = getWorkout(session.workoutId);
    const wName = w ? w.name : (session.workoutName || session.workoutId);
    const prevSameType = state.sessions.slice(0, originalIdx).reverse().find(s => s.workoutId === session.workoutId);
    const isExpanded = state.expandedSessions.has(session.id);

    const exNames = Object.keys(session.exercises);
    const totalEx = exNames.length;
    const improved = improvedCount(session, prevSameType);

    const sessionVol = calcSessionVolume(session.exercises);
    const summaryChips = `
      <span style="font-size:11px;color:var(--text-hint)">${totalEx} תרגילים</span>
      <span style="font-size:11px;color:var(--text-hint)">·</span>
      <span style="font-size:11px;color:var(--text-hint)">${formatVolume(sessionVol)}</span>
      ${improved > 0 ? `<span style="font-size:11px;color:var(--green);font-weight:600;display:inline-flex;align-items:center;gap:2px"><i data-lucide="trending-up" style="width:11px;height:11px"></i> ${improved} שיפרת</span>` : (prevSameType ? `<span style="font-size:11px;color:var(--text-hint)">ללא שינוי</span>` : "")}
    `;

    const exRows = isExpanded ? exNames.map(name => {
      const sets = (session.exercises[name]||[]).filter(s => s.weight>0||s.reps>0||s.minutes>0);
      if (!sets.length) return "";
      const prevSets = prevSameType?.exercises?.[name]||[];
      const exImproved = prevSets.length>0 && sets.some((s,i) => prevSets[i] && s.weight>prevSets[i].weight);
      const rest = w ? getExRest(w, name) : null;
      const setsTable = sets.map((s,i) => {
        const p=prevSets[i]; const imp=p&&s.weight>p.weight; const reg=p&&s.weight>0&&s.weight<p.weight;
        const failed = !!s.failed;
        if (s.minutes > 0) {
          return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0">
            <span style="min-width:14px;font-size:11px;color:var(--text-hint);font-weight:600">${s.num}</span>
            <span style="font-size:13px;color:var(--text-primary);font-weight:500">${s.minutes} דקות</span>
          </div>`;
        }
        return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0">
          <span style="min-width:14px;font-size:11px;color:${failed?"var(--red)":"var(--text-hint)"};font-weight:600">${s.num}</span>
          <span style="font-size:13px;color:${failed?"var(--red)":"var(--text-primary)"};font-weight:500;min-width:56px">${s.weight} ק״ג</span>
          <span style="font-size:13px;color:${failed?"var(--red)":"var(--text-secondary)"};min-width:44px">× ${s.reps}</span>
          ${failed ? `<span style="font-size:10px;color:var(--red);font-weight:600">כשל</span>` : p?`<i data-lucide="${imp?"trending-up":reg?"trending-down":"minus"}" style="width:13px;height:13px;color:${imp?"var(--green)":reg?"var(--red)":"var(--text-hint)"}"></i>`:""}
        </div>`;
      }).join("");
      return `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:7px">
            <span style="font-size:13px;font-weight:600;color:var(--text-primary)">${escapeHtml(name)}</span>
            ${rest ? `<span class="rest-chip"><i data-lucide="timer" style="width:10px;height:10px"></i> ${formatRest(rest)}</span>` : ""}
          </div>
          ${exImproved ? `<span style="font-size:11px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:3px"><i data-lucide="trending-up" style="width:12px;height:12px"></i> שיפרת</span>` : prevSets.length>0 ? `<span style="font-size:11px;color:var(--text-hint)">ללא שינוי</span>` : ""}
        </div>
        <div style="padding-right:4px">${setsTable}</div>
      </div>`;
    }).join("") : "";

    return `<div class="card" style="padding:0;overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer" onclick="toggleHistorySession('${session.id}')">
        <div style="display:flex;align-items:center;gap:7px">
          <i data-lucide="dumbbell" style="width:16px;height:16px;color:var(--text-secondary)"></i>
          <div>
            <span style="font-weight:700;font-size:15px;color:var(--text-primary)">${escapeHtml(wName)}</span>
            <div style="display:flex;align-items:center;gap:8px;margin-top:3px">${summaryChips}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-hint);display:flex;align-items:center;gap:3px">
            <i data-lucide="clock" style="width:11px;height:11px"></i> ${formatDate(session.date)}
          </span>
          <button class="del-btn" data-del-session="${originalIdx}" onclick="event.stopPropagation()">
            <i data-lucide="trash-2" style="width:15px;height:15px"></i>
          </button>
          <i data-lucide="${isExpanded?"chevron-up":"chevron-down"}" style="width:15px;height:15px;color:var(--text-hint)"></i>
        </div>
      </div>
      ${isExpanded ? `<div style="padding:4px 16px 14px;border-top:1px solid var(--border)">
        ${session.note ? `<div style="display:flex;align-items:flex-start;gap:6px;padding:8px 0 10px;border-bottom:1px solid var(--border);margin-bottom:8px">
          <i data-lucide="message-square" style="width:13px;height:13px;color:var(--text-hint);margin-top:1px;flex-shrink:0"></i>
          <span style="font-size:12px;color:var(--text-secondary);line-height:1.5">${escapeHtml(session.note).replace(/\n/g, "<br>")}</span>
        </div>` : ""}
        ${exRows}
      </div>` : ""}
    </div>`;
  }).join("")}</div>`;
}

function onHistoryExerciseQueryInput(inputEl) {
  state.historyExerciseQuery = inputEl.value;
  const cursorPos = inputEl.selectionStart ?? inputEl.value.length;
  render();
  requestAnimationFrame(() => {
    const nextInput = document.getElementById("history-exercise-search");
    if (!nextInput) return;
    nextInput.focus();
    nextInput.setSelectionRange(cursorPos, cursorPos);
  });
}



function renderMonthTab(tabs) {
  const now = new Date();
  const monthNames = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

  const viewYear = state.monthViewYear ?? now.getFullYear();
  const viewMonth = state.monthViewMonth ?? now.getMonth();
  state.monthViewYear = viewYear;
  state.monthViewMonth = viewMonth;

  const monthStart = new Date(viewYear, viewMonth, 1);
  const monthEnd = new Date(viewYear, viewMonth + 1, 0);
  const prevMonthStart = new Date(viewYear, viewMonth - 1, 1);
  const prevMonthEnd = new Date(viewYear, viewMonth, 0);

  const sessions = state.sessions.filter(s => {
    const d = new Date(s.date);
    return d >= monthStart && d <= monthEnd;
  });
  const prevSessions = state.sessions.filter(s => {
    const d = new Date(s.date);
    return d >= prevMonthStart && d <= prevMonthEnd;
  });

  const totalVol = sessions.reduce((t, s) => t + calcSessionVolume(s.exercises), 0);
  const totalSets = sessions.reduce((t, s) =>
    t + Object.values(s.exercises||{}).reduce((tt, sets) => tt + sets.filter(x=>x.reps>0).length, 0), 0);
  const prevTotalVol = prevSessions.reduce((t, s) => t + calcSessionVolume(s.exercises), 0);
  const prevTotalSets = prevSessions.reduce((t, s) =>
    t + Object.values(s.exercises||{}).reduce((tt, sets) => tt + sets.filter(x=>x.reps>0).length, 0), 0);

  // PRs broken this month
  const allPRs = {};
  state.sessions.forEach(s => {
    const d = new Date(s.date);
    const inMonth = d >= monthStart && d <= monthEnd;
    Object.entries(s.exercises||{}).forEach(([name, sets]) => {
      const maxW = Math.max(...sets.map(x=>x.weight||0));
      if (!allPRs[name]) allPRs[name] = { before: 0, inMonth: 0 };
      if (inMonth) allPRs[name].inMonth = Math.max(allPRs[name].inMonth, maxW);
      else allPRs[name].before = Math.max(allPRs[name].before, maxW);
    });
  });
  const newPRs = Object.entries(allPRs).filter(([,v]) => v.inMonth > v.before && v.inMonth > 0).length;
  const prevAllPRs = {};
  state.sessions.forEach(s => {
    const d = new Date(s.date);
    const inPrevMonth = d >= prevMonthStart && d <= prevMonthEnd;
    Object.entries(s.exercises||{}).forEach(([name, sets]) => {
      const maxW = Math.max(...sets.map(x=>x.weight||0));
      if (!prevAllPRs[name]) prevAllPRs[name] = { before: 0, inMonth: 0 };
      if (inPrevMonth) prevAllPRs[name].inMonth = Math.max(prevAllPRs[name].inMonth, maxW);
      else if (d < prevMonthStart) prevAllPRs[name].before = Math.max(prevAllPRs[name].before, maxW);
    });
  });
  const prevMonthPrs = Object.entries(prevAllPRs).filter(([,v]) => v.inMonth > v.before && v.inMonth > 0).length;

  // Most improved exercise
  const improvements = {};
  sessions.forEach(s => {
    const d = new Date(s.date);
    const prevSession = state.sessions.filter(x => new Date(x.date) < monthStart && x.workoutId === s.workoutId).slice(-1)[0];
    if (!prevSession) return;
    Object.entries(s.exercises||{}).forEach(([name, sets]) => {
      const cur = Math.max(...sets.map(x=>x.weight||0));
      const prev = Math.max(...(prevSession.exercises?.[name]||[]).map(x=>x.weight||0));
      if (cur > prev) improvements[name] = (improvements[name]||0) + (cur - prev);
    });
  });
  const topEx = Object.entries(improvements).sort((a,b)=>b[1]-a[1])[0];
  const deltaText = (curr, prev, suffix = "") => {
    const diff = curr - prev;
    if (diff === 0) return "ללא שינוי";
    return `${diff > 0 ? "+" : ""}${diff}${suffix} מול חודש קודם`;
  };
  const pctText = (curr, prev) => {
    if (prev <= 0) return curr > 0 ? "נתון חדש החודש" : "אין שינוי";
    const pct = Math.round(((curr - prev) / prev) * 100);
    return `${pct >= 0 ? "+" : ""}${pct}% מול חודש קודם`;
  };
  // calendar grid
  const firstDow = monthStart.getDay();
  const daysInMonth = monthEnd.getDate();
  const workoutDays = new Set(sessions.map(s => new Date(s.date).getDate()));
  const dayNames = ["א","ב","ג","ד","ה","ו","ש"];
  const calCells = [];
  for (let i = 0; i < firstDow; i++) calCells.push(`<div></div>`);
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === now.getDate() && viewMonth === now.getMonth() && viewYear === now.getFullYear();
    const worked = workoutDays.has(d);
    const bg = worked ? "var(--green-bg)" : isToday ? "var(--surface)" : "transparent";
    const border = worked ? "1px solid #86efac" : isToday ? "1px solid var(--border-med)" : "none";
    const color = worked ? "var(--green)" : isToday ? "var(--text-primary)" : "var(--text-hint)";
    const fw = isToday ? "700" : "400";
    calCells.push(`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;background:${bg};border:${border};font-size:13px;color:${color};font-weight:${fw}">${d}</div>`);
  }

  const firstSession = state.sessions.length ? state.sessions[0] : null;
  const firstD = firstSession ? new Date(firstSession.date) : now;
  const firstYear = firstD.getFullYear();
  const firstMonth = firstD.getMonth();
  const isPrev = viewYear > firstYear || (viewYear === firstYear && viewMonth > firstMonth);
  const isNext = viewMonth < now.getMonth() || viewYear < now.getFullYear();

  return `<div style="padding:0 14px 16px">
    ${tabs}

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:0 2px">
      <button onclick="prevMonth()" style="background:none;border:none;cursor:pointer;padding:6px;color:${isPrev?"var(--text-primary)":"var(--border-med)"};display:flex" ${isPrev?"":"disabled"}>
        <i data-lucide="chevron-right" style="width:18px;height:18px"></i>
      </button>
      <span style="font-weight:700;font-size:15px;color:var(--text-primary)">${monthNames[viewMonth]} ${viewYear}</span>
      <button onclick="nextMonth()" style="background:none;border:none;cursor:pointer;padding:6px;color:${isNext?"var(--text-primary)":"var(--border-med)"};display:flex" ${isNext?"":"disabled"}>
        <i data-lucide="chevron-left" style="width:18px;height:18px"></i>
      </button>
    </div>

    <div class="card" style="padding:14px;margin-bottom:14px">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px">
        ${dayNames.map(d=>`<div style="text-align:center;font-size:10px;color:var(--text-hint);font-weight:600;padding:4px 0">${d}</div>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
        ${calCells.join("")}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="stat-card">
        <div class="stat-label">אימונים</div>
        <div class="stat-value">${sessions.length}</div>
        <div class="stat-sub">${deltaText(sessions.length, prevSessions.length)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">נפח כולל</div>
        <div class="stat-value" style="font-size:18px">${formatVolume(totalVol)}</div>
        <div class="stat-sub">${pctText(totalVol, prevTotalVol)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">סטים</div>
        <div class="stat-value">${totalSets}</div>
        <div class="stat-sub">${deltaText(totalSets, prevTotalSets)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">שיאים חדשים</div>
        <div class="stat-value" style="color:${newPRs>0?"var(--green)":"var(--text-primary)"}">${newPRs}</div>
        <div class="stat-sub">${deltaText(newPRs, prevMonthPrs)}</div>
      </div>
    </div>

    ${topEx ? `<div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:10px">
      <i data-lucide="trending-up" style="width:18px;height:18px;color:var(--green);flex-shrink:0"></i>
      <div>
        <div style="font-size:11px;color:var(--text-hint);font-weight:600">הכי השתפרת</div>
        <div style="font-size:14px;font-weight:700;color:var(--text-primary);margin-top:2px">${topEx[0]}</div>
        <div style="font-size:11px;color:var(--green)">+${topEx[1]} ק״ג מעל האימון הקודם</div>
      </div>
    </div>` : sessions.length === 0 ? `<div style="padding:30px;text-align:center;color:var(--text-hint);font-size:14px">אין אימונים בחודש זה</div>` : ""}
  </div>`;
}

function prevMonth() {
  const firstSession = state.sessions.length ? state.sessions[0] : null;
  const firstD = firstSession ? new Date(firstSession.date) : new Date();
  const firstYear = firstD.getFullYear();
  const firstMonth = firstD.getMonth();
  if (state.monthViewYear === firstYear && state.monthViewMonth <= firstMonth) return;
  if (state.monthViewMonth === 0) { state.monthViewYear--; state.monthViewMonth = 11; }
  else state.monthViewMonth--;
  render();
}
function nextMonth() {
  const now = new Date();
  if (state.monthViewYear > now.getFullYear() || (state.monthViewYear === now.getFullYear() && state.monthViewMonth >= now.getMonth())) return;
  if (state.monthViewMonth === 11) { state.monthViewYear++; state.monthViewMonth = 0; }
  else state.monthViewMonth++;
  render();
}

function toggleHistorySession(id) {
  if (!state.expandedSessions) state.expandedSessions = new Set();
  if (state.expandedSessions.has(id)) state.expandedSessions.delete(id);
  else state.expandedSessions.add(id);
  render();
}

function changeGoalTemp(delta) {
  const thisWeekIso = getWeekStart(new Date()).toISOString().slice(0,10);
  const currentWeekGoal = getGoalForWeek(thisWeekIso);
  const base = state.pendingGoal ?? currentWeekGoal;
  const next = Math.max(1, Math.min(7, base + delta));
  state.pendingGoal = next;
  const el = document.getElementById("goal-display");
  if (el) el.textContent = next;
  render();
}

function promptSaveGoal() {
  const newGoal = state.pendingGoal;

  const thisWeekStart = getWeekStart(new Date());
  const thisWeekIso = thisWeekStart.toISOString().slice(0,10);

  const currentWeekGoal = getGoalForWeek(thisWeekIso);

  if (newGoal == null || newGoal === currentWeekGoal) return;

  const nextWeekStart = new Date(thisWeekStart.getTime() + 7 * 86400000);
  const nextWeekIso = nextWeekStart.toISOString().slice(0,10);

  showConfirmSheet(
    `עדכון יעד ל-${newGoal} אימונים`,
    "מאיזה שבוע לתחיל?",
    "החל מהשבוע הנוכחי",
    "החל משבוע הבא",
    () => { applyGoal(newGoal, thisWeekIso); },
    () => { applyGoal(newGoal, nextWeekIso); }
  );
}

function applyGoal(newGoal, fromIso) {
  const thisWeekIso = getWeekStart(new Date()).toISOString().slice(0,10);
  const currentWeekGoalBefore = getGoalForWeek(thisWeekIso);

  state.pendingGoal = null;
  if (!state.settings.goalHistory) state.settings.goalHistory = [];
  state.settings.goalHistory = state.settings.goalHistory.filter(e => e.from !== fromIso);
  state.settings.goalHistory.push({ goal: newGoal, from: fromIso });

  state.settings.weeklyGoal = fromIso <= thisWeekIso ? newGoal : currentWeekGoalBefore;

  saveSettings();
  haptic("medium");
  showToast(fromIso <= thisWeekIso ? "היעד השבועי עודכן ✓" : "היעד נשמר לשבוע הבא ✓");
  render();
}

function removeExercise(workoutId,i) {
  const w=getWorkout(workoutId);
  if(!w) return;
  if(w.exercises.length === 1) {
    if(confirm("אם תמחק תרגיל זה, האימון יישאר ריק. האם למחוק את האימון לגמרי?")) {
      state.workouts = state.workouts.filter(x => x.id !== workoutId);
      if(state.manageOpenId === workoutId) state.manageOpenId = null;
      saveWorkouts(); render();
    }
    return;
  }

function updateExRest(workoutId,i,val) {
  const w=getWorkout(workoutId);
  if(w && w.exercises[i]){ w.exercises[i].rest=parseInt(val)||60; saveWorkouts(); }
}
function updateExField(workoutId,i,field,val) {
  const w=getWorkout(workoutId);
  if(!w || !w.exercises[i]) return;
  if(field==="rest") w.exercises[i].rest=parseInt(val)||60;
  else if(field==="name") {
    const clean = sanitizeText(val, 80);
    if(clean) w.exercises[i].name=clean;
  }
  else if(field==="category") w.exercises[i].category=val||null;
  saveWorkouts();
}

function exportCSV() {
  if (!state.sessions.length) { showToast("אין נתונים לייצוא"); return; }
  const rows = [["תאריך","אימון","תרגיל","סט","משקל","חזרות","כשל"]];
  state.sessions.forEach(session => {
    const w = getWorkout(session.workoutId);
    const wName = w ? w.name : (session.workoutName || session.workoutId);
    Object.entries(session.exercises||{}).forEach(([exName, sets]) => {
      sets.forEach(s => {
        if (s.weight > 0 || s.reps > 0) {
          rows.push([
            new Date(session.date).toLocaleDateString("he-IL"),
            wName, exName, s.num, s.weight, s.reps, s.failed ? "כן" : "לא"
          ]);
        }
      });
    });
  });
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(",")).join("\n");
  const blob = new Blob(["﻿"+csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "gym-tracker.csv"; a.click();
  URL.revokeObjectURL(url);
  showToast("הנתונים יוצאו בהצלחה ✓");
}

let dragSrc = null;
let touchDragSrc = null;
let touchPlaceholder = null;

function bindDragDrop() {
  document.querySelectorAll(".ex-row-drag").forEach(row => {

    // ── Desktop drag ──────────────────────────────────────────────
    row.setAttribute("draggable", "true");
    row.addEventListener("dragstart", e => {
      dragSrc = row;
      row.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
    });
    row.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      dragSrc = null;
    });
    row.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
    });
    row.addEventListener("drop", e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === row) return;
      const wid = row.dataset.wid;
      const fromIdx = parseInt(dragSrc.dataset.idx);
      const toIdx = parseInt(row.dataset.idx);
      const w = getWorkout(wid);
      if (!w) return;
      const moved = w.exercises.splice(fromIdx, 1)[0];
      w.exercises.splice(toIdx, 0, moved);
      saveWorkouts(); render();
    });

    // ── Mobile touch ──────────────────────────────────────────────
    const handle = row.querySelector(".drag-handle");
    if (!handle) return;

    handle.addEventListener("touchstart", e => {
      touchDragSrc = row;
      row.classList.add("dragging");
      e.preventDefault();
    }, { passive: false });

    handle.addEventListener("touchmove", e => {
      if (!touchDragSrc) return;
      e.preventDefault();
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest(".ex-row-drag") : null;
      document.querySelectorAll(".ex-row-drag").forEach(r => r.style.borderTop = "");
      if (target && target !== touchDragSrc) {
        target.style.borderTop = "2px solid var(--accent)";
      }
    }, { passive: false });

    handle.addEventListener("touchend", e => {
      if (!touchDragSrc) return;
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest(".ex-row-drag") : null;
      document.querySelectorAll(".ex-row-drag").forEach(r => r.style.borderTop = "");
      touchDragSrc.classList.remove("dragging");
      if (target && target !== touchDragSrc) {
        const wid = target.dataset.wid;
        const fromIdx = parseInt(touchDragSrc.dataset.idx);
        const toIdx = parseInt(target.dataset.idx);
        const w = getWorkout(wid);
        if (w) {
          const moved = w.exercises.splice(fromIdx, 1)[0];
          w.exercises.splice(toIdx, 0, moved);
          saveWorkouts(); render();
        }
      }
      touchDragSrc = null;
    }, { passive: false });
  });
}


function showExerciseGraph(exName) {
  document.getElementById("ex-graph-modal")?.remove();
  const dataPoints = [];
  state.sessions.forEach(session => {
    const sets = session.exercises?.[exName];
    if (!sets || !sets.length) return;
    const maxW = Math.max(...sets.map(s => s.weight || 0));
    if (maxW > 0) dataPoints.push({ date: session.date, weight: maxW });
  });
  if (!dataPoints.length) { showToast("אין נתונים לתרגיל זה"); return; }

  const overlay = document.createElement("div");
  overlay.id = "ex-graph-modal";
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;display:flex;align-items:flex-end;justify-content:center";

  const maxW = Math.max(...dataPoints.map(d => d.weight));
  const minW = Math.min(...dataPoints.map(d => d.weight));
  const pad = 40; const W = 340; const H = 180; const gH = H - pad*0.8;

  const pts = dataPoints.map((d, i) => {
    const x = pad + (i / Math.max(dataPoints.length - 1, 1)) * (W - pad*1.5);
    const y = pad*0.4 + (1 - (d.weight - minW) / Math.max(maxW - minW, 1)) * gH;
    return { x, y, ...d };
  });

  const polyline = pts.map(p => `${p.x},${p.y}`).join(" ");
  const areaPath = `M${pts[0].x},${H} ` + pts.map(p=>`L${p.x},${p.y}`).join(" ") + ` L${pts[pts.length-1].x},${H} Z`;

  const dots = pts.map((p,i) => {
    const isFirst = i === 0;
    const isLast = i === pts.length - 1;
    const isPR = p.weight === maxW;
    const showLabel = isFirst || isLast || isPR || pts.length <= 6;
    const anchor = isFirst ? "start" : isLast ? "end" : "middle";
    const labelColor = isPR ? "#15803d" : "#111827";
    const labelY = p.y > 28 ? p.y - 10 : p.y + 20;
    return `
      <circle cx="${p.x}" cy="${p.y}" r="${isPR ? 5 : 4}" fill="${isPR ? "#15803d" : "#111827"}" stroke="#fff" stroke-width="2"/>
      ${showLabel ? `<text x="${p.x}" y="${labelY}" text-anchor="${anchor}" font-size="11" font-weight="700" fill="${labelColor}">${p.weight}</text>` : ""}
    `;
  }).join("");

  const labels = pts.filter((_,i) => i===0 || i===pts.length-1 || pts.length<=5).map(p =>
    `<text x="${p.x}" y="${H+14}" text-anchor="middle" font-size="10" fill="#9ca3af">${new Date(p.date).toLocaleDateString("he-IL",{day:"numeric",month:"numeric"})}</text>`
  ).join("");

  const sheet = document.createElement("div");
  sheet.style.cssText = "background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px 32px;width:100%;max-width:420px;direction:rtl;animation:slideUp 0.3s cubic-bezier(0.22,1,0.36,1) both";
  sheet.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div style="font-size:16px;font-weight:700;color:var(--text-primary)">${exName}</div>
        <div style="font-size:12px;color:var(--text-hint);margin-top:2px">שיא: ${maxW} ק"ג · ${dataPoints.length} אימונים</div>
      </div>
      <button onclick="document.getElementById('ex-graph-modal').remove()" style="background:var(--surface);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--text-hint);display:flex;align-items:center;justify-content:center">×</button>
    </div>
    <svg viewBox="0 0 ${W} ${H+20}" width="100%" style="overflow:visible">
      <defs>
        <linearGradient id="gfill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#111827" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#gfill)"/>
      <polyline points="${polyline}" fill="none" stroke="#111827" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
      ${labels}
    </svg>
  `;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if(e.target===overlay) overlay.remove(); });
}

      <div style="display:flex;align-items:center;gap:5px;padding:8px 16px 4px;background:var(--surface)">
        <i data-lucide="${catIcon}" style="width:11px;height:11px;color:var(--text-hint)"></i>
        <span style="font-size:10px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:0.05em">${catLabel}</span>
      </div>${items}</div>`;
  }).join("");

  const sheet = document.createElement("div");
  sheet.style.cssText = "background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:420px;direction:rtl;animation:slideUp 0.3s cubic-bezier(0.22,1,0.36,1) both;max-height:80vh;display:flex;flex-direction:column";
  sheet.innerHTML = `
    <div style="padding:16px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:15px;font-weight:700;color:var(--text-primary)">תרגיל חד-פעמי</span>
        <button onclick="document.getElementById('ex-picker-modal').remove()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-hint)">×</button>
      </div>
      <input id="ex-extra-search" placeholder="חיפוש..." autocomplete="off"
        style="width:100%;font-family:inherit;font-size:14px;background:var(--surface);border:1px solid var(--border-med);border-radius:8px;padding:8px 12px;color:var(--text-primary);outline:none;box-sizing:border-box;direction:rtl">
    </div>
    <div id="ex-extra-list" style="overflow-y:auto;flex:1">${listHtml}</div>
  `;

  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if(e.target===overlay) overlay.remove(); });
  if (window.lucide) lucide.createIcons({ el: sheet });
  setTimeout(() => sheet.querySelector("#ex-extra-search")?.focus(), 100);

  // חיפוש
  sheet.querySelector("#ex-extra-search").addEventListener("input", function() {
    const q = this.value.trim().toLowerCase();
    const list = sheet.querySelector("#ex-extra-list");
    if (!q) { list.innerHTML = listHtml; if (window.lucide) lucide.createIcons({ el: list }); bindExtraItems(list); return; }
    const filtered = state.exerciseLibrary.filter(ex => ex.name.toLowerCase().includes(q));
    list.innerHTML = filtered.map(ex => `<div class="ex-pick-item" data-name="${ex.name}" data-cat="${ex.category||""}"
        style="display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;border-bottom:0.5px solid var(--border)">
        <span style="flex:1;font-size:14px;color:var(--text-primary)">${ex.name}</span>
      </div>`).join("") || `<div style="padding:20px;text-align:center;color:var(--text-hint);font-size:13px">לא נמצא</div>`;
    bindExtraItems(list);
  });

  bindExtraItems(sheet.querySelector("#ex-extra-list"));
}

function openExercisePicker(workoutId) {
  state.libraryPickerTargetWorkoutId = workoutId;
  openWorkoutExtraPicker();
}

function bindExtraItems(container) {
  container.querySelectorAll(".ex-pick-item").forEach(item => {
    item.addEventListener("click", () => {
      const name = item.dataset.name;
      const category = item.dataset.cat || null;
      document.getElementById("ex-picker-modal")?.remove();
      const targetWorkoutId = state.libraryPickerTargetWorkoutId || null;
      if (targetWorkoutId) {
        const workout = getWorkout(targetWorkoutId);
        if (workout) {
          const exists = workout.exercises.some(ex => (typeof ex === "string" ? ex : ex.name) === name);
          if (!exists) workout.exercises.push({ name, rest: 60, category });
          saveWorkouts();
          state.manageOpenId = targetWorkoutId;
        }
        state.libraryPickerTargetWorkoutId = null;
        render();
        return;
      }
      if (!state.workoutExtras) state.workoutExtras = [];
      if (!state.workoutExtras.includes(name)) state.workoutExtras.push(name);
      if (!state.exercises[name]) {
        const isCardio = category === "cardio";
        state.exercises[name] = isCardio
          ? [{num:1, minutes:0}]
          : [{num:1,weight:0,reps:0},{num:2,weight:0,reps:0},{num:3,weight:0,reps:0}];
      }
      state.openExercise = name;
      saveInProgress();
      render();
    });
    item.addEventListener("mouseenter", () => item.style.background = "var(--surface)");
    item.addEventListener("mouseleave", () => item.style.background = "");
  });
}



function bindWorkoutDragDrop() {
  let dragSrcW = null, touchDragSrcW = null;
  document.querySelectorAll(".workout-drag").forEach(card => {
    card.addEventListener("dragstart", e => {
      dragSrcW = card; card.classList.add("dragging"); e.dataTransfer.effectAllowed = "move";
    });
    card.addEventListener("dragend", () => { card.classList.remove("dragging"); dragSrcW = null; });
    card.addEventListener("dragover", e => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; });
    card.addEventListener("drop", e => {
      e.preventDefault();
      if (!dragSrcW || dragSrcW === card) return;
      const fromIdx = parseInt(dragSrcW.dataset.widx);
      const toIdx = parseInt(card.dataset.widx);
      const moved = state.workouts.splice(fromIdx, 1)[0];
      state.workouts.splice(toIdx, 0, moved);
      saveWorkouts(); render();
    });

    const handle = card.querySelector(".workout-drag-handle");
    if (!handle) return;
    handle.addEventListener("touchstart", e => {
      touchDragSrcW = card; card.classList.add("dragging"); e.stopPropagation();
    }, { passive: true });
    handle.addEventListener("touchmove", e => {
      if (!touchDragSrcW) return;
      e.preventDefault();
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest(".workout-drag") : null;
      document.querySelectorAll(".workout-drag").forEach(c => c.style.borderTop = "");
      if (target && target !== touchDragSrcW) target.style.borderTop = "2px solid var(--accent)";
    }, { passive: false });
    handle.addEventListener("touchend", e => {
      if (!touchDragSrcW) return;
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      const target = el ? el.closest(".workout-drag") : null;
      document.querySelectorAll(".workout-drag").forEach(c => c.style.borderTop = "");
      touchDragSrcW.classList.remove("dragging");
      if (target && target !== touchDragSrcW) {
        const fromIdx = parseInt(touchDragSrcW.dataset.widx);
        const toIdx = parseInt(target.dataset.widx);
        const moved = state.workouts.splice(fromIdx, 1)[0];
        state.workouts.splice(toIdx, 0, moved);
        saveWorkouts(); render();
      }
      touchDragSrcW = null;
    }, { passive: false });
  });
}

window.addEventListener("load", async function() {
  state.screen = "dashboard";
  const loader = document.getElementById("app-loader");
  const results = await Promise.allSettled([
  loadSessionsFromSupabase(),
  loadWeightData(),
  loadWorkoutsFromSupabase(),
  loadSettingsFromSupabase(),
  loadExerciseLibrary()
]);

const failed = results
  .map((r, i) => ({ r, i }))
  .filter(x => x.r.status === "rejected");

if (failed.length) {
  console.error("Some data failed to load:", failed);
  showToast("חלק מהנתונים לא נטענו ⚠️");
}
  runRuntimeDataAudit();
  if (loader) {
    loader.style.opacity = "0";
    setTimeout(() => loader.remove(), 350);
  }
  render();
});
</script>

          console.log('ServiceWorker registration successful:', registration.scope);
          registration.update().catch(() => {});
        })
        .catch(err => {

        });
    });
